<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fuel Quality Monitoring</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: #f5f5f5;
        }

        header {
            background: #003366;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 22px;
            font-weight: bold;
        }

        .container {
            padding: 20px;
        }

        .info-box {
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        .info-box h3 {
            margin-top: 0;
        }

        .status-good {
            color: green;
            font-weight: bold;
        }

        .status-warning {
            color: orange;
            font-weight: bold;
        }

        .status-bad {
            color: red;
            font-weight: bold;
        }
    </style>
</head>
<body>

<header>Fuel Quality Monitoring</header>

<div class="container">

    <div class="info-box">
        <h3>Fuel Station Information</h3>
        <p><strong>Station Name:</strong> Example Fuel Station</p>
        <p><strong>Location:</strong> Rosenberg, TX</p>
        <p><strong>Fuel Type:</strong> Premium Unleaded</p>
    </div>

    <div class="info-box">
        <h3>Fuel Quality Status</h3>
        <p><strong>Quality Rating:</strong> 92/100</p>
        <p><strong>Status:</strong> <span class="status-good">Good</span></p>
        <p><strong>Last Inspection:</strong> 2026‑05‑10</p>
    </div>

</div>

</body>
</html>
