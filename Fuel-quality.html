<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fuel Quality Monitoring</title>

    <!-- Leaflet CSS -->
    <link 
        rel="stylesheet" 
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        crossorigin=""
    />

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: #f5f5f5;
        }

        header {
            background: #003366;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 22px;
            font-weight: bold;
        }

        .container {
            padding: 20px;
        }

        #map {
            height: 450px;
            width: 100%;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .info-box {
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .info-box h3 {
            margin-top: 0;
        }
    </style>
</head>
<body>

<header>Fuel Quality Monitoring</header>

<div class="container">

    <!-- USA Leaflet Map -->
    <div id="map"></div>

    <!-- Fuel Quality Info Section -->
    <div class="info-box">
        <h3>Fuel Quality Status</h3>
        <p><strong>Station:</strong> Example Fuel Station</p>
        <p><strong>Fuel Type:</strong> Premium Unleaded</p>
        <p><strong>Quality Rating:</strong> 92/100</p>
        <p><strong>Last Inspection:</strong> 2026‑05‑10</p>
    </div>

</div>

<!-- Leaflet JS -->
<script 
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    crossorigin="">
</script>

<script>
    // Initialize USA map
    const map = L.map('map').setView([39.5, -98.35], 4); // Geographic center of USA

    // Add OpenStreetMap tiles
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '© OpenStreetMap'
    }).addTo(map);

    // Custom icons
    const airportIcon = L.icon({
        iconUrl: 'https://cdn-icons-png.flaticon.com/512/684/684908.png',
        iconSize: [28, 28],
        iconAnchor: [14, 14]
    });

    const refineryIcon = L.icon({
        iconUrl: 'https://cdn-icons-png.flaticon.com/512/854/854878.png',
        iconSize: [30, 30],
        iconAnchor: [15, 15]
    });

    // Major U.S. Airports
    const airports = [
        { name: "Atlanta (ATL)", coords: [33.6407, -84.4277] },
        { name: "Los Angeles (LAX)", coords: [33.9416, -118.4085] },
        { name: "Chicago O’Hare (ORD)", coords: [41.9742, -87.9073] },
        { name: "Dallas/Fort Worth (DFW)", coords: [32.8998, -97.0403] },
        { name: "Denver (DEN)", coords: [39.8561, -104.6737] }
    ];

    airports.forEach(a => {
        L.marker(a.coords, { icon: airportIcon })
            .addTo(map)
            .bindPopup(`<b>Airport:</b> ${a.name}`);
    });

    // Major U.S. Refineries
    const refineries = [
        { name: "Baytown Refinery (TX)", coords: [29.7360, -94.9774] },
        { name: "Port Arthur Refinery (TX)", coords: [29.8849, -93.9399] },
        { name: "Baton Rouge Refinery (LA)", coords: [30.5285, -91.1871] },
        { name: "Garyville Refinery (LA)", coords: [30.0560, -90.6180] },
        { name: "Martinez Refinery (CA)", coords: [38.0330, -122.1330] }
    ];

    refineries.forEach(r => {
        L.marker(r.coords, { icon: refineryIcon })
            .addTo(map)
            .bindPopup(`<b>Refinery:</b> ${r.name}`);
    });
</script>

</body>
</html>
