<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aromatics</title>
  <link rel="stylesheet" href="/static/css/styles.css" />
</head>

<body>

  <!-- Shared Header -->
  <div id="header-placeholder"></div>
  <script>
    fetch('/header.html')
      .then(res => res.text())
      .then(html => document.getElementById('header-placeholder').innerHTML = html);
  </script>

  <main>

    <h1>Aromatics (BTX)</h1>

    <!-- ========================= -->
    <!-- BENZENE DEMAND CHART -->
    <!-- ========================= -->
    <section class="chart-section">
      <h2>U.S. Benzene Demand (2020–2025)</h2>
      <canvas id="benzeneDemandChart"></canvas>
    </section>

    <script type="module">
      import { renderCsvMultiSeriesChart } from '/engineeringCharts.js';

      renderCsvMultiSeriesChart({
        canvasId: 'benzeneDemandChart',
        csvPath: '/data/us_benzene_demand_2020_2025.csv',
        xKey: 'Year',
        yKeys: ['Demand_MMT'],
        chartTitle: 'U.S. Benzene Demand (2020–2025)',
        yLabel: 'Demand (MMT)'
      });
    </script>

    <!-- ========================= -->
    <!-- TOLUENE DEMAND CHART -->
    <!-- ========================= -->
    <section class="chart-section">

        yLabel: 'Demand (MMT)'
      });

      <canvas id="pxDemandChart"></canvas>
    </section>

    <script type="module">

      renderCsvMultiSeriesChart({

        yLabel: 'Demand (MMT)'
      });
    </script>

    <!-- ========================= -->
    <!-- MIXED XYLENES (MX) DEMAND -->
    <!-- ========================= -->
    <section class="chart-section">
      <h2>U.S. Mixed Xylenes (MX) Demand (2020–2025)</h2>

    </section>

        yKeys: ['Demand_MMT'],
        chartTitle: 'U.S. MX Demand (2020–2025)',
        yLabel: 'Demand (MMT)'
      });
    </script>

  </main>

  <!-- Shared Footer -->
  <div id="footer-placeholder"></div>
  <script>
    fetch('/footer.html')
      .then(res => res.text())
      .then(html => document.getElementById('footer-placeholder').innerHTML = html);
  </script>

</body>
</html>
