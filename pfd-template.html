<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Amine Treating Unit - Fresh PFD</title>
  <link rel="icon" href="data:," />
  <link rel="stylesheet" href="css/pfd-template.css" />
</head>
<body>
  <header class="app-header">
    <div>
      <h1>Amine Treating Unit</h1>
      <p>Fresh amine gas-sweetening PFD rebuilt from Amine-Treating-1.svg style symbols.</p>
    </div>
  </header>

  <main class="page-shell">
    <section class="flowsheet-card">
      <div class="flowsheet-toolbar">
        <button id="btnReset" type="button">Reset</button>
        <button id="btnLabels" type="button">Toggle Labels</button>
        <button id="btnStreams" type="button">Toggle Streams</button>
        <button id="btnTables" type="button">Toggle SVG Tables</button>
      </div>

      <div class="svg-wrap" id="svgWrap">
        <div id="pfdSvgMount" class="pfd-svg-mount" data-svg-src="svg/pfd-template.svg" aria-label="Amine Treating Process Flow Diagram"></div>
        <div id="pfdTooltip" class="pfd-tooltip"></div>
      </div>
    </section>

    <section class="panel-grid">
      <form class="input-panel" id="inputForm">
        <h2>Amine Treating Inputs</h2>
        <div class="field-grid">
          <label>Sour Gas Feed, MMSCFD <input id="sourGasMmscfd" type="number" value="10" min="0" step="0.1"></label>
          <label>H₂S, mol % <input id="h2sMolPct" type="number" value="2" min="0" step="0.1"></label>
          <label>CO₂, mol % <input id="co2MolPct" type="number" value="1" min="0" step="0.1"></label>
          <label>Feed Pressure, psig <input id="feedPressure" type="number" value="950" min="0" step="5"></label>
          <label>Feed Temperature, °F <input id="feedTemperature" type="number" value="100" step="1"></label>
          <label>MDEA Strength, wt % <input id="mdeaWtPct" type="number" value="40" min="1" max="70" step="1"></label>
          <label>Lean Loading, mol/mol <input id="leanLoading" type="number" value="0.05" min="0" step="0.01"></label>
          <label>Rich Loading, mol/mol <input id="richLoading" type="number" value="0.40" min="0" step="0.01"></label>
          <label>Design Factor <input id="designFactor" type="number" value="1.35" min="1" step="0.05"></label>
          <label>Reboiler Duty, Btu/gal <input id="reboilerBtuGal" type="number" value="1050" min="0" step="25"></label>
          <label>Lean Amine Temp, °F <input id="leanAmineTemp" type="number" value="110" step="1"></label>
          <label>Pump Discharge Pressure, psig <input id="pumpPressure" type="number" value="990" min="0" step="5"></label>
        </div>
      </form>

      <section class="output-panel">
        <h2>Calculated Outputs</h2>
        <table><tbody id="outputTable"></tbody></table>
      </section>

      <section class="output-panel">
        <h2>Stream Summary</h2>
        <table><tbody id="streamTable"></tbody></table>
      </section>
    </section>
  </main>

  <script src="js/pfd-template.js"></script>
</body>
</html>
