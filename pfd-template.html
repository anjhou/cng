<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dynamic HYSYS / UniSim Styled PFD</title>
  <link rel="icon" href="data:," />
  <link rel="stylesheet" href="css/pfd-template.css" />
</head>
<body>
  <header class="app-header">
    <div>
      <h1>Dynamic PFD View</h1>
      <p>Dropdown selections update the SVG flowsheet, dynamic input form, product output table, and economics summary.</p>
    </div>
  </header>

  <main class="page-shell">
    <section class="flowsheet-card">
      <div class="flowsheet-toolbar">
        <button id="btnReset" type="button">Reset</button>
        <button id="btnLabels" type="button">Toggle Labels</button>
        <button id="btnUtilities" type="button">Toggle Utilities</button>
        <button id="btnOverlays" type="button">Toggle Overlays</button>
      </div>

      <div class="context-toolbar" aria-label="PFD selection filters">
        <fieldset class="radio-group">
          <legend>Business View</legend>
          <label><input type="radio" name="businessView" value="Chemicals"> Chemicals</label>
          <label><input type="radio" name="businessView" value="Energy"> Energy</label>
          <label><input type="radio" name="businessView" value="Chemicals & Energy"> Chemicals &amp; Energy</label>
          <button type="button" id="btnClearBusinessView" class="clear-button">Clear</button>
        </fieldset>

        <label class="select-field">
          Object Level
          <select id="objectLevel">
            <option value="">Select level</option>
            <option value="Streams">Streams</option>
            <option value="Units">Units</option>
            <option value="Plants">Plants</option>
            <option value="Sites">Sites</option>
            <option value="Regions">Regions</option>
          </select>
        </label>

        <label class="select-field">
          Process Area
          <select id="processArea">
            <option value="">Select process area</option>
            <option value="Amine">Amine</option>
            <option value="Dehydration">Dehydration</option>
            <option value="HDS">HDS</option>
            <option value="Mercury Removal">Mercury Removal</option>
            <option value="Fractionation">Fractionation</option>
            <option value="Stabilizer">Stabilizer</option>
            <option value="LNG">LNG</option>
            <option value="NGLs">NGLs</option>
            <option value="Refinery">Refinery</option>
            <option value="Petchem">Petchem</option>
          </select>
        </label>
      </div>

      <div class="active-view-bar">
        <strong>Active View:</strong> <span id="activeViewName">Default Fired Heater</span>
      </div>

      <div class="svg-wrap" id="svgWrap">
        <div id="pfdSvgMount" class="pfd-svg-mount" data-svg-src="svg/pfd-template.svg" aria-label="Process Flow Diagram"></div>
        <div id="pfdTooltip" class="pfd-tooltip"></div>
      </div>
    </section>

    <section class="panel-grid">
      <form class="input-panel" id="inputForm">
        <h2>Calculation Inputs</h2>
        <div class="field-grid">
          <label>Heavy Naphtha Flow, lb/h <input id="naphthaFlow" type="number" value="15000" min="0" step="100"></label>
          <label>VGO Flow, lb/h <input id="vgoFlow" type="number" value="22000" min="0" step="100"></label>
          <label>Feed Inlet Temp, °F <input id="feedTin" type="number" value="420" step="1"></label>
          <label>Feed Outlet Temp, °F <input id="feedTout" type="number" value="680" step="1"></label>
          <label>Feed Pressure, psig <input id="feedPressure" type="number" value="55" step="1"></label>
          <label>Average Cp, Btu/lb-°F <input id="cp" type="number" value="0.62" min="0.01" step="0.01"></label>
          <label>Fuel Gas LHV, Btu/scf <input id="fuelLhv" type="number" value="950" min="1" step="10"></label>
          <label>Heater Efficiency, % <input id="efficiency" type="number" value="87" min="1" max="100" step="0.5"></label>
          <label>Stack Temp, °F <input id="stackTemp" type="number" value="650" step="1"></label>
          <label>Air Excess, % <input id="excessAir" type="number" value="15" min="0" step="1"></label>
        </div>
      </form>

      <section class="output-panel">
        <h2 id="outputTitle">Calculated Outputs</h2>
        <table>
          <tbody id="outputTable"></tbody>
        </table>
      </section>

      <section class="economics-panel">
        <h2>Economics</h2>
        <table>
          <tbody id="economicsTable"></tbody>
        </table>
      </section>
    </section>
  </main>

  <script src="js/pfd-template.js"></script>
</body>
</html>
