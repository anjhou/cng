<svg width="1200" height="600" xmlns="http://www.w3.org/2000/svg">

  <style>
    .tower { fill:#e0ecff; stroke:#003366; stroke-width:2; }
    .heater { fill:#ffe6cc; stroke:#cc6600; stroke-width:2; }
    .pump { fill:#e6ffe6; stroke:#006600; stroke-width:2; }
    .condenser { fill:#fff2cc; stroke:#996600; stroke-width:2; }
    .stream { stroke:#000; stroke-width:2; fill:none; marker-end:url(#arrow); }
    .bubble { fill:white; stroke:black; stroke-width:2; }
    .inst { fill:white; stroke:black; stroke-width:2; }
    .valve { stroke:black; stroke-width:2; fill:none; }
    .label { font-family:Arial; font-size:12px; }
    .tag { font-family:Arial; font-size:12px; font-weight:bold; }
  </style>

  <!-- Arrowhead -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <polygon points="0 0, 6 3, 0 6" fill="#000"/>
    </marker>
  </defs>

  <!-- FEED STREAM S-101 -->
  <line class="stream" data-id="S-101" x1="40" y1="250" x2="140" y2="250"/>
  <circle class="bubble" data-id="S-101" cx="40" cy="250" r="15"/>
  <text x="40" y="255" text-anchor="middle" class="tag">S-101</text>

  <!-- FEED CONTROL VALVE FV-101 -->
  <polygon class="valve" data-id="FV-101" points="140,240 160,250 140,260"/>
  <text x="150" y="235" class="tag">FV-101</text>

  <!-- CDU T-101 -->
  <rect class="tower" data-id="T-101" x="180" y="170" width="100" height="180"/>
  <text x="230" y="165" text-anchor="middle" class="tag">T-101</text>
  <text x="230" y="365" text-anchor="middle" class="label">CDU</text>

  <!-- FI-101 on feed -->
  <circle class="inst" data-id="FI-101" cx="160" cy="220" r="18"/>
  <text x="160" y="225" text-anchor="middle" class="tag">FI-101</text>

  <!-- CDU Overhead S-102 -->
  <line class="stream" data-id="S-102" x1="230" y1="170" x2="230" y2="110"/>
  <circle class="bubble" data-id="S-102" cx="230" cy="110" r="15"/>
  <text x="230" y="115" text-anchor="middle" class="tag">S-102</text>

  <!-- PV-101 on overhead -->
  <polygon class="valve" data-id="PV-101" points="230,95 250,110 230,125"/>
  <text x="250" y="90" class="tag">PV-101</text>

  <!-- Condenser C-101 -->
  <rect class="condenser" data-id="C-101" x="260" y="80" width="70" height="40"/>
  <text x="295" y="75" text-anchor="middle" class="tag">C-101</text>

  <!-- CDU Bottoms S-103 -->
  <line class="stream" data-id="S-103" x1="230" y1="350" x2="230" y2="410"/>
  <circle class="bubble" data-id="S-103" cx="230" cy="410" r="15"/>
  <text x="230" y="415" text-anchor="middle" class="tag">S-103</text>

  <!-- Heater H-101 -->
  <rect class="heater" data-id="H-101" x="200" y="430" width="60" height="35"/>
  <text x="230" y="425" text-anchor="middle" class="tag">H-101</text>

  <!-- TI-101 on heater outlet -->
  <circle class="inst" data-id="TI-101" cx="270" cy="447" r="18"/>
  <text x="270" y="452" text-anchor="middle" class="tag">TI-101</text>

  <!-- Heater to VDU S-104 -->
  <line class="stream" data-id="S-104" x1="260" y1="447" x2="380" y2="447"/>
  <circle class="bubble" data-id="S-104" cx="380" cy="447" r="15"/>
  <text x="380" y="452" text-anchor="middle" class="tag">S-104</text>

  <!-- VDU T-102 -->
  <rect class="tower" data-id="T-102" x="350" y="170" width="100" height="180"/>
  <text x="400" y="165" text-anchor="middle" class="tag">T-102</text>
  <text x="400" y="365" text-anchor="middle" class="label">VDU</text>

  <!-- LI-102 on VDU bottoms -->
  <circle class="inst" data-id="LI-102" cx="400" cy="360" r="18"/>
  <text x="400" y="365" text-anchor="middle" class="tag">LI-102</text>

  <!-- VDU Bottoms S-105 -->
  <line class="stream" data-id="S-105" x1="400" y1="350" x2="400" y2="410"/>
  <circle class="bubble" data-id="S-105" cx="400" cy="410" r="15"/>
  <text x="400" y="415" text-anchor="middle" class="tag">S-105</text>

  <!-- Reboiler H-102 -->
  <rect class="heater" data-id="H-102" x="370" y="430" width="60" height="35"/>
  <text x="400" y="425" text-anchor="middle" class="tag">H-102</text>

  <!-- LV-102 on bottoms -->
  <polygon class="valve" data-id="LV-102" points="400,410 420,425 400,440"/>
  <text x="425" y="405" class="tag">LV-102</text>

  <!-- VDU Overhead S-106 -->
  <line class="stream" data-id="S-106" x1="400" y1="170" x2="400" y2="120"/>
  <circle class="bubble" data-id="S-106" cx="400" cy="120" r="15"/>
  <text x="400" y="125" text-anchor="middle" class="tag">S-106</text>

  <!-- PI-101 on overhead -->
  <circle class="inst" data-id="PI-101" cx="430" cy="120" r="18"/>
  <text x="430" y="125" text-anchor="middle" class="tag">PI-101</text>

  <!-- Pump P-101 -->
  <rect class="pump" data-id="P-101" x="460" y="100" width="60" height="40"/>
  <text x="490" y="95" text-anchor="middle" class="tag">P-101</text>

  <!-- Product Stream S-201 -->
  <line class="stream" data-id="S-201" x1="520" y1="120" x2="700" y2="120"/>
  <circle class="bubble" data-id="S-201" cx="700" cy="120" r="15"/>
  <text x="700" y="125" text-anchor="middle" class="tag">S-201</text>
  <text x="720" y="125" class="label">To Storage</text>

</svg>
