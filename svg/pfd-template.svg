        <line x1="55" y1="34" x2="135" y2="34" class="source-tube"/>
        <line x1="55" y1="42" x2="135" y2="42" class="source-tube"/>
        <line x1="55" y1="50" x2="135" y2="50" class="source-tube"/>
        <line x1="55" y1="58" x2="135" y2="58" class="source-tube"/>
        <line x1="95" y1="6" x2="95" y2="25" class="source-nozzle"/>
        <line x1="95" y1="65" x2="95" y2="84" class="source-nozzle"/>
