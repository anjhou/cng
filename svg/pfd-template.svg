<?xml version="1.0" encoding="UTF-8"?>
<svg id="pfdSvg" class="pfd-svg" viewBox="0 0 1400 850" role="img" aria-label="Dynamic Process Flow Diagram" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pumpPressureGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4A90E2"/>
      <stop offset="100%" stop-color="#D0021B"/>
    </linearGradient>
    <marker id="pumpArrowHead" markerWidth="4.5" markerHeight="10" refX="3.6" refY="3" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0, 3.6 3, 0 6" fill="black"/>
    </marker>
    <marker id="arrowProcess" markerWidth="4.5" markerHeight="10" refX="3.6" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L4.5,5 L0,10 Z" fill="#2563eb"/></marker>
    <marker id="arrowGas" markerWidth="4.5" markerHeight="10" refX="3.6" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L4.5,5 L0,10 Z" fill="#059669"/></marker>
    <marker id="arrowFuel" markerWidth="4.5" markerHeight="10" refX="3.6" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L4.5,5 L0,10 Z" fill="#dc2626"/></marker>
    <marker id="arrowFlue" markerWidth="4.5" markerHeight="10" refX="3.6" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L4.5,5 L0,10 Z" fill="#6b7280"/></marker>
    <marker id="arrowUtility" markerWidth="4.5" markerHeight="10" refX="3.6" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L4.5,5 L0,10 Z" fill="#7c3aed"/></marker>
  
    <linearGradient id="compressorGradient" x1="0%" y1="0%" x2="100%" y2="0%">
