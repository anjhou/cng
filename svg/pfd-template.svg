<?xml version="1.0" encoding="UTF-8"?>
<svg id="pfdSvg" class="pfd-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 900" role="img" aria-labelledby="title desc">
  <title id="title">Amine Treating Unit Process Flow Diagram</title>
  <desc id="desc">Fresh amine treating unit rebuilt with PFD-grade unit symbols based on Amine-Treating-1.svg.</desc>
  <defs>
    <marker id="arrowGas" markerWidth="5" markerHeight="5" refX="4" refY="2.5" orient="auto"><path d="M0,0 L5,2.5 L0,5 Z" fill="#b7791f"/></marker>
    <marker id="arrowSweet" markerWidth="5" markerHeight="5" refX="4" refY="2.5" orient="auto"><path d="M0,0 L5,2.5 L0,5 Z" fill="#2563eb"/></marker>
    <marker id="arrowLean" markerWidth="5" markerHeight="5" refX="4" refY="2.5" orient="auto"><path d="M0,0 L5,2.5 L0,5 Z" fill="#166534"/></marker>
    <marker id="arrowRich" markerWidth="5" markerHeight="5" refX="4" refY="2.5" orient="auto"><path d="M0,0 L5,2.5 L0,5 Z" fill="#15803d"/></marker>
    <marker id="arrowAcid" markerWidth="5" markerHeight="5" refX="4" refY="2.5" orient="auto"><path d="M0,0 L5,2.5 L0,5 Z" fill="#7e22ce"/></marker>
    <marker id="arrowWater" markerWidth="5" markerHeight="5" refX="4" refY="2.5" orient="auto"><path d="M0,0 L5,2.5 L0,5 Z" fill="#0f67d2"/></marker>
    <marker id="arrowHeat" markerWidth="5" markerHeight="5" refX="4" refY="2.5" orient="auto"><path d="M0,0 L5,2.5 L0,5 Z" fill="#ea580c"/></marker>
  </defs>

  <g id="layerGrid">
    <rect x="0" y="0" width="1500" height="900" fill="#fff"/>
    <line x1="500" y1="0" x2="500" y2="900" class="grid-line"/>
    <line x1="1000" y1="0" x2="1000" y2="900" class="grid-line"/>
    <line x1="0" y1="300" x2="1500" y2="300" class="grid-line"/>
    <line x1="0" y1="600" x2="1500" y2="600" class="grid-line"/>
    <text x="16" y="28" class="section-id">pfd-section-r1c1</text><text x="516" y="28" class="section-id">pfd-section-r1c2</text><text x="1016" y="28" class="section-id">pfd-section-r1c3</text>
    <text x="16" y="328" class="section-id">pfd-section-r2c1</text><text x="516" y="328" class="section-id">pfd-section-r2c2</text><text x="1016" y="328" class="section-id">pfd-section-r2c3</text>
    <text x="16" y="628" class="section-id">pfd-section-r3c1</text><text x="516" y="628" class="section-id">pfd-section-r3c2</text><text x="1016" y="628" class="section-id">pfd-section-r3c3</text>
  </g>

  <g id="layerStreams"></g>
  <g id="layerUnits"></g>
  <g id="layerLabels"></g>
  <g id="layerTables"></g>
</svg>
