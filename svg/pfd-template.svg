    </marker>
    <marker id="arrowLiquid" markerWidth="4.5" markerHeight="10" refX="3.6" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L4.5,5 L0,10 Z" fill="#2563eb"/></marker>
    <marker id="arrowVapor" markerWidth="4.5" markerHeight="10" refX="3.6" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L4.5,5 L0,10 Z" fill="#059669"/></marker>
    <marker id="arrowEnergy" markerWidth="4.5" markerHeight="10" refX="3.6" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L4.5,5 L0,10 Z" fill="#b45309"/></marker>

    <!-- Unit symbol library derived from Amine-Treating-1.svg.
