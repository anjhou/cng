        <line x1="135" y1="45" x2="160" y2="45" class="source-nozzle"/>
        <line x1="80" y1="8" x2="80" y2="24" class="source-nozzle"/>
        <line x1="80" y1="66" x2="80" y2="84" class="source-nozzle"/>
        <line x1="42" y1="54" x2="118" y2="54" class="source-level"/>
      </g>
    </symbol>
