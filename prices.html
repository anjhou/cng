<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Energy Prices | Houston CNG Consulting</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f5f7fa;
            color: #1a1a1a;
        }

        section {
            padding: 50px 40px;
            max-width: 1100px;
            margin: auto;
        }

        h2 {
            color: #0a1a3c;
            font-size: 30px;
            margin-bottom: 20px;
        }

        iframe {
            width: 100%;
            height: 450px;
            border: none;
            border-radius: 8px;
            margin-bottom: 40px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
        }
    </style>
</head>

<body>

<!-- Shared Header -->
<div id="header"></div>
<script>
fetch("header.html")
  .then(res => res.text())
  .then(data => document.getElementById("header").innerHTML = data);
</script>

<section>
    <h2>U.S. Gasoline Price</h2>
    <iframe src="https://www.eia.gov/opendata/v1/embed/iframe.php?api_key=KXFkqy8m6vsXRW215DNxwLKWeQq52XG9kdS4UMLT&series_id=PET.EMM_EPMRR_PTE_NUS_DPG"></iframe>
</section>

<section>
    <h2>U.S. Diesel Price</h2>
    <iframe src="https://www.eia.gov/opendata/v1/embed/iframe.php?api_key=KXFkqy8m6vsXRW215DNxwLKWeQq52XG9kdS4UMLT&series_id=PET.EMD_EPD2D_PTE_NUS_DPG"></iframe>
</section>

<section>
    <h2>U.S. Jet Fuel Price</h2>
    <iframe src="https://www.eia.gov/opendata/v1/embed/iframe.php?api_key=KXFkqy8m6vsXRW215DNxwLKWeQq52XG9kdS4UMLT&series_id=PET.EMJ_EPD2D_PTE_NUS_DPG"></iframe>
</section>

<section>
    <h2>Henry Hub Natural Gas Spot Price</h2>
    <iframe src="https://www.eia.gov/opendata/v1/embed/iframe.php?api_key=KXFkqy8m6vsXRW215DNxwLKWeQq52XG9kdS4UMLT&series_id=NG.RNGWHHD.D"></iframe>
</section>

<!-- Shared Footer -->
<div id="footer"></div>
<script>
fetch("footer.html")
  .then(res => res.text())
  .then(data => document.getElementById("footer").innerHTML = data);
</script>

</body>
</html>
