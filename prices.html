<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Live U.S. energy price charts — gasoline, diesel, jet fuel, and natural gas — powered by EIA Open Data." />
    <title>Energy Prices | Houston CNG Consulting</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f5f7fa;
            color: #1a1a1a;
        }

        section {
            padding: 50px 40px;
            max-width: 1100px;
            margin: auto;
        }

        h2 {
            color: #0a1a3c;
            font-size: 30px;
            margin-bottom: 20px;
        }

        iframe {
            width: 100%;
            height: 450px;
            border: none;
            border-radius: 8px;
            margin-bottom: 40px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
        }
    </style>
</head>

<body>

    <!-- Shared Header -->
    <div id="header"></div>
	
	<section>
        <h2>U.S. Gasoline Price from mydata.csv</h2>
        <canvas id="csvChart" width="600" height="300"></canvas>

    </section>

    <section>
        <h2>U.S. Gasoline Price</h2>
        <iframe
            title="U.S. Gasoline Price — EIA"
            loading="lazy"
            src="https://www.eia.gov/opendata/v1/embed/iframe.php?api_key=KXFkqy8m6vsXRW215DNxwLKWeQq52XG9kdS4UMLT&series_id=PET.EMM_EPMRR_PTE_NUS_DPG">
        </iframe>
    </section>

    <section>
        <h2>U.S. Diesel Price</h2>
        <iframe
            title="U.S. Diesel Price — EIA"
            loading="lazy"
            src="https://www.eia.gov/opendata/v1/embed/iframe.php?api_key=KXFkqy8m6vsXRW215DNxwLKWeQq52XG9kdS4UMLT&series_id=PET.EMD_EPD2D_PTE_NUS_DPG">
        </iframe>
    </section>

    <section>
        <h2>U.S. Jet Fuel Price</h2>
        <iframe
            title="U.S. Jet Fuel Price — EIA"
            loading="lazy"
            src="https://www.eia.gov/opendata/v1/embed/iframe.php?api_key=KXFkqy8m6vsXRW215DNxwLKWeQq52XG9kdS4UMLT&series_id=PET.EMJ_EPD2D_PTE_NUS_DPG">
        </iframe>
    </section>

    <section>
        <h2>Henry Hub Natural Gas Spot Price</h2>
        <iframe
            title="Henry Hub Natural Gas Spot Price — EIA"
            loading="lazy"
            src="https://www.eia.gov/opendata/v1/embed/iframe.php?api_key=KXFkqy8m6vsXRW215DNxwLKWeQq52XG9kdS4UMLT&series_id=NG.RNGWHHD.D">
        </iframe>
    </section>

    <!-- Shared Footer -->
    <div id="footer"></div>

    <script>
        // Load shared header and footer
        ["header", "footer"].forEach(function (id) {
            fetch(id + ".html")
                .then(function (res) { return res.text(); })
                .then(function (data) { document.getElementById(id).innerHTML = data; });
        });
    </script>
	
	<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
async function loadCSVChart() {
    const response = await fetch('/data/mydata.csv');
    const csvText = await response.text();

    const rows = csvText.trim().split('\n').slice(1); // skip header

    const labels = [];
    const values = [];

    rows.forEach(row => {
        const [date, value] = row.split(',');
        labels.push(date);
        values.push(parseFloat(value));
    });

    const ctx = document.getElementById('csvChart').getContext('2d');

    new Chart(ctx, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{
                label: 'CSV Trend',
                data: values,
                borderColor: '#1f77b4',
                backgroundColor: 'rgba(31,119,180,0.2)',
                borderWidth: 2,
                tension: 0.2
            }]
        },
        options: {
            responsive: true,
            scales: {
                x: { title: { display: true, text: 'Date' }},
                y: { title: { display: true, text: 'Value' }}
            }
        }
    });
}

loadCSVChart();
</script>


</body>
</html>
