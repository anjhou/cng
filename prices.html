<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Live U.S. energy price charts — gasoline, diesel, jet fuel, and natural gas — powered by EIA Open Data." />
    <title>Energy Prices | Houston CNG Consulting</title>
	<link rel="stylesheet" href="static/css/global-styles.css">
</head>

<body>

    <!-- Shared Header -->
    <div id="header"></div>
	<script>
	fetch("header.html").then(r=>r.text()).then(d=>document.getElementById("header").innerHTML=d);
	</script>
	
		<div id="csvChart-spinner"></div>
		<canvas id="csvChart"></canvas>

		<div id="multiSeriesChart-spinner"></div>
		<canvas id="multiSeriesChart"></canvas>

		<div id="priceTableContainer"></div>

		
	<section>
        <h2>U.S. Gasoline Price table from prices.csv</h2>
		<div id="priceTableContainer"></div>
    </section>
	
	<section>
        <h2>U.S. Gasoline Price from multiseries.csv</h2>
        <canvas id="multiSeriesChart" width="600" height="300"></canvas>
    </section>
	
	<section>
        <h2>U.S. Gasoline Price from mydata.csv</h2>
        <canvas id="csvChart" width="600" height="300"></canvas>
    </section>

    <section>
        <h2>U.S. Gasoline Price</h2>
        <iframe
            title="U.S. Gasoline Price — EIA"
            loading="lazy"
            src="https://www.eia.gov/opendata/v1/embed/iframe.php?api_key=KXFkqy8m6vsXRW215DNxwLKWeQq52XG9kdS4UMLT&series_id=PET.EMM_EPMRR_PTE_NUS_DPG">
        </iframe>
    </section>

    <section>
        <h2>U.S. Diesel Price</h2>
        <iframe
            title="U.S. Diesel Price — EIA"
            loading="lazy"
            src="https://www.eia.gov/opendata/v1/embed/iframe.php?api_key=KXFkqy8m6vsXRW215DNxwLKWeQq52XG9kdS4UMLT&series_id=PET.EMD_EPD2D_PTE_NUS_DPG">
        </iframe>
    </section>

    <section>
        <h2>U.S. Jet Fuel Price</h2>
        <iframe
            title="U.S. Jet Fuel Price — EIA"
            loading="lazy"
            src="https://www.eia.gov/opendata/v1/embed/iframe.php?api_key=KXFkqy8m6vsXRW215DNxwLKWeQq52XG9kdS4UMLT&series_id=PET.EMJ_EPD2D_PTE_NUS_DPG">
        </iframe>
    </section>

    <section>
        <h2>Henry Hub Natural Gas Spot Price</h2>
        <iframe
            title="Henry Hub Natural Gas Spot Price — EIA"
            loading="lazy"
            src="https://www.eia.gov/opendata/v1/embed/iframe.php?api_key=KXFkqy8m6vsXRW215DNxwLKWeQq52XG9kdS4UMLT&series_id=NG.RNGWHHD.D">
        </iframe>
    </section>

    <!-- Shared Footer -->
    <div id="footer"></div>
	<script>
	fetch("footer.html").then(r=>r.text()).then(d=>document.getElementById("footer").innerHTML=d);
	</script>

    <script>
        // Load shared header and footer
        ["header", "footer"].forEach(function (id) {
            fetch(id + ".html")
                .then(function (res) { return res.text(); })
                .then(function (data) { document.getElementById(id).innerHTML = data; });
        });
    </script>
	
	<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
	
	<script type="module">
			import {
				loadCSVChart,
				loadMultiSeriesChart,
				loadPriceTable
			} from "/static/charts-and-tables.js";

			loadCSVChart("/data/mydata.csv", "csvChart");
			loadMultiSeriesChart("/data/multiseries.csv", "multiSeriesChart");
			loadPriceTable("/data/prices.csv", "priceTableContainer");
	</script>





</body>
</html>
