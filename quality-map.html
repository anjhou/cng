<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Quality Map – Refineries & Airports</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />

  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0b1b33;
      color: #f5f7fa;
    }

    header {
      padding: 0.75rem 1.5rem;
      background: #0f2547;
      border-bottom: 1px solid #2f4768;
    }

    header h1 {
      margin: 0;
      font-size: 1.1rem;
      letter-spacing: 0.04em;
    }

    #map {
      width: 100%;
      height: calc(100vh - 56px);
    }

    .legend {
      background: rgba(11, 27, 51, 0.92);
      padding: 8px 10px;
      border-radius: 4px;
      box-shadow: 0 0 6px rgba(0, 0, 0, 0.4);
      color: #f5f7fa;
      font-size: 0.8rem;
      line-height: 1.4;
    }

    .legend-title {
      font-weight: 600;
      margin-bottom: 4px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .legend-swatch {
      width: 12px;
      height: 12px;
      border-radius: 50%;
    }

    .swatch-refinery {
      background: #ffb347;
      border: 1px solid #c47a1a;
    }

    .swatch-airport {
      background: #4da3ff;
      border: 1px solid #1f5f9e;
    }

    .popup-title {
      font-weight: 600;
      margin-bottom: 2px;
    }

    .popup-type {
      font-size: 0.8rem;
      color: #666;
      margin-bottom: 4px;
    }

    .popup-meta {
      font-size: 0.8rem;
      color: #444;
    }
  </style>
</head>
<body>
  <header>
    <h1>US Refineries & Major Airports – Quality Map</h1>
  </header>

  <div id="map"></div>

  <!-- Leaflet JS -->
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>

  <script>
    // --- Base map ---
    const map = L.map("map", {
      minZoom: 3,
      maxZoom: 10
    }).setView([39.5, -98.35], 4); // Rough center of contiguous US

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19,
      attribution: "&copy; OpenStreetMap contributors"
    }).addTo(map);

    // --- Data: major refineries (sample, not exhaustive) ---
    const refineries = [
      {
        name: "ExxonMobil Baytown Refinery",
        company: "ExxonMobil",
        location: "Baytown, Texas",
        capacity: "≈ 560,000 bbl/d",
        coords: [29.736, -94.977]
      },
      {
        name: "Motiva Port Arthur Refinery",
        company: "Motiva Enterprises",
        location: "Port Arthur, Texas",
        capacity: "≈ 630,000 bbl/d",
        coords: [29.884, -93.939]
      },
      {
        name: "Marathon Galveston Bay Refinery",
        company: "Marathon Petroleum",
        location: "Texas City, Texas",
        capacity: "≈ 585,000 bbl/d",
        coords: [29.383, -94.902]
      },
      {
        name: "ExxonMobil Baton Rouge Refinery",
        company: "ExxonMobil",
        location: "Baton Rouge, Louisiana",
        capacity: "≈ 520,000 bbl/d",
        coords: [30.528, -91.192]
      },
      {
        name: "Chevron Pascagoula Refinery",
        company: "Chevron",
        location: "Pascagoula, Mississippi",
        capacity: "≈ 350,000 bbl/d",
        coords: [30.365, -88.556]
      },
      {
        name: "Phillips 66 Sweeny Refinery",
        company: "Phillips 66",
        location: "Sweeny, Texas",
        capacity: "≈ 265,000 bbl/d",
        coords: [29.044, -95.698]
      },
      {
        name: "Phillips 66 Lake Charles Refinery",
        company: "Phillips 66",
        location: "Westlake, Louisiana",
        capacity: "≈ 260,000 bbl/d",
        coords: [30.255, -93.273]
      },
      {
        name: "Marathon Los Angeles Refinery",
        company: "Marathon Petroleum",
        location: "Carson/Wilmington, California",
        capacity: "≈ 360,000 bbl/d",
        coords: [33.79, -118.24]
      }
    ];

    // --- Data: major airports (sample, not exhaustive) ---
    const airports = [
      {
        name: "Hartsfield–Jackson Atlanta International Airport",
        code: "ATL",
        city: "Atlanta, Georgia",
        coords: [33.6407, -84.4277]
      },
      {
        name: "Los Angeles International Airport",
        code: "LAX",
        city: "Los Angeles, California",
        coords: [33.9416, -118.4085]
      },
      {
        name: "O'Hare International Airport",
        code: "ORD",
        city: "Chicago, Illinois",
        coords: [41.9742, -87.9073]
      },
      {
        name: "Dallas/Fort Worth International Airport",
        code: "DFW",
        city: "Dallas–Fort Worth, Texas",
        coords: [32.8998, -97.0403]
      },
      {
        name: "Denver International Airport",
        code: "DEN",
        city: "Denver, Colorado",
        coords: [39.8561, -104.6737]
      },
      {
        name: "John F. Kennedy International Airport",
        code: "JFK",
        city: "New York City, New York",
        coords: [40.6413, -73.7781]
      },
      {
        name: "George Bush Intercontinental Airport",
        code: "IAH",
        city: "Houston, Texas",
        coords: [29.9902, -95.3368]
      },
      {
        name: "Miami International Airport",
        code: "MIA",
        city: "Miami, Florida",
        coords: [25.7959, -80.2870]
      }
    ];

    // --- Marker styles ---
    function refineryMarker(lat, lng) {
      return L.circleMarker([lat, lng], {
        radius: 7,
        color: "#c47a1a",
        weight: 1,
        fillColor: "#ffb347",
        fillOpacity: 0.9
      });
    }

    function airportMarker(lat, lng) {
      return L.circleMarker([lat, lng], {
        radius: 7,
        color: "#1f5f9e",
        weight: 1,
        fillColor: "#4da3ff",
        fillOpacity: 0.9
      });
    }

    // --- Add refinery markers ---
    refineries.forEach((r) => {
      const marker = refineryMarker(r.coords[0], r.coords[1]).addTo(map);
      const popupHtml = `
        <div class="popup">
          <div class="popup-title">${r.name}</div>
          <div class="popup-type">Refinery – ${r.company}</div>
          <div class="popup-meta">
            <div><strong>Location:</strong> ${r.location}</div>
            <div><strong>Capacity:</strong> ${r.capacity}</div>
          </div>
        </div>
      `;
      marker.bindPopup(popupHtml);
    });

    // --- Add airport markers ---
    airports.forEach((a) => {
      const marker = airportMarker(a.coords[0], a.coords[1]).addTo(map);
      const popupHtml = `
        <div class="popup">
          <div class="popup-title">${a.name} (${a.code})</div>
          <div class="popup-type">Major Commercial Airport</div>
          <div class="popup-meta">
            <div><strong>City:</strong> ${a.city}</div>
          </div>
        </div>
      `;
      marker.bindPopup(popupHtml);
    });

    // --- Legend ---
    const legend = L.control({ position: "bottomleft" });

    legend.onAdd = function () {
      const div = L.DomUtil.create("div", "legend");
      div.innerHTML = `
        <div class="legend-title">Layer Key</div>
        <div class="legend-item">
          <span class="legend-swatch swatch-refinery"></span>
          <span>Major refinery</span>
        </div>
        <div class="legend-item">
          <span class="legend-swatch swatch-airport"></span>
          <span>Major airport</span>
        </div>
      `;
      return div;
    };

    legend.addTo(map);
  </script>
</body>
</html>
