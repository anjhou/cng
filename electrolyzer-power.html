<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Electrolyzer Power Demand Calculator</title>
  <style>
    :root{
      --bg:#f4f7fb; --panel:#ffffff; --ink:#1f2937; --muted:#64748b;
      --blue:#2563eb; --green:#0f766e; --orange:#c2410c; --line:#94a3b8;
      --shadow:0 12px 28px rgba(15,23,42,.12);
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--ink)}
    header{padding:18px 24px;background:#0f172a;color:#fff}
    header h1{margin:0;font-size:22px}
    header p{margin:6px 0 0;color:#cbd5e1;font-size:14px}
    main{max-width:1380px;margin:18px auto;padding:0 14px}
    .panel{background:var(--panel);border-radius:16px;box-shadow:var(--shadow);padding:14px;margin-bottom:16px}
    .svg-wrap{overflow:auto;border-radius:12px;border:1px solid #d8e0ec;background:#eef6ff}
    svg{min-width:1260px;width:100%;height:auto;display:block}
    .unit{fill:#fff;stroke:#334155;stroke-width:2}
    .unit-blue{fill:#dbeafe;stroke:#1d4ed8;stroke-width:2}
    .unit-green{fill:#ccfbf1;stroke:#0f766e;stroke-width:2}
    .unit-orange{fill:#ffedd5;stroke:#c2410c;stroke-width:2}
    .label{font-size:14px;font-weight:700;fill:#111827}
    .small{font-size:12px;fill:#334155}
    .tiny{font-size:11px;fill:#475569}
    .stream{fill:none;stroke:#2563eb;stroke-width:4;marker-end:url(#arrow)}
    .utility{fill:none;stroke:#c2410c;stroke-width:4;marker-end:url(#arrowOrange)}
    .water{fill:none;stroke:#0891b2;stroke-width:4;marker-end:url(#arrowCyan)}
    .h2{fill:none;stroke:#0f766e;stroke-width:4;marker-end:url(#arrowGreen)}
    .o2{fill:none;stroke:#64748b;stroke-width:3;marker-end:url(#arrowGray)}
    foreignObject .svg-card{height:100%;background:rgba(255,255,255,.94);border:1px solid #cbd5e1;border-radius:12px;padding:10px;box-shadow:0 6px 16px rgba(15,23,42,.12)}
    foreignObject h3{margin:0 0 8px;font-size:14px;color:#0f172a;border-bottom:1px solid #dbe4f0;padding-bottom:5px}
    .grid{display:grid;grid-template-columns:1fr 92px;gap:6px 8px;align-items:center}
    label{font-size:12px;color:#334155}
    input,select{width:100%;height:26px;border:1px solid #cbd5e1;border-radius:7px;padding:3px 6px;font-size:12px;background:#fff;color:#0f172a}
    .svg-table{width:100%;border-collapse:collapse;font-size:12px}
    .svg-table th,.svg-table td{border:1px solid #cbd5e1;padding:5px 6px;text-align:right}
    .svg-table th:first-child,.svg-table td:first-child{text-align:left}
    .svg-table th{background:#e2e8f0;color:#0f172a}
    .note{font-size:11px;color:#64748b;margin-top:6px;line-height:1.25}
    .below-grid{display:grid;grid-template-columns:repeat(4,minmax(160px,1fr));gap:12px}
    .metric{border:1px solid #d9e2ef;border-radius:12px;padding:12px;background:#fff}
    .metric div:first-child{font-size:12px;color:#64748b}.metric div:last-child{font-size:20px;font-weight:800;margin-top:5px}
    .tooltip{position:fixed;display:none;pointer-events:none;z-index:50;max-width:290px;background:#111827;color:white;border-radius:9px;padding:9px 10px;font-size:12px;line-height:1.35;box-shadow:0 8px 24px rgba(0,0,0,.28)}
    .hoverable{cursor:help}
    @media(max-width:900px){.below-grid{grid-template-columns:1fr 1fr}header h1{font-size:19px}}
  </style>
</head>
<body>

<div id="header"></div>
<script>
fetch("header.html").then(r=>r.text()).then(d=>document.getElementById("header").innerHTML=d);
</script>
  
    <h1>Electrolyzer Power Demand Calculator</h1>
    <p>Estimate electrolyzer kWh/kg H₂, water demand, DC/AC power requirement, cooling duty, and production operating conditions.</p>
  

  <main>
    <section class="panel svg-wrap">
      <svg viewBox="0 0 1260 720" role="img" aria-label="Electrolyzer power demand SVG flowsheet">
        <defs>
          <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/></marker>
          <marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#c2410c"/></marker>
          <marker id="arrowCyan" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#0891b2"/></marker>
          <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#0f766e"/></marker>
          <marker id="arrowGray" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#64748b"/></marker>
        </defs>

        <rect x="0" y="0" width="1260" height="720" fill="#eef6ff"/>
        <text x="30" y="34" font-size="20" font-weight="800" fill="#0f172a">Electrolyzer System Power & Water Balance</text>

        <!-- SVG input cards -->
        <foreignObject x="28" y="58" width="288" height="245">
          <div xmlns="http://www.w3.org/1999/xhtml" class="svg-card">
            <h3>Calculation Inputs</h3>
            <div class="grid">
              <label for="h2Rate">H₂ production, kg/h</label><input id="h2Rate" type="number" value="1000" step="10" />
              <label for="secKwh">Specific energy, kWh/kg H₂</label><input id="secKwh" type="number" value="52" step="0.1" />
              <label for="stackEff">Stack efficiency, % LHV</label><input id="stackEff" type="number" value="64" step="0.1" />
              <label for="bosLoss">BOP / rectifier loss, %</label><input id="bosLoss" type="number" value="8" step="0.1" />
              <label for="waterFactor">Water use, kg/kg H₂</label><input id="waterFactor" type="number" value="10.0" step="0.1" />
              <label for="opPressure">H₂ product pressure, barg</label><input id="opPressure" type="number" value="30" step="1" />
              <label for="opTemp">Stack temperature, °C</label><input id="opTemp" type="number" value="70" step="1" />
            </div>
            <div class="note">Stoichiometric water = 9.0 kg/kg H₂. Default includes purification and blowdown allowance.</div>
          </div>
        </foreignObject>

        <foreignObject x="932" y="58" width="300" height="245">
          <div xmlns="http://www.w3.org/1999/xhtml" class="svg-card">
            <h3>Calculated Outputs</h3>
            <table class="svg-table">
              <tbody>
                <tr><th>Result</th><th>Value</th></tr>
                <tr><td>Power demand</td><td id="svgPowerMw">-</td></tr>
                <tr><td>Energy intensity</td><td id="svgKwhKg">-</td></tr>
                <tr><td>Water demand</td><td id="svgWater">-</td></tr>
                <tr><td>O₂ byproduct</td><td id="svgO2">-</td></tr>
                <tr><td>Cooling duty</td><td id="svgCooling">-</td></tr>
                <tr><td>Daily H₂</td><td id="svgDailyH2">-</td></tr>
              </tbody>
            </table>
            <div class="note">Power includes BOP / rectifier loss. Cooling duty is screening estimate from losses versus H₂ LHV.</div>
          </div>
        </foreignObject>

        <!-- Equipment -->
        <rect class="unit hoverable" data-tip="Water treatment package WT-101<br/>Produces demineralized water for electrolyzer feed.<br/>Flow updates with selected H₂ production rate." x="120" y="395" width="150" height="78" rx="12"/>
        <text class="label" x="154" y="426">WT-101</text><text class="small" x="141" y="447">DM Water Unit</text>

        <rect class="unit-blue hoverable" data-tip="Power conversion unit REC-101<br/>Converts AC grid/renewable power to DC stack power.<br/>Includes rectifier and BOP electrical losses." x="380" y="120" width="170" height="88" rx="12"/>
        <text class="label" x="418" y="153">REC-101</text><text class="small" x="408" y="176">AC/DC Rectifier</text>

        <rect class="unit-green hoverable" data-tip="Electrolyzer stack EL-101<br/>Consumes demineralized water and DC power to produce H₂ and O₂.<br/>Operating conditions update from input values." x="455" y="340" width="250" height="145" rx="16"/>
        <text class="label" x="530" y="382">EL-101</text><text class="small" x="508" y="405">Electrolyzer Stack</text>
        <text class="tiny" id="stackCond" x="488" y="431">T: - °C | P: - barg</text>
        <text class="tiny" id="stackRate" x="488" y="451">H₂: - kg/h</text>

        <rect class="unit hoverable" data-tip="Gas-liquid separator SEP-101<br/>Separates produced H₂ from water carryover before drying/polishing." x="790" y="330" width="145" height="118" rx="18"/>
        <text class="label" x="830" y="374">SEP-101</text><text class="small" x="816" y="397">H₂ Separator</text>

        <rect class="unit-orange hoverable" data-tip="Cooling loop CL-101<br/>Rejects stack and electrical heat losses. Cooling duty is a screening estimate." x="510" y="570" width="170" height="70" rx="12"/>
        <text class="label" x="552" y="600">CL-101</text><text class="small" x="543" y="621">Cooling Loop</text>

        <rect class="unit-green hoverable" data-tip="Hydrogen product battery limit<br/>Dry H₂ product at selected production pressure." x="1010" y="338" width="165" height="92" rx="14"/>
        <text class="label" x="1040" y="372">H₂ Product</text><text class="small" id="h2ProductCond" x="1034" y="395">- kg/h | - barg</text>

        <rect class="unit hoverable" data-tip="Oxygen vent/byproduct<br/>O₂ production is calculated from stoichiometry: 8 kg O₂ per 1 kg H₂." x="755" y="170" width="150" height="70" rx="12"/>
        <text class="label" x="792" y="200">O₂ Vent</text><text class="small" id="o2VentCond" x="782" y="221">- kg/h</text>

        <!-- Lines -->
        <path class="utility hoverable" data-tip="Electrical power supply<br/>AC power to rectifier. Displayed power includes stack and BOP electrical demand." d="M340 165 L380 165"/>
        <text class="tiny" id="powerLineLabel" x="244" y="157">Power: - MW AC</text>

        <path class="utility hoverable" data-tip="DC power to electrolyzer stack<br/>Specific energy and stack efficiency determine the main electrical load." d="M550 165 C630 165 580 300 580 340"/>
        <text class="tiny" id="dcLineLabel" x="580" y="235">DC: - MW</text>

        <path class="water hoverable" data-tip="Demineralized water feed stream<br/>Water demand is calculated from kg water per kg H₂ input." d="M270 434 L455 434"/>
        <text class="tiny" id="waterLineLabel" x="300" y="420">DM water: - kg/h</text>

        <path class="h2 hoverable" data-tip="Wet hydrogen stream from electrolyzer to separator<br/>Flow equals selected H₂ production rate before product polishing." d="M705 386 L790 386"/>
        <text class="tiny" id="wetH2Label" x="710" y="374">Wet H₂: - kg/h</text>

        <path class="h2 hoverable" data-tip="Hydrogen product stream<br/>Dry H₂ flow and pressure are displayed at product battery limit." d="M935 386 L1010 386"/>
        <text class="tiny" id="dryH2Label" x="942" y="372">Dry H₂</text>

        <path class="o2 hoverable" data-tip="Oxygen byproduct stream<br/>Stoichiometric oxygen generation equals 8 kg O₂ per kg H₂." d="M645 340 C670 245 735 205 755 205"/>
        <text class="tiny" id="o2LineLabel" x="650" y="275">O₂: - kg/h</text>

        <path class="utility hoverable" data-tip="Cooling water or closed-loop cooling duty<br/>Estimated heat rejection from electrical losses not retained as H₂ LHV." d="M590 485 L590 570"/>
        <text class="tiny" id="coolingLineLabel" x="602" y="535">Cooling: - MWth</text>

        <!-- Summary strip -->
        <foreignObject x="342" y="535" width="575" height="94">
          <div xmlns="http://www.w3.org/1999/xhtml" class="svg-card">
            <h3>Electrolyzer Screening Summary</h3>
            <table class="svg-table">
              <tbody>
                <tr><th>Metric</th><th>Value</th><th>Basis</th></tr>
                <tr><td>AC Power</td><td id="stripPower">-</td><td>Specific energy × H₂ rate × BOP loss</td></tr>
                <tr><td>Water Demand</td><td id="stripWater">-</td><td>Input water factor × H₂ rate</td></tr>
              </tbody>
            </table>
          </div>
        </foreignObject>
      </svg>
    </section>

    <section class="panel below-grid" aria-label="calculation result cards">
      <div class="metric"><div>AC Power Requirement</div><div id="cardPower">-</div></div>
      <div class="metric"><div>Specific Energy</div><div id="cardSec">-</div></div>
      <div class="metric"><div>Water Demand</div><div id="cardWater">-</div></div>
      <div class="metric"><div>O₂ Byproduct</div><div id="cardO2">-</div></div>
    </section>
  </main>

  <div id="tooltip" class="tooltip"></div>

  <script>
    const LHV_H2_KWH_PER_KG = 33.33;
    const $ = id => document.getElementById(id);
    const fmt = (v, d=1) => Number.isFinite(v) ? v.toLocaleString(undefined,{maximumFractionDigits:d,minimumFractionDigits:d}) : '-';
    const val = id => Number($(id).value) || 0;

    function calculate(){
      const h2 = Math.max(0, val('h2Rate'));
      const sec = Math.max(0, val('secKwh'));
      const stackEff = Math.max(1, val('stackEff'));
      const bop = Math.max(0, val('bosLoss')) / 100;
      const waterFactor = Math.max(9, val('waterFactor'));
      const p = val('opPressure');
      const t = val('opTemp');

      const stackPowerMW = h2 * sec / 1000;
      const acPowerMW = stackPowerMW * (1 + bop);
      const waterKgH = h2 * waterFactor;
      const waterGpm = waterKgH * 2.20462 / 8.3454 / 60;
      const o2KgH = h2 * 8.0;
      const h2Tpd = h2 * 24 / 1000;
      const effectiveSec = sec * (1 + bop);
      const lhvPowerMW = h2 * LHV_H2_KWH_PER_KG / 1000;
      const coolingMW = Math.max(0, acPowerMW - lhvPowerMW);
      const impliedSecFromEff = LHV_H2_KWH_PER_KG / (stackEff/100);

      $('svgPowerMw').textContent = `${fmt(acPowerMW,2)} MW AC`;
      $('svgKwhKg').textContent = `${fmt(effectiveSec,1)} kWh/kg`;
      $('svgWater').textContent = `${fmt(waterKgH,0)} kg/h (${fmt(waterGpm,1)} gpm)`;
      $('svgO2').textContent = `${fmt(o2KgH,0)} kg/h`;
      $('svgCooling').textContent = `${fmt(coolingMW,2)} MWth`;
      $('svgDailyH2').textContent = `${fmt(h2Tpd,1)} t/d`;

      $('stackCond').textContent = `T: ${fmt(t,0)} °C | P: ${fmt(p,0)} barg`;
      $('stackRate').textContent = `H₂: ${fmt(h2,0)} kg/h | SEC: ${fmt(sec,1)} kWh/kg`;
      $('h2ProductCond').textContent = `${fmt(h2,0)} kg/h | ${fmt(p,0)} barg`;
      $('o2VentCond').textContent = `${fmt(o2KgH,0)} kg/h`;
      $('powerLineLabel').textContent = `Power: ${fmt(acPowerMW,2)} MW AC`;
      $('dcLineLabel').textContent = `DC: ${fmt(stackPowerMW,2)} MW`;
      $('waterLineLabel').textContent = `DM water: ${fmt(waterKgH,0)} kg/h (${fmt(waterGpm,1)} gpm)`;
      $('wetH2Label').textContent = `Wet H₂: ${fmt(h2,0)} kg/h`;
      $('o2LineLabel').textContent = `O₂: ${fmt(o2KgH,0)} kg/h`;
      $('coolingLineLabel').textContent = `Cooling: ${fmt(coolingMW,2)} MWth`;
      $('stripPower').textContent = `${fmt(acPowerMW,2)} MW AC / ${fmt(effectiveSec,1)} kWh/kg`;
      $('stripWater').textContent = `${fmt(waterKgH,0)} kg/h / ${fmt(waterGpm,1)} gpm`;

      $('cardPower').textContent = `${fmt(acPowerMW,2)} MW`;
      $('cardSec').textContent = `${fmt(effectiveSec,1)} kWh/kg`;
      $('cardWater').textContent = `${fmt(waterKgH,0)} kg/h`;
      $('cardO2').textContent = `${fmt(o2KgH,0)} kg/h`;

      document.querySelector('[data-tip^="Electrolyzer stack"]').dataset.tip =
        `Electrolyzer stack EL-101<br/>H₂ production: ${fmt(h2,0)} kg/h (${fmt(h2Tpd,1)} t/d)<br/>Stack energy: ${fmt(sec,1)} kWh/kg H₂<br/>Implied SEC from efficiency: ${fmt(impliedSecFromEff,1)} kWh/kg H₂<br/>T: ${fmt(t,0)} °C | P: ${fmt(p,0)} barg`;
      document.querySelector('[data-tip^="Power conversion"]').dataset.tip =
        `Power conversion unit REC-101<br/>Stack DC power: ${fmt(stackPowerMW,2)} MW<br/>AC power with BOP loss: ${fmt(acPowerMW,2)} MW<br/>BOP / rectifier loss: ${fmt(bop*100,1)}%`;
    }

    document.querySelectorAll('input,select').forEach(el => el.addEventListener('input', calculate));
    calculate();

    const tip = $('tooltip');
    document.querySelectorAll('.hoverable').forEach(el => {
      el.addEventListener('mousemove', e => {
        tip.innerHTML = el.dataset.tip || '';
        tip.style.display = 'block';
        tip.style.left = (e.clientX + 14) + 'px';
        tip.style.top = (e.clientY + 14) + 'px';
      });
      el.addEventListener('mouseleave', () => tip.style.display = 'none');
    });
  </script>
  
  <div id="footer"></div>
<script>
fetch("footer.html").then(r=>r.text()).then(d=>document.getElementById("footer").innerHTML=d);
</script>

</body>
</html>
