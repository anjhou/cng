<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plot Equation</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
	<div id="header"></div>
	
    <h2>Plot exp(-k·x) from 0 to 1</h2>

    <div style="margin: 20px 0;">
        <label for="kInput">Enter k (e.g., 0.5 to 5): </label>
        <input type="number" id="kInput" min="0" step="0.1" value="2.72">
        <button id="updateBtn">Redraw Curve</button>
    </div>

    <canvas id="expPlot" width="600" height="350"></canvas>
	
	<h2>Temperature Conversion Chart</h2>
	<canvas id="tempChart" width="100%" height="400"></canvas>
	<script type="module">
    import { renderTemperatureChart } from "/scripts/script.js";
    renderTemperatureChart("tempChart");
	</script>


	<div id="footer"></div>
    <script src="/scripts/script.js"></script>
</body>
</html>
