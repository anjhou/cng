<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Engineering Charts</title>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Shared header -->
    <div id="header"></div>
    <script>
        fetch("header.html")
            .then(r => r.text())
            .then(t => document.getElementById("header").innerHTML = t);
    </script>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            transition: background 0.3s, color 0.3s;
        }

        /* Dark Mode */
        body.dark {
            background: #121212;
            color: #e0e0e0;
        }
        body.dark .tab {
            background: #1e1e1e;
            color: #ccc;
        }
        body.dark .tab.active {
            background: #333;
            color: #fff;
        }
        body.dark canvas {
            background: #1a1a1a;
        }

        /* Tabs */
        .tab-container {
            display: flex;
            border-bottom: 2px solid #ccc;
        }
        .tab {
            padding: 12px 20px;
            cursor: pointer;
            border-right: 1px solid #ccc;
            background: #f5f5f5;
            transition: background 0.2s;
        }
        .tab:hover {
            background: #e8e8e8;
        }
        .tab.active {
            background: #ddd;
            font-weight: bold;
        }

        /* Content */
        .tab-content {
            display: none;
            padding: 20px;
        }
        .tab-content.active {
            display: block;
        }

        /* Controls */
        .control-panel {
            margin: 15px 0;
        }
        .control-panel input {
            padding: 5px;
        }
        .control-panel button {
            padding: 6px 12px;
        }

        /* Dark Mode Toggle */
        .dark-toggle {
            position: fixed;
            top: 15px;
            right: 20px;
            cursor: pointer;
            padding: 8px 14px;
            background: #444;
            color: #fff;
            border-radius: 6px;
            font-size: 14px;
        }
        body.dark .dark-toggle {
            background: #ddd;
            color: #000;
        }
    </style>
</head>

<body>

<div class="dark-toggle" id="darkToggle">Dark Mode</div>

<!-- ========================= -->
<!-- TAB HEADERS -->
<!-- ========================= -->
<div class="tab-container">
    <div class="tab active" data-tab="expTab">Exponential Decay</div>
    <div class="tab" data-tab="tempTab">Temperature Conversion</div>
    <div class="tab" data-tab="csvTab">CSV Multi‑Series</div>
</div>

<!-- ========================= -->
<!-- TAB 1: EXPONENTIAL DECAY -->
<!-- ========================= -->
<div id="expTab" class="tab-content active">
    <h2>Exponential Decay: exp(-k·x)</h2>

    <div class="control-panel">
        <label for="kInput">k value:</label>
        <input type="number" id="kInput" value="2.72" step="0.1">
        <button id="updateBtn">Update</button>
    </div>

    <canvas id="expChart" width="600" height="400"></canvas>
</div>

<!-- ========================= -->
<!-- TAB 2: TEMPERATURE CHART -->
<!-- ========================= -->
<div id="tempTab" class="tab-content">
    <h2>Temperature Conversion Chart</h2>
    <canvas id="tempChart" width="600" height="400"></canvas>
</div>

<!-- ========================= -->
<!-- TAB 3: CSV MULTI‑SERIES -->
<!-- ========================= -->
<div id="csvTab" class="tab-content">
    <h2>CSV Multi‑Series Chart</h2>

    <div class="control-panel">
        <label for="csvFileInput">Upload CSV:</label>
        <input type="file" id="csvFileInput" accept=".csv">
    </div>

    <canvas id="csvChart" width="600" height="400"></canvas>
</div>

<!-- Shared footer -->
<div id="footer"></div>
<script>
    fetch("footer.html")
        .then(r => r.text())
        .then(t => document.getElementById("footer").innerHTML = t);
</script>

<!-- ========================= -->
<!-- TAB + DARK MODE LOGIC -->
<!-- ========================= -->
<script>
    // Tab switching
    document.querySelectorAll(".tab").forEach(tab => {
        tab.addEventListener("click", () => {
            document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
            document.querySelectorAll(".tab-content").forEach(c => c.classList.remove("active"));

            tab.classList.add("active");
            document.getElementById(tab.dataset.tab).classList.add("active");
        });
    });

    // Dark Mode toggle
    const toggle = document.getElementById("darkToggle");
    toggle.addEventListener("click", () => {
        document.body.classList.toggle("dark");
        toggle.textContent = document.body.classList.contains("dark")
            ? "Light Mode"
            : "Dark Mode";
    });
</script>

<!-- ========================= -->
<!-- LOAD YOUR CHART MODULES -->
<!-- ========================= -->
<script type="module">
    import { 
        renderExpCurve,
        renderTemperatureChart,
        renderMultiSeriesCSV
    } from "./engineeringCharts.js";

    renderExpCurve("expChart", "kInput", "updateBtn");
    renderTemperatureChart("tempChart");
    renderMultiSeriesCSV("csvChart", "csvFileInput");
</script>

</body>
</html>
