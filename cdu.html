<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CDU SVG Flowsheet</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f4f7fb;
    color:#1f2937;
}

header{
    background:#0f172a;
    color:white;
    padding:18px 30px;
    text-align:center;
}

.container{
    max-width:1400px;
    margin:auto;
    padding:25px;
}

.panel{
    background:white;
    border-radius:14px;
    box-shadow:0 8px 24px rgba(0,0,0,0.10);
    padding:20px;
    margin-bottom:25px;
}

svg{
    width:100%;
    height:auto;
    background:#ffffff;
    border-radius:12px;
    border:1px solid #dbeafe;
}

/* Equipment */
.equipment{
    fill:#ffffff;
    stroke:#2563eb;
    stroke-width:2.5;
}

.duty-equipment{
    fill:#ffffff;
    stroke:#dc2626;
    stroke-width:3;
}

.column-body{
    fill:#ffffff;
    stroke:#2563eb;
    stroke-width:3;
}

.tray{
    stroke:#64748b;
    stroke-width:1.4;
}

.pipe{
    fill:none;
    stroke:#334155;
    stroke-width:5;
    stroke-linecap:round;
    stroke-linejoin:round;
}
.flow{
    fill:none;
    stroke:#0ea5e9;
    stroke-width:5;
    stroke-dasharray:12 10;
    stroke-linecap:round;
    stroke-linejoin:round;
    animation:flowMove 1s linear infinite;
    marker-end:url(#flowArrow);
}

.product-flow{
    fill:none;
    stroke:#16a34a;
    stroke-width:5;
    stroke-dasharray:12 10;
    stroke-linecap:round;
    stroke-linejoin:round;
    animation:flowMove 1.2s linear infinite;
    marker-end:url(#productArrow);
}

.hot-flow{
    fill:none;
    stroke:#ef4444;
    stroke-width:5;
    stroke-dasharray:12 10;
    stroke-linecap:round;
    stroke-linejoin:round;
    animation:flowMove 1s linear infinite;
    marker-end:url(#hotArrow);
}

.bottom-flow{
    fill:none;
    stroke:#92400e;
    stroke-width:5;
    stroke-dasharray:12 10;
    stroke-linecap:round;
    stroke-linejoin:round;
    animation:flowMove 1.4s linear infinite;
    marker-end:url(#bottomArrow);
}


@keyframes flowMove{
    to{stroke-dashoffset:-44;}
}

.label{
    font-size:13px;
    fill:#111827;
    font-weight:bold;
}

.small-label{
    font-size:11px;
    fill:#374151;
}

.stream-label{
    font-size:12px;
    fill:#111827;
}

.tooltip-target{
    cursor:pointer;
}

.tooltip-target:hover{
    filter:drop-shadow(0 0 5px rgba(37,99,235,.6));
}

/* Tooltip */
#tooltip{
    position:fixed;
    display:none;
    max-width:280px;
    background:#0f172a;
    color:white;
    padding:10px 12px;
    border-radius:8px;
    font-size:12px;
    line-height:1.45;
    z-index:9999;
    box-shadow:0 8px 22px rgba(0,0,0,.25);
    pointer-events:none;
}

#tooltip strong{
    color:#93c5fd;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:10px;
}

th,td{
    border:1px solid #cbd5e1;
    padding:8px;
    text-align:center;
}

th{
    background:#1e293b;
    color:white;
}

input{
    width:95%;
    padding:6px;
    border:1px solid #94a3b8;
    border-radius:5px;
}

button{
    margin-top:12px;
    padding:10px 18px;
    border:none;
    background:#0f172a;
    color:white;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

.summary{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:12px;
    margin-top:15px;
}

.card{
    background:#f8fafc;
    border-left:6px solid #2563eb;
    padding:12px;
    border-radius:8px;
}
</style>
</head>

<body>

<header>
    <h1>Crude Distillation Unit SVG Flowsheet</h1>
</header>

<div id="tooltip"></div>

<div class="container">

<div class="panel">
<h2>CDU Flowsheet</h2>

<svg viewBox="0 0 1300 720">

<!-- arrow head -->

<defs>
    <!-- Arrowhead markers: stroke-width based so arrows align with 5 px stream centerlines -->
    <marker id="flowArrow"
            viewBox="0 0 8 8"
            markerWidth="3"
            markerHeight="3"
            refX="7.2"
            refY="4"
            orient="auto"
            markerUnits="strokeWidth">
        <path d="M0,0 L8,4 L0,8 Z" fill="#0ea5e9"></path>
    </marker>

    <marker id="productArrow"
            viewBox="0 0 8 8"
            markerWidth="3"
            markerHeight="3"
            refX="7.2"
            refY="4"
            orient="auto"
            markerUnits="strokeWidth">
        <path d="M0,0 L8,4 L0,8 Z" fill="#16a34a"></path>
    </marker>

    <marker id="hotArrow"
            viewBox="0 0 8 8"
            markerWidth="3"
            markerHeight="3"
            refX="7.2"
            refY="4"
            orient="auto"
            markerUnits="strokeWidth">
        <path d="M0,0 L8,4 L0,8 Z" fill="#ef4444"></path>
    </marker>

    <marker id="bottomArrow"
            viewBox="0 0 8 8"
            markerWidth="3"
            markerHeight="3"
            refX="7.2"
            refY="4"
            orient="auto"
            markerUnits="strokeWidth">
        <path d="M0,0 L8,4 L0,8 Z" fill="#92400e"></path>
    </marker>
</defs>

<!--  -->

    <!-- Feed Furnace -->
    <rect x="70" y="390" width="130" height="95" rx="12"
          class="duty-equipment tooltip-target"
          data-name="Crude Furnace"
          data-type="Fired Heater"
          data-condition="650°F / 25 psig outlet"
          data-flow="125 MBPD crude"
          data-duty="Estimated duty: 285 MMBtu/hr"/>
    <text x="105" y="425" class="label">Furnace</text>
    <text x="95" y="445" class="small-label">Crude Heater</text>

    <!-- Crude Feed Line -->
    <path d="M20 440 H62" class="pipe" />
    <path d="M20 440 H62" class="hot-flow tooltip-target"
          data-name="Crude Feed"
          data-type="Process Stream"
          data-condition="250°F / 60 psig"
          data-flow="125 MBPD"
          data-duty="Preheated crude to furnace"/>
    <text x="20" y="420" class="stream-label">Crude Feed</text>

    <!-- Furnace to Column -->
    <path d="M200 440 H422" class="pipe"/>
    <path d="M200 440 H422" class="hot-flow tooltip-target"
          data-name="Heated Crude"
          data-type="Process Stream"
          data-condition="650°F / 25 psig"
          data-flow="125 MBPD"
          data-duty="Furnace outlet to flash zone"/>
    <text x="245" y="420" class="stream-label" id="feedLabel">Crude: 650°F / 25 psig</text>

    <!-- Column -->
    <rect x="430" y="120" width="160" height="480" rx="75"
          class="column-body tooltip-target"
          data-name="Crude Distillation Column"
          data-type="Atmospheric Fractionator"
          data-condition="Top: 110°F / 20 psig | Bottom: 720°F / 8 psig"
          data-flow="125 MBPD crude feed"
          data-duty="Separation by vapor-liquid fractionation"/>
    <text x="456" y="105" class="label">Crude Distillation Column</text>

    <!-- Trays -->
    <line x1="450" y1="180" x2="570" y2="180" class="tray"/>
    <line x1="450" y1="230" x2="570" y2="230" class="tray"/>
    <line x1="450" y1="280" x2="570" y2="280" class="tray"/>
    <line x1="450" y1="330" x2="570" y2="330" class="tray"/>
    <line x1="450" y1="380" x2="570" y2="380" class="tray"/>
    <line x1="450" y1="430" x2="570" y2="430" class="tray"/>
    <line x1="450" y1="480" x2="570" y2="480" class="tray"/>
    <line x1="450" y1="530" x2="570" y2="530" class="tray"/>

    <!-- Overhead to condenser -->
    <path d="M510 120 V60 H752" class="pipe"/>
    <path d="M510 120 V60 H752" class="product-flow tooltip-target"
          data-name="Column Overhead Vapor"
          data-type="Process Stream"
          data-condition="220°F / 22 psig"
          data-flow="LPG + light ends"
          data-duty="Condenser feed"/>

    <!-- Condenser -->
    <rect x="760" y="30" width="140" height="65" rx="12"
          class="duty-equipment tooltip-target"
          data-name="Overhead Condenser"
          data-type="Heat Exchanger"
          data-condition="Outlet: 110°F / 45 psig"
          data-flow="LPG and overhead condensate"
          data-duty="Estimated duty: -85 MMBtu/hr"/>
    <text x="790" y="58" class="label">Condenser</text>

    <!-- LPG Product -->
    <path d="M900 62 H1180" class="pipe"/>
    <path d="M900 62 H1180" class="product-flow tooltip-target"
          data-name="LPG Product"
          data-type="Product Stream"
          data-condition="110°F / 45 psig"
          data-flow="5.0 MBPD"
          data-duty="Overhead light product"/>
    <text x="965" y="42" class="stream-label" id="lpgLabel">LPG: 110°F / 45 psig</text>
    <text x="1120" y="82" class="label" id="lpgVol">5 MBPD</text>

    <!-- Reflux Pump -->
    <circle cx="790" cy="145" r="32"
            class="duty-equipment tooltip-target"
            data-name="Reflux Pump"
            data-type="Centrifugal Pump"
            data-condition="110°F / 45 psig discharge"
            data-flow="Reflux circulation"
            data-duty="Estimated hydraulic power: 75 hp"/>
    <text x="763" y="150" class="small-label">Reflux Pump</text>

    <path d="M820 145 H880 V110 H598" class="pipe"/>
    <path d="M820 145 H880 V110 H598" class="flow tooltip-target"
          data-name="Reflux Stream"
          data-type="Internal Reflux"
          data-condition="110°F / 45 psig"
          data-flow="Controlled reflux to column top"
          data-duty="Maintains overhead temperature"/>
    <text x="705" y="128" class="stream-label">Reflux</text>

    <!-- Side Draws -->
    <path d="M590 210 H1180" class="pipe"/>
    <path d="M590 210 H1180" class="product-flow tooltip-target"
          data-name="Light Naphtha"
          data-type="Product Stream"
          data-condition="180°F / 20 psig"
          data-flow="15 MBPD"
          data-duty="Side draw product"/>
    <text x="690" y="190" class="stream-label" id="lnLabel">Light Naphtha: 180°F / 20 psig</text>
    <text x="1120" y="230" class="label" id="lnVol">15 MBPD</text>

    <path d="M590 285 H1180" class="pipe"/>
    <path d="M590 285 H1180" class="product-flow tooltip-target"
          data-name="Heavy Naphtha"
          data-type="Product Stream"
          data-condition="280°F / 18 psig"
          data-flow="18 MBPD"
          data-duty="Side draw product"/>
    <text x="690" y="265" class="stream-label" id="hnLabel">Heavy Naphtha: 280°F / 18 psig</text>
    <text x="1120" y="305" class="label" id="hnVol">18 MBPD</text>

    <path d="M590 365 H1180" class="pipe"/>
    <path d="M590 365 H1180" class="product-flow tooltip-target"
          data-name="Distillate"
          data-type="Product Stream"
          data-condition="420°F / 15 psig"
          data-flow="25 MBPD"
          data-duty="Kerosene / diesel range product"/>
    <text x="690" y="345" class="stream-label" id="distLabel">Distillate: 420°F / 15 psig</text>
    <text x="1120" y="385" class="label" id="distVol">25 MBPD</text>

    <path d="M590 445 H1180" class="pipe"/>
    <path d="M590 445 H1180" class="product-flow tooltip-target"
          data-name="Gas Oil"
          data-type="Product Stream"
          data-condition="560°F / 12 psig"
          data-flow="22 MBPD"
          data-duty="Atmospheric gas oil product"/>
    <text x="690" y="425" class="stream-label" id="goLabel">Gas Oil: 560°F / 12 psig</text>
    <text x="1120" y="465" class="label" id="goVol">22 MBPD</text>

    <path d="M590 525 H1180" class="pipe"/>
    <path d="M590 525 H1180" class="bottom-flow tooltip-target"
          data-name="Fuel Oil"
          data-type="Product Stream"
          data-condition="680°F / 10 psig"
          data-flow="10 MBPD"
          data-duty="Heavy side draw product"/>
    <text x="690" y="505" class="stream-label" id="foLabel">Fuel Oil: 680°F / 10 psig</text>
    <text x="1120" y="545" class="label" id="foVol">10 MBPD</text>

    <!-- Bottom Pump -->
    <circle cx="510" cy="650" r="34"
            class="duty-equipment tooltip-target"
            data-name="Bottom Pump"
            data-type="Residue Pump"
            data-condition="720°F / 8 psig suction"
            data-flow="Residue product"
            data-duty="Estimated hydraulic power: 110 hp"/>
    <text x="482" y="655" class="small-label">Bottom Pump</text>

    <path d="M510 600 V610" class="pipe"/>
    <path d="M510 600 V610" class="bottom-flow tooltip-target"
          data-name="Column Bottoms"
          data-type="Bottoms Stream"
          data-condition="720°F / 8 psig"
          data-flow="Residue to bottom pump"
          data-duty="Hot atmospheric residue"/>

    <!-- Residue Product -->
    <path d="M544 650 H1180" class="pipe"/>
    <path d="M544 650 H1180" class="bottom-flow tooltip-target"
          data-name="Residue"
          data-type="Product Stream"
          data-condition="720°F / 8 psig"
          data-flow="30 MBPD"
          data-duty="Atmospheric residue product"/>
    <text x="690" y="630" class="stream-label" id="resLabel">Residue: 720°F / 8 psig</text>
    <text x="1120" y="670" class="label" id="resVol">30 MBPD</text>

    <!-- Reboiler -->
    <rect x="250" y="565" width="140" height="75" rx="12"
          class="duty-equipment tooltip-target"
          data-name="Reboiler"
          data-type="Bottom Reboiler"
          data-condition="720°F / 10 psig"
          data-flow="Bottom liquid circulation"
          data-duty="Estimated duty: 95 MMBtu/hr"/>
    <text x="290" y="595" class="label">Reboiler</text>

    <path d="M430 560 H398" class="pipe"/>
    <path d="M430 560 H398" class="hot-flow tooltip-target"
          data-name="Reboiler Draw"
          data-type="Process Stream"
          data-condition="700°F / 10 psig"
          data-flow="Bottom liquid to reboiler"
          data-duty="Reboiler circulation"/>

    <path d="M250 600 H200 V500 H422" class="pipe"/>
    <path d="M250 600 H200 V500 H422" class="hot-flow tooltip-target"
          data-name="Reboil Return"
          data-type="Process Stream"
          data-condition="730°F / 10 psig"
          data-flow="Vapor-liquid return to column"
          data-duty="Heat returned to bottom section"/>
    <text x="220" y="545" class="stream-label">Reboil Return</text>

</svg>
</div>

<div class="panel">
<h2>Input Table</h2>

<table>
<thead>
<tr>
    <th>Parameter</th>
    <th>Value</th>
    <th>Unit</th>
</tr>
</thead>
<tbody>
<tr><td>Crude Feed Rate</td><td><input id="feedRate" type="number" value="125"></td><td>MBPD</td></tr>
<tr><td>Feed Temperature</td><td><input id="feedTemp" type="number" value="650"></td><td>°F</td></tr>
<tr><td>Feed Pressure</td><td><input id="feedPress" type="number" value="25"></td><td>psig</td></tr>
<tr><td>LPG Yield</td><td><input id="lpgYield" type="number" value="4"></td><td>vol%</td></tr>
<tr><td>Light Naphtha Yield</td><td><input id="lnYield" type="number" value="12"></td><td>vol%</td></tr>
<tr><td>Heavy Naphtha Yield</td><td><input id="hnYield" type="number" value="14"></td><td>vol%</td></tr>
<tr><td>Distillate Yield</td><td><input id="distYield" type="number" value="20"></td><td>vol%</td></tr>
<tr><td>Gas Oil Yield</td><td><input id="goYield" type="number" value="18"></td><td>vol%</td></tr>
<tr><td>Fuel Oil Yield</td><td><input id="foYield" type="number" value="8"></td><td>vol%</td></tr>
<tr><td>Residue Yield</td><td><input id="resYield" type="number" value="24"></td><td>vol%</td></tr>
</tbody>
</table>

<button onclick="updateCDU()">Update Flowsheet</button>

<div class="summary" id="summaryCards"></div>
</div>

</div>

<script>
function value(id){
    return Number(document.getElementById(id).value) || 0;
}

function productVolume(feed, yieldPercent){
    return feed * yieldPercent / 100;
}

function updateTooltipFlow(streamName, newFlow){
    document.querySelectorAll(".tooltip-target").forEach(el=>{
        if(el.dataset.name === streamName){
            el.dataset.flow = `${newFlow.toFixed(1)} MBPD`;
        }
    });
}

function updateCDU(){
    const feed = value("feedRate");
    const feedTemp = value("feedTemp");
    const feedPress = value("feedPress");

    const products = [
        {id:"lpg", name:"LPG Product", label:"LPG", yield:value("lpgYield"), temp:110, press:45},
        {id:"ln", name:"Light Naphtha", label:"Light Naphtha", yield:value("lnYield"), temp:180, press:20},
        {id:"hn", name:"Heavy Naphtha", label:"Heavy Naphtha", yield:value("hnYield"), temp:280, press:18},
        {id:"dist", name:"Distillate", label:"Distillate", yield:value("distYield"), temp:420, press:15},
        {id:"go", name:"Gas Oil", label:"Gas Oil", yield:value("goYield"), temp:560, press:12},
        {id:"fo", name:"Fuel Oil", label:"Fuel Oil", yield:value("foYield"), temp:680, press:10},
        {id:"res", name:"Residue", label:"Residue", yield:value("resYield"), temp:720, press:8}
    ];

    document.getElementById("feedLabel").textContent =
        `Crude: ${feedTemp}°F / ${feedPress} psig`;

    document.querySelectorAll(".tooltip-target").forEach(el=>{
        if(el.dataset.name === "Heated Crude"){
            el.dataset.condition = `${feedTemp}°F / ${feedPress} psig`;
            el.dataset.flow = `${feed.toFixed(1)} MBPD`;
        }
        if(el.dataset.name === "Crude Distillation Column"){
            el.dataset.flow = `${feed.toFixed(1)} MBPD crude feed`;
        }
        if(el.dataset.name === "Crude Furnace"){
            el.dataset.condition = `${feedTemp}°F / ${feedPress} psig outlet`;
            el.dataset.flow = `${feed.toFixed(1)} MBPD crude`;
            el.dataset.duty = `Estimated duty: ${(feed * 2.28).toFixed(1)} MMBtu/hr`;
        }
    });

    let summaryHTML = "";
    let totalYield = 0;
    let totalVolume = 0;

    products.forEach(p=>{
        const vol = productVolume(feed, p.yield);

        totalYield += p.yield;
        totalVolume += vol;

        document.getElementById(`${p.id}Label`).textContent =
            `${p.label}: ${p.temp}°F / ${p.press} psig`;

        document.getElementById(`${p.id}Vol`).textContent =
            `${vol.toFixed(1)} MBPD`;

        updateTooltipFlow(p.name, vol);

        summaryHTML += `
            <div class="card">
                <strong>${p.label}</strong><br>
                Yield: ${p.yield.toFixed(1)} vol%<br>
                Volume: ${vol.toFixed(1)} MBPD<br>
                T/P: ${p.temp}°F / ${p.press} psig
            </div>
        `;
    });

    summaryHTML += `
        <div class="card">
            <strong>Total Products</strong><br>
            Yield: ${totalYield.toFixed(1)} vol%<br>
            Volume: ${totalVolume.toFixed(1)} MBPD<br>
            Balance Error: ${(totalYield - 100).toFixed(1)} vol%
        </div>
    `;

    document.getElementById("summaryCards").innerHTML = summaryHTML;
}

const tooltip = document.getElementById("tooltip");

document.querySelectorAll(".tooltip-target").forEach(el=>{
    el.addEventListener("mousemove", e=>{
        tooltip.innerHTML = `
            <strong>${el.dataset.name || "Object"}</strong><br>
            Type: ${el.dataset.type || "-"}<br>
            Condition: ${el.dataset.condition || "-"}<br>
            Flow: ${el.dataset.flow || "-"}<br>
            Duty / Service: ${el.dataset.duty || "-"}
        `;

        tooltip.style.display = "block";
        tooltip.style.left = `${e.clientX + 14}px`;
        tooltip.style.top = `${e.clientY + 14}px`;
    });

    el.addEventListener("mouseleave", ()=>{
        tooltip.style.display = "none";
    });
});

updateCDU();
</script>

</body>
</html>
