<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>NPV / IRR / MIRR / Payback Calculator (20 Years)</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    .container { max-width: 1100px; }
    table { border-collapse: collapse; margin-top: 10px; }
    th, td { border: 1px solid #ccc; padding: 4px 6px; text-align: right; }
    th { background: #f0f0f0; }
    input[type="number"] { width: 120px; }
    .btn { margin-top: 15px; padding: 8px 16px; }
  </style>
</head>
<body>

<div id="header"></div>
<script>
fetch("header.html").then(r=>r.text()).then(d=>document.getElementById("header").innerHTML=d);
</script>

<div class="container">
  <h1>20-Year Project Cash Flow Calculator</h1>

  <div>
    <label>Discount rate (%):</label>
    <input type="number" id="discountRate" value="10" step="0.01">
  </div>
  <div>
    <label>Reinvest rate for MIRR (%):</label>
    <input type="number" id="reinvestRate" value="10" step="0.01">
  </div>
  <div>
    <label>Inflation rate (%):</label>
    <input type="number" id="inflationRate" value="3" step="0.01">
  </div>

  <h3>TIC and Revenues (Years 0–20)</h3>

  <table>
    <thead>
      <tr>
        <th>Year</th>
        <th>TIC (Capex)</th>
        <th>Revenue</th>
      </tr>
    </thead>
    <tbody id="cashflowTableBody"></tbody>
  </table>

  <button class="btn" onclick="calculate()">Calculate</button>

  <!-- NEW RESULTS TABLE -->
  <table id="resultsTable" style="margin-top:20px; display:none;">
    <thead>
      <tr>
        <th>Metric</th>
        <th>Value</th>
      </tr>
    </thead>
    <tbody>
      <tr><td>NPV</td><td id="r_npv"></td></tr>
      <tr><td>IRR</td><td id="r_irr"></td></tr>
      <tr><td>MIRR</td><td id="r_mirr"></td></tr>
      <tr><td>Payback Period</td><td id="r_payback"></td></tr>
    </tbody>
  </table>

</div>

<div id="footer"></div>
<script>
fetch("footer.html").then(r=>r.text()).then(d=>document.getElementById("footer").innerHTML=d);
</script>

<script>
  // Build 21 rows (Year 0–20)
  (function buildRows() {
    const tbody = document.getElementById('cashflowTableBody');
    for (let i = 0; i <= 20; i++) {
      const tr = document.createElement('tr');

      const tdYear = document.createElement('td');
      tdYear.textContent = i;
      tdYear.style.textAlign = 'center';

      const tdTIC = document.createElement('td');
      const ticInput = document.createElement('input');
      ticInput.type = 'number';
      ticInput.step = '0.01';
      ticInput.value = i === 0 ? -500000 : 0;
      ticInput.id = 'tic_' + i;
      tdTIC.appendChild(ticInput);

      const tdRev = document.createElement('td');
      const revInput = document.createElement('input');
      revInput.type = 'number';
      revInput.step = '0.01';
      revInput.value = i === 0 ? 0 : 60000;
      revInput.id = 'rev_' + i;
      tdRev.appendChild(revInput);

      tr.appendChild(tdYear);
      tr.appendChild(tdTIC);
      tr.appendChild(tdRev);
      tbody.appendChild(tr);
    }
  })();

  function npv(rate, cashflows) {
    return cashflows.reduce((acc, cf, t) => acc + cf / Math.pow(1 + rate, t), 0);
  }

  function irr(cashflows, low = -0.99, high = 1.5, tol = 1e-7, maxIter = 1000) {
    let npvLow = npv(low, cashflows);
    let npvHigh = npv(high, cashflows);
    if (npvLow * npvHigh > 0) return NaN;

    for (let i = 0; i < maxIter; i++) {
      const mid = (low + high) / 2;
      const npvMid = npv(mid, cashflows);
      if (Math.abs(npvMid) < tol) return mid;

      if (npvLow * npvMid < 0) {
        high = mid;
        npvHigh = npvMid;
      } else {
        low = mid;
        npvLow = npvMid;
      }
    }
    return (low + high) / 2;
  }

  function mirr(cashflows, financeRate, reinvestRate) {
    let pvNeg = 0, fvPos = 0;
    const n = cashflows.length - 1;

    cashflows.forEach((cf, t) => {
      if (cf < 0) pvNeg += cf / Math.pow(1 + financeRate, t);
      if (cf > 0) fvPos += cf * Math.pow(1 + reinvestRate, n - t);
    });

    if (pvNeg === 0) return NaN;
    return Math.pow(-fvPos / pvNeg, 1 / n) - 1;
  }

  function paybackPeriod(cashflows) {
    let cumulative = 0;
    for (let t = 0; t < cashflows.length; t++) {
      const prev = cumulative;
      cumulative += cashflows[t];
      if (cumulative >= 0 && t > 0) {
        return (t - 1) + (0 - prev) / cashflows[t];
      }
    }
    return NaN;
  }

  function calculate() {
    const discountRate = parseFloat(document.getElementById('discountRate').value) / 100;
    const reinvestRate = parseFloat(document.getElementById('reinvestRate').value) / 100;
    const inflationRate = parseFloat(document.getElementById('inflationRate').value) / 100;

    const cashflows = [];

    for (let i = 0; i <= 20; i++) {
      const tic = parseFloat(document.getElementById('tic_' + i).value || 0);
      const rev = parseFloat(document.getElementById('rev_' + i).value || 0);

      const inflFactor = Math.pow(1 + inflationRate, i);

      const adjTIC = tic * inflFactor;
      const adjRev = rev * inflFactor;

      cashflows.push(adjTIC + adjRev);
    }

    const npvVal = npv(discountRate, cashflows);
    const irrVal = irr(cashflows);
    const mirrVal = mirr(cashflows, discountRate, reinvestRate);
    const pbVal = paybackPeriod(cashflows);

    // Show results table
    document.getElementById("resultsTable").style.display = "table";

    document.getElementById("r_npv").textContent = npvVal.toFixed(2);
    document.getElementById("r_irr").textContent = isFinite(irrVal) ? (irrVal * 100).toFixed(3) + " %" : "NaN";
    document.getElementById("r_mirr").textContent = isFinite(mirrVal) ? (mirrVal * 100).toFixed(3) + " %" : "NaN";
    document.getElementById("r_payback").textContent = isFinite(pbVal) ? pbVal.toFixed(2) + " years" : "No payback within 20 years";
  }
</script>

</body>
</html>
