<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>River Water Treatment Plant SVG Flowsheet</title>
  <link rel="stylesheet" href="css/river-water-treatment.css" />
</head>
<body>
<div id="header"></div>
<script>
fetch("header.html").then(r => r.text()).then(d => { document.getElementById("header").innerHTML = d; }).catch(() => {});
</script>

<main class="app-shell">
  <header class="topbar">
    <div>
      <h1>River Water Treatment Plant SVG Flowsheet</h1>
      <p>River intake, clarification, cooling water conditioning, potable water treatment, and demineralized water production.</p>
    </div>
    <div class="controls">
      <button id="btnAnimate" type="button">Pause Flow</button>
      <button id="btnReset" type="button">Reset View</button>
    </div>
  </header>

  <section class="diagram-panel">
    <svg id="waterSvg" viewBox="0 0 2200 1250" role="img" aria-label="River water treatment plant block flow diagram">
      <defs>
        <!-- Compact SVG markers. userSpaceOnUse avoids oversized heads when stroke width changes. -->
        <marker id="arrowBlue" viewBox="0 0 8 8" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto" markerUnits="userSpaceOnUse">
          <path d="M0,0 L8,4 L0,8 Z" fill="#1f6f9e"></path>
        </marker>
        <marker id="arrowClarified" viewBox="0 0 8 8" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto" markerUnits="userSpaceOnUse">
          <path d="M0,0 L8,4 L0,8 Z" fill="#008b8b"></path>
        </marker>
        <marker id="arrowCooling" viewBox="0 0 8 8" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto" markerUnits="userSpaceOnUse">
          <path d="M0,0 L8,4 L0,8 Z" fill="#6b5fb5"></path>
        </marker>
        <marker id="arrowPotable" viewBox="0 0 8 8" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto" markerUnits="userSpaceOnUse">
          <path d="M0,0 L8,4 L0,8 Z" fill="#2f8f46"></path>
        </marker>
        <marker id="arrowDemin" viewBox="0 0 8 8" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto" markerUnits="userSpaceOnUse">
          <path d="M0,0 L8,4 L0,8 Z" fill="#c96f20"></path>
        </marker>
        <marker id="arrowWaste" viewBox="0 0 8 8" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto" markerUnits="userSpaceOnUse">
          <path d="M0,0 L8,4 L0,8 Z" fill="#69788a"></path>
        </marker>
      </defs>

      <rect x="24" y="24" width="2152" height="1202" rx="26" class="canvas-bg"></rect>
      <text x="1100" y="68" text-anchor="middle" class="svg-title">River Water Treatment Plant — Multi-Product Water System</text>
      <text x="1100" y="98" text-anchor="middle" class="svg-subtitle">River water → clarification → clarified water, cooling water, potable water, and demineralized water branches</text>

      <!-- Front-end clarification train: spread left-to-right across the top -->
      <g class="unit-block intake" data-unit="intake">
        <rect x="80" y="235" width="235" height="145" rx="18"></rect>
        <text x="198" y="274" text-anchor="middle" class="block-title">River Water Intake</text>
        <text x="198" y="305" text-anchor="middle">Intake pumps</text>
        <text x="198" y="332" text-anchor="middle">Coarse + fine screens</text>
        <text x="198" y="359" text-anchor="middle">Debris removal</text>
      </g>

      <g class="unit-block coag" data-unit="coag">
        <rect x="410" y="235" width="245" height="145" rx="18"></rect>
        <text x="533" y="274" text-anchor="middle" class="block-title">Coagulation</text>
        <text x="533" y="305" text-anchor="middle">Rapid mixing</text>
        <text x="533" y="332" text-anchor="middle">Alum / ferric salt</text>
        <text x="533" y="359" text-anchor="middle">pH control</text>
      </g>

      <g class="unit-block floc" data-unit="floc">
        <rect x="750" y="235" width="245" height="145" rx="18"></rect>
        <text x="873" y="274" text-anchor="middle" class="block-title">Flocculation</text>
        <text x="873" y="305" text-anchor="middle">Slow mixing basins</text>
        <text x="873" y="332" text-anchor="middle">Polymer assist</text>
        <text x="873" y="359" text-anchor="middle">Floc growth</text>
      </g>

      <g class="unit-block sediment" data-unit="sediment">
        <rect x="1090" y="235" width="260" height="145" rx="18"></rect>
        <text x="1220" y="274" text-anchor="middle" class="block-title">Sedimentation</text>
        <text x="1220" y="305" text-anchor="middle">Clarifier / lamella</text>
        <text x="1220" y="332" text-anchor="middle">Suspended solids removal</text>
        <text x="1220" y="359" text-anchor="middle">Sludge blowdown</text>
      </g>

      <g class="unit-block clarified" data-unit="clarified">
        <rect x="1460" y="220" width="270" height="175" rx="20"></rect>
        <text x="1595" y="260" text-anchor="middle" class="block-title">Clarified Water</text>
        <text x="1595" y="292" text-anchor="middle">Common header / tank</text>
        <text x="1595" y="319" text-anchor="middle">Base feed for all users</text>
        <path d="M1530 338 C1530 313 1660 313 1660 338 L1660 362 C1660 387 1530 387 1530 362 Z" class="tank"></path>
      </g>

      <!-- Product tag for direct clarified water use -->
      <g class="product-tag clarified-tag">
        <rect x="1875" y="250" width="230" height="42" rx="13"></rect>
        <text x="1990" y="277" text-anchor="middle">Clarified water users</text>
      </g>

      <!-- Cooling water branch: top-middle/right lane -->
      <g class="branch-label cooling-label"><text x="1165" y="500">Cooling Water Branch</text></g>
      <g class="unit-block cooling" data-unit="cwFilter">
        <rect x="910" y="535" width="255" height="140" rx="18"></rect>
        <text x="1038" y="574" text-anchor="middle" class="block-title">CW Filtration</text>
        <text x="1038" y="605" text-anchor="middle">Strainers / MMF</text>
        <text x="1038" y="632" text-anchor="middle">Low solids protection</text>
        <text x="1038" y="659" text-anchor="middle">Cooling makeup quality</text>
      </g>

      <g class="unit-block cooling" data-unit="cwChem">
        <rect x="1285" y="535" width="255" height="140" rx="18"></rect>
        <text x="1413" y="574" text-anchor="middle" class="block-title">CW Chemical</text>
        <text x="1413" y="605" text-anchor="middle">Scale inhibitor</text>
        <text x="1413" y="632" text-anchor="middle">Corrosion inhibitor</text>
        <text x="1413" y="659" text-anchor="middle">Biocide dosing</text>
      </g>

      <g class="unit-block cooling" data-unit="coolingTower">
        <rect x="1660" y="525" width="250" height="160" rx="18"></rect>
        <text x="1785" y="565" text-anchor="middle" class="block-title">Cooling Tower</text>
        <text x="1785" y="596" text-anchor="middle">Makeup water</text>
        <text x="1785" y="623" text-anchor="middle">Circulation pumps</text>
        <text x="1785" y="650" text-anchor="middle">Heat exchangers</text>
      </g>

      <g class="product-tag cooling-tag">
        <rect x="1945" y="585" width="225" height="42" rx="13"></rect>
        <text x="2058" y="612" text-anchor="middle">Cooling water makeup</text>
      </g>

      <!-- Potable water branch: lower-right lane -->
      <g class="branch-label potable-label"><text x="1190" y="755">Potable Water Branch</text></g>
      <g class="unit-block potable" data-unit="potFilter">
        <rect x="820" y="790" width="255" height="150" rx="18"></rect>
        <text x="948" y="830" text-anchor="middle" class="block-title">Rapid Sand Filter</text>
        <text x="948" y="862" text-anchor="middle">Turbidity polishing</text>
        <text x="948" y="889" text-anchor="middle">Optional carbon</text>
        <text x="948" y="916" text-anchor="middle">Taste / odor removal</text>
      </g>

      <g class="unit-block potable" data-unit="disinfection">
        <rect x="1205" y="790" width="255" height="150" rx="18"></rect>
        <text x="1333" y="830" text-anchor="middle" class="block-title">Disinfection</text>
        <text x="1333" y="862" text-anchor="middle">Chlorine or UV</text>
        <text x="1333" y="889" text-anchor="middle">pH adjustment</text>
        <text x="1333" y="916" text-anchor="middle">Residual control</text>
      </g>

      <g class="unit-block potable" data-unit="potableStorage">
        <rect x="1590" y="790" width="255" height="150" rx="18"></rect>
        <text x="1718" y="830" text-anchor="middle" class="block-title">Potable Storage</text>
        <text x="1718" y="862" text-anchor="middle">Clearwell / tank</text>
        <text x="1718" y="889" text-anchor="middle">Distribution pumps</text>
        <text x="1718" y="916" text-anchor="middle">Drinking-water service</text>
      </g>

      <g class="product-tag potable-tag">
        <rect x="1915" y="845" width="220" height="42" rx="13"></rect>
        <text x="2025" y="872" text-anchor="middle">Potable water export</text>
      </g>

      <!-- Demineralized water branch: lower-left lane -->
      <g class="branch-label demin-label"><text x="455" y="500">Demin Water Branch</text></g>
      <g class="unit-block demin" data-unit="uf">
        <rect x="115" y="535" width="240" height="150" rx="18"></rect>
        <text x="235" y="575" text-anchor="middle" class="block-title">Ultrafiltration</text>
        <text x="235" y="607" text-anchor="middle">Fine particle removal</text>
        <text x="235" y="634" text-anchor="middle">RO protection</text>
        <text x="235" y="661" text-anchor="middle">Backwash system</text>
      </g>

      <g class="unit-block demin" data-unit="ro">
        <rect x="470" y="535" width="240" height="150" rx="18"></rect>
        <text x="590" y="575" text-anchor="middle" class="block-title">RO System</text>
        <text x="590" y="607" text-anchor="middle">Dissolved salt removal</text>
        <text x="590" y="634" text-anchor="middle">Permeate / reject</text>
        <text x="590" y="661" text-anchor="middle">High recovery train</text>
      </g>

      <g class="unit-block demin" data-unit="edi">
        <rect x="825" y="535" width="250" height="150" rx="18"></rect>
        <text x="950" y="575" text-anchor="middle" class="block-title">IX / EDI Polisher</text>
        <text x="950" y="607" text-anchor="middle">Conductivity polishing</text>
        <text x="950" y="634" text-anchor="middle">Silica reduction</text>
        <text x="950" y="661" text-anchor="middle">Boiler-quality water</text>
      </g>

      <g class="unit-block demin" data-unit="deminStorage">
        <rect x="1185" y="535" width="250" height="150" rx="18"></rect>
        <text x="1310" y="575" text-anchor="middle" class="block-title">Demin Storage</text>
        <text x="1310" y="607" text-anchor="middle">High-purity tank</text>
        <text x="1310" y="634" text-anchor="middle">Transfer pumps</text>
        <text x="1310" y="661" text-anchor="middle">Boilers / process users</text>
      </g>

      <g class="product-tag demin-tag">
        <rect x="1475" y="590" width="210" height="42" rx="13"></rect>
        <text x="1580" y="617" text-anchor="middle">Demin water export</text>
      </g>

      <!-- Waste handling: dedicated bottom lane away from product paths -->
      <g class="unit-block waste" data-unit="waste">
        <rect x="1285" y="1040" width="285" height="120" rx="18"></rect>
        <text x="1428" y="1078" text-anchor="middle" class="block-title">Waste / Reject Handling</text>
        <text x="1428" y="1110" text-anchor="middle">Clarifier sludge</text>
        <text x="1428" y="1137" text-anchor="middle">RO reject / filter backwash</text>
      </g>

      <!-- Main process streams -->
      <path id="s1" class="stream river-flow" d="M42 308 H80" marker-end="url(#arrowBlue)"></path>
      <text x="48" y="286" class="stream-label">River water</text>
      <path id="s2" class="stream river-flow" d="M315 308 H410" marker-end="url(#arrowBlue)"></path>
      <text x="330" y="286" class="stream-label">Screened water</text>
      <path id="s3" class="stream river-flow" d="M655 308 H750" marker-end="url(#arrowBlue)"></path>
      <text x="665" y="286" class="stream-label">Coagulated water</text>
      <path id="s4" class="stream river-flow" d="M995 308 H1090" marker-end="url(#arrowBlue)"></path>
      <text x="1010" y="286" class="stream-label">Flocculated water</text>
      <path id="s5" class="stream clarified-flow" d="M1350 308 H1460" marker-end="url(#arrowClarified)"></path>
      <text x="1360" y="286" class="stream-label">Clarified water</text>
      <path id="s6" class="stream clarified-flow" d="M1730 308 H1875" marker-end="url(#arrowClarified)"></path>

      <!-- Branch header from clarified water tank; routed with open lanes and no block crossings -->
      <path id="s7" class="stream clarified-flow" d="M1595 395 V455 H1038 V535" marker-end="url(#arrowCooling)"></path>
      <text x="1115" y="437" class="stream-label">Clarified water to CW</text>
      <path id="s8" class="stream clarified-flow" d="M1595 395 V735 H948 V790" marker-end="url(#arrowPotable)"></path>
      <text x="1015" y="717" class="stream-label">Clarified water to potable</text>
      <path id="s9" class="stream clarified-flow" d="M1460 350 C1180 438 590 438 235 535" marker-end="url(#arrowDemin)"></path>
      <text x="575" y="454" class="stream-label">Clarified water to demin</text>

      <!-- Cooling branch -->
      <path id="s10" class="stream cooling-flow" d="M1165 605 H1285" marker-end="url(#arrowCooling)"></path>
      <text x="1180" y="584" class="stream-label">Filtered CW makeup</text>
      <path id="s11" class="stream cooling-flow" d="M1540 605 H1660" marker-end="url(#arrowCooling)"></path>
      <text x="1555" y="584" class="stream-label">Conditioned CW</text>
      <path id="s12" class="stream cooling-flow" d="M1910 605 H1945" marker-end="url(#arrowCooling)"></path>

      <!-- Potable branch -->
      <path id="s13" class="stream potable-flow" d="M1075 865 H1205" marker-end="url(#arrowPotable)"></path>
      <text x="1092" y="844" class="stream-label">Filtered water</text>
      <path id="s14" class="stream potable-flow" d="M1460 865 H1590" marker-end="url(#arrowPotable)"></path>
      <text x="1478" y="844" class="stream-label">Disinfected water</text>
      <path id="s15" class="stream potable-flow" d="M1845 865 H1915" marker-end="url(#arrowPotable)"></path>

      <!-- Demin branch -->
      <path id="s16" class="stream demin-flow" d="M355 610 H470" marker-end="url(#arrowDemin)"></path>
      <text x="375" y="589" class="stream-label">UF filtrate</text>
      <path id="s17" class="stream demin-flow" d="M710 610 H825" marker-end="url(#arrowDemin)"></path>
      <text x="730" y="589" class="stream-label">RO permeate</text>
      <path id="s18" class="stream demin-flow" d="M1075 610 H1185" marker-end="url(#arrowDemin)"></path>
      <text x="1090" y="589" class="stream-label">Polished water</text>
      <path id="s19" class="stream demin-flow" d="M1435 610 H1475" marker-end="url(#arrowDemin)"></path>

      <!-- Waste / reject streams -->
      <path id="s20" class="stream waste-flow" d="M1220 380 C1235 620 1300 865 1365 1040" marker-end="url(#arrowWaste)"></path>
      <text x="1262" y="804" class="stream-label">Sludge</text>
      <path id="s21" class="stream waste-flow" d="M590 685 C690 920 1010 1075 1285 1100" marker-end="url(#arrowWaste)"></path>
      <text x="790" y="990" class="stream-label">RO reject / backwash</text>

      <!-- Section brackets -->
      <path d="M375 195 H1765 V425 H375 Z" class="bracket"></path>
      <text x="1070" y="204" text-anchor="middle" class="section-label">Clarification Train</text>
      <path d="M885 500 H1930 V715 H885 Z" class="bracket"></path>
      <text x="1408" y="509" text-anchor="middle" class="section-label">Cooling Water System</text>
      <path d="M790 755 H1865 V970 H790 Z" class="bracket"></path>
      <text x="1328" y="764" text-anchor="middle" class="section-label">Potable Water System</text>
      <path d="M90 500 H1705 V715 H90 Z" class="bracket"></path>
      <text x="897" y="509" text-anchor="middle" class="section-label">Demineralized Water System</text>

      <g id="streamInfoOverlay" class="info-overlay">
        <rect x="70" y="1015" width="430" height="155" rx="15"></rect>
        <text x="94" y="1049" class="overlay-title">Selected Stream / Unit</text>
        <text id="selectedTitle" x="94" y="1083" class="overlay-main">Click any block or stream</text>
        <text id="selectedDesc1" x="94" y="1114" class="overlay-text">The diagram highlights the selected water treatment section.</text>
        <text id="selectedDesc2" x="94" y="1143" class="overlay-text">Use this as a high-level utility water block diagram.</text>
      </g>
    </svg>
  </section>

  <section class="summary-grid">
    <article class="panel">
      <h2>Unit Summary</h2>
      <table id="unitSummaryTable">
        <thead>
          <tr><th>Section</th><th>Main Function</th><th>Typical Equipment / Product Quality</th></tr>
        </thead>
        <tbody></tbody>
      </table>
    </article>
    <article class="panel">
      <h2>Major Streams</h2>
      <table id="streamSummaryTable">
        <thead>
          <tr><th>Stream</th><th>From</th><th>To</th><th>Purpose</th></tr>
        </thead>
        <tbody></tbody>
      </table>
    </article>
  </section>
</main>

<script src="js/river-water-treatment.js"></script>
<div id="footer"></div>
<script>
fetch("footer.html").then(r => r.text()).then(d => { document.getElementById("footer").innerHTML = d; }).catch(() => {});
</script>
</body>
</html>
