<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>River Water Treatment Plant SVG Flowsheet</title>
  <link rel="stylesheet" href="css/river-water-treatment.css" />
</head>
<body>
<div id="header"></div>
<script>
fetch("header.html").then(r => r.text()).then(d => { document.getElementById("header").innerHTML = d; }).catch(() => {});
</script>

<main class="app-shell">
  <header class="topbar">
    <div>
      <h1>River Water Treatment Plant SVG Flowsheet</h1>
      <p>River intake, clarification, cooling water conditioning, potable water treatment, and demineralized water production.</p>
    </div>
    <div class="controls">
      <button id="btnAnimate" type="button">Pause Flow</button>
      <button id="btnReset" type="button">Reset View</button>
    </div>
  </header>

  <section class="diagram-panel">
    <svg id="waterSvg" viewBox="0 0 2350 1780" role="img" aria-label="River water treatment plant block flow diagram">
      <defs>
        <marker id="arrowBlue" viewBox="0 0 10 10" markerWidth="11" markerHeight="11" refX="9" refY="5" orient="auto" markerUnits="userSpaceOnUse">
          <path d="M0,0 L10,5 L0,10 Z" fill="#1f6f9e"></path>
        </marker>
        <marker id="arrowClarified" viewBox="0 0 10 10" markerWidth="11" markerHeight="11" refX="9" refY="5" orient="auto" markerUnits="userSpaceOnUse">
          <path d="M0,0 L10,5 L0,10 Z" fill="#008b8b"></path>
        </marker>
        <marker id="arrowCooling" viewBox="0 0 10 10" markerWidth="11" markerHeight="11" refX="9" refY="5" orient="auto" markerUnits="userSpaceOnUse">
          <path d="M0,0 L10,5 L0,10 Z" fill="#6b5fb5"></path>
        </marker>
        <marker id="arrowPotable" viewBox="0 0 10 10" markerWidth="11" markerHeight="11" refX="9" refY="5" orient="auto" markerUnits="userSpaceOnUse">
          <path d="M0,0 L10,5 L0,10 Z" fill="#2f8f46"></path>
        </marker>
        <marker id="arrowDemin" viewBox="0 0 10 10" markerWidth="11" markerHeight="11" refX="9" refY="5" orient="auto" markerUnits="userSpaceOnUse">
          <path d="M0,0 L10,5 L0,10 Z" fill="#c96f20"></path>
        </marker>
        <marker id="arrowWaste" viewBox="0 0 10 10" markerWidth="11" markerHeight="11" refX="9" refY="5" orient="auto" markerUnits="userSpaceOnUse">
          <path d="M0,0 L10,5 L0,10 Z" fill="#69788a"></path>
        </marker>
      </defs>

      <rect x="24" y="24" width="2302" height="1732" rx="26" class="canvas-bg"></rect>
      <text x="1175" y="68" text-anchor="middle" class="svg-title">River Water Treatment Plant — Multi-Product Water System</text>
      <text x="1175" y="98" text-anchor="middle" class="svg-subtitle">River water → clarification → clarified water, cooling water, potable water, and demineralized water branches</text>

      <!-- Common clarification row -->
      <g class="unit-block intake" data-unit="intake"><rect x="70" y="165" width="235" height="145" rx="18"></rect><text x="188" y="204" text-anchor="middle" class="block-title">River Water Intake</text><text x="188" y="235" text-anchor="middle">Intake pumps</text><text x="188" y="262" text-anchor="middle">Coarse + fine screens</text><text x="188" y="289" text-anchor="middle">Debris removal</text></g>
      <g class="unit-block coag" data-unit="coag"><rect x="390" y="165" width="245" height="145" rx="18"></rect><text x="513" y="204" text-anchor="middle" class="block-title">Coagulation</text><text x="513" y="235" text-anchor="middle">Rapid mixing</text><text x="513" y="262" text-anchor="middle">Alum / ferric salt</text><text x="513" y="289" text-anchor="middle">pH control</text></g>
      <g class="unit-block floc" data-unit="floc"><rect x="720" y="165" width="245" height="145" rx="18"></rect><text x="843" y="204" text-anchor="middle" class="block-title">Flocculation</text><text x="843" y="235" text-anchor="middle">Slow mixing basins</text><text x="843" y="262" text-anchor="middle">Polymer assist</text><text x="843" y="289" text-anchor="middle">Floc growth</text></g>
      <g class="unit-block sediment" data-unit="sediment"><rect x="1050" y="165" width="260" height="145" rx="18"></rect><text x="1180" y="204" text-anchor="middle" class="block-title">Sedimentation</text><text x="1180" y="235" text-anchor="middle">Clarifier / lamella</text><text x="1180" y="262" text-anchor="middle">Suspended solids removal</text><text x="1180" y="289" text-anchor="middle">Sludge blowdown</text></g>
      <g class="unit-block clarified" data-unit="clarified"><rect x="1410" y="150" width="280" height="175" rx="20"></rect><text x="1550" y="190" text-anchor="middle" class="block-title">Clarified Water</text><text x="1550" y="222" text-anchor="middle">Common header / tank</text><text x="1550" y="249" text-anchor="middle">Base feed for all users</text><path d="M1485 268 C1485 243 1615 243 1615 268 L1615 292 C1615 317 1485 317 1485 292 Z" class="tank"></path></g>
      <g class="product-tag clarified-tag"><rect x="1855" y="216" width="230" height="42" rx="13"></rect><text x="1970" y="243" text-anchor="middle">Clarified water users</text></g>

      <!-- Cooling water row -->
      <g class="branch-label cooling-label"><text x="1175" y="445" text-anchor="middle">Cooling Water Branch — low-purity utility makeup</text></g>
      <g class="unit-block cooling" data-unit="cwFilter"><rect x="190" y="490" width="270" height="145" rx="18"></rect><text x="325" y="530" text-anchor="middle" class="block-title">CW Filtration</text><text x="325" y="562" text-anchor="middle">Strainers / MMF</text><text x="325" y="589" text-anchor="middle">Low solids protection</text><text x="325" y="616" text-anchor="middle">Cooling makeup quality</text></g>
      <g class="unit-block cooling" data-unit="cwChem"><rect x="590" y="490" width="270" height="145" rx="18"></rect><text x="725" y="530" text-anchor="middle" class="block-title">CW Chemical</text><text x="725" y="562" text-anchor="middle">Scale inhibitor</text><text x="725" y="589" text-anchor="middle">Corrosion inhibitor</text><text x="725" y="616" text-anchor="middle">Biocide dosing</text></g>
      <g class="unit-block cooling" data-unit="coolingTower"><rect x="990" y="480" width="270" height="165" rx="18"></rect><text x="1125" y="520" text-anchor="middle" class="block-title">Cooling Tower</text><text x="1125" y="552" text-anchor="middle">Makeup water</text><text x="1125" y="579" text-anchor="middle">Circulation pumps</text><text x="1125" y="606" text-anchor="middle">Heat exchangers</text></g>
      <g class="product-tag cooling-tag"><rect x="1390" y="542" width="240" height="42" rx="13"></rect><text x="1510" y="569" text-anchor="middle">Cooling water makeup</text></g>

      <!-- Potable water row -->
      <g class="branch-label potable-label"><text x="1175" y="780" text-anchor="middle">Potable Water Branch — drinking/domestic water</text></g>
      <g class="unit-block potable" data-unit="potFilter"><rect x="190" y="825" width="270" height="155" rx="18"></rect><text x="325" y="865" text-anchor="middle" class="block-title">Rapid Sand Filter</text><text x="325" y="897" text-anchor="middle">Turbidity polishing</text><text x="325" y="924" text-anchor="middle">Optional carbon</text><text x="325" y="951" text-anchor="middle">Taste / odor removal</text></g>
      <g class="unit-block potable" data-unit="disinfection"><rect x="590" y="825" width="270" height="155" rx="18"></rect><text x="725" y="865" text-anchor="middle" class="block-title">Disinfection</text><text x="725" y="897" text-anchor="middle">Chlorine or UV</text><text x="725" y="924" text-anchor="middle">pH adjustment</text><text x="725" y="951" text-anchor="middle">Residual control</text></g>
      <g class="unit-block potable" data-unit="potableStorage"><rect x="990" y="825" width="270" height="155" rx="18"></rect><text x="1125" y="865" text-anchor="middle" class="block-title">Potable Storage</text><text x="1125" y="897" text-anchor="middle">Clearwell / tank</text><text x="1125" y="924" text-anchor="middle">Distribution pumps</text><text x="1125" y="951" text-anchor="middle">Drinking-water service</text></g>
      <g class="product-tag potable-tag"><rect x="1390" y="882" width="230" height="42" rx="13"></rect><text x="1505" y="909" text-anchor="middle">Potable water export</text></g>

      <!-- Demin water row -->
      <g class="branch-label demin-label"><text x="1175" y="1125" text-anchor="middle">Demineralized Water Branch — boilers / high-purity users</text></g>
      <g class="unit-block demin" data-unit="uf"><rect x="115" y="1170" width="250" height="155" rx="18"></rect><text x="240" y="1210" text-anchor="middle" class="block-title">Ultrafiltration</text><text x="240" y="1242" text-anchor="middle">Colloids removal</text><text x="240" y="1269" text-anchor="middle">Microorganisms control</text><text x="240" y="1296" text-anchor="middle">RO protection</text></g>
      <g class="unit-block demin" data-unit="ro"><rect x="460" y="1170" width="250" height="155" rx="18"></rect><text x="585" y="1210" text-anchor="middle" class="block-title">Reverse Osmosis</text><text x="585" y="1242" text-anchor="middle">Bulk TDS removal</text><text x="585" y="1269" text-anchor="middle">RO permeate</text><text x="585" y="1296" text-anchor="middle">Reject to waste</text></g>
      <g class="unit-block demin" data-unit="edi"><rect x="805" y="1170" width="270" height="155" rx="18"></rect><text x="940" y="1210" text-anchor="middle" class="block-title">IX / EDI Polisher</text><text x="940" y="1242" text-anchor="middle">Conductivity polishing</text><text x="940" y="1269" text-anchor="middle">Silica reduction</text><text x="940" y="1296" text-anchor="middle">Ultra-low ions</text></g>
      <g class="unit-block demin" data-unit="deminStorage"><rect x="1170" y="1170" width="270" height="155" rx="18"></rect><text x="1305" y="1210" text-anchor="middle" class="block-title">Demin Storage</text><text x="1305" y="1242" text-anchor="middle">High-purity tank</text><text x="1305" y="1269" text-anchor="middle">Transfer pumps</text><text x="1305" y="1296" text-anchor="middle">Boiler feed users</text></g>
      <g class="product-tag demin-tag"><rect x="1540" y="1228" width="240" height="42" rx="13"></rect><text x="1660" y="1255" text-anchor="middle">Demin water export</text></g>

      <!-- Waste handling and notes -->
      <g class="unit-block waste" data-unit="waste"><rect x="250" y="1475" width="360" height="145" rx="18"></rect><text x="430" y="1514" text-anchor="middle" class="block-title">Waste / Reject Handling</text><text x="430" y="1546" text-anchor="middle">Clarifier sludge</text><text x="430" y="1573" text-anchor="middle">Filter / UF backwash</text><text x="430" y="1600" text-anchor="middle">RO reject to treatment</text></g>

      <g id="streamInfoOverlay" class="info-overlay">
        <rect x="1530" y="1450" width="650" height="190" rx="16"></rect>
        <text x="1560" y="1487" class="overlay-title">Selected Stream / Unit</text>
        <text id="selectedTitle" x="1560" y="1522" class="overlay-main">Click any block or stream</text>
        <text id="selectedDesc1" x="1560" y="1555" class="overlay-text">The diagram highlights the selected water treatment section.</text>
        <text id="selectedDesc2" x="1560" y="1582" class="overlay-text">Use this as a high-level utility water block diagram.</text>
      </g>

      <!-- Legend -->
      <g class="info-overlay">
        <rect x="720" y="1475" width="650" height="145" rx="16"></rect>
        <text x="750" y="1510" class="overlay-title">Legend / Quality Targets</text>
        <path class="stream river-flow" d="M755 1537 H835" marker-end="url(#arrowBlue)"></path><text x="855" y="1543" class="overlay-text">Raw / screened river water</text>
        <path class="stream cooling-flow" d="M755 1567 H835" marker-end="url(#arrowCooling)"></path><text x="855" y="1573" class="overlay-text">Cooling water branch</text>
        <path class="stream potable-flow" d="M755 1597 H835" marker-end="url(#arrowPotable)"></path><text x="855" y="1603" class="overlay-text">Potable water branch</text>
        <text x="1120" y="1543" class="overlay-text">Clarified: low turbidity</text>
        <text x="1120" y="1573" class="overlay-text">Potable: disinfected / pH adjusted</text>
        <text x="1120" y="1603" class="overlay-text">Demin: low conductivity and silica</text>
      </g>

      <!-- Streams: common clarification -->
      <path id="s1" class="stream river-flow" d="M35 238 H70" marker-end="url(#arrowBlue)"></path><text x="42" y="220" class="stream-label">River water</text>
      <path id="s2" class="stream river-flow" d="M305 238 H390" marker-end="url(#arrowBlue)"></path>
      <path id="s3" class="stream river-flow" d="M635 238 H720" marker-end="url(#arrowBlue)"></path>
      <path id="s4" class="stream river-flow" d="M965 238 H1050" marker-end="url(#arrowBlue)"></path>
      <path id="s5" class="stream clarified-flow" d="M1310 238 H1410" marker-end="url(#arrowClarified)"></path><text x="1330" y="218" class="stream-label">Clarified water</text>
      <path id="s6" class="stream clarified-flow" d="M1690 238 H1855" marker-end="url(#arrowClarified)"></path>

      <!-- Branch feed header from clarified tank: routed away from boxes -->
      <path id="s7" class="stream cooling-flow" d="M1550 325 V410 H325 V490" marker-end="url(#arrowCooling)"></path><text x="350" y="430" class="stream-label">To cooling branch</text>
      <path id="s8" class="stream potable-flow" d="M1585 325 V745 H325 V825" marker-end="url(#arrowPotable)"></path><text x="350" y="765" class="stream-label">To potable branch</text>
      <path id="s9" class="stream demin-flow" d="M1620 325 V1090 H240 V1170" marker-end="url(#arrowDemin)"></path><text x="260" y="1110" class="stream-label">To demin branch</text>

      <!-- Cooling branch -->
      <path id="s10" class="stream cooling-flow" d="M460 563 H590" marker-end="url(#arrowCooling)"></path>
      <path id="s11" class="stream cooling-flow" d="M860 563 H990" marker-end="url(#arrowCooling)"></path>
      <path id="s12" class="stream cooling-flow" d="M1260 563 H1390" marker-end="url(#arrowCooling)"></path>

      <!-- Potable branch -->
      <path id="s13" class="stream potable-flow" d="M460 903 H590" marker-end="url(#arrowPotable)"></path>
      <path id="s14" class="stream potable-flow" d="M860 903 H990" marker-end="url(#arrowPotable)"></path>
      <path id="s15" class="stream potable-flow" d="M1260 903 H1390" marker-end="url(#arrowPotable)"></path>

      <!-- Demin branch -->
      <path id="s16" class="stream demin-flow" d="M365 1248 H460" marker-end="url(#arrowDemin)"></path>
      <path id="s17" class="stream demin-flow" d="M710 1248 H805" marker-end="url(#arrowDemin)"></path>
      <path id="s18" class="stream demin-flow" d="M1075 1248 H1170" marker-end="url(#arrowDemin)"></path>
      <path id="s19" class="stream demin-flow" d="M1440 1248 H1540" marker-end="url(#arrowDemin)"></path>

      <!-- Waste / reject paths routed to bottom waste block -->
      <path id="s20" class="stream waste-flow" d="M1180 310 V1390 H430 V1475" marker-end="url(#arrowWaste)"></path><text x="760" y="1412" class="stream-label">Sludge / solids</text>
      <path id="s21" class="stream waste-flow" d="M585 1325 V1405 H430 V1475" marker-end="url(#arrowWaste)"></path><text x="615" y="1375" class="stream-label">RO reject / backwash</text>
    </svg>
  </section>

  <section class="summary-grid">
    <article class="panel">
      <h2>Unit Summary</h2>
      <table id="unitSummaryTable"><thead><tr><th>Section</th><th>Main Function</th><th>Typical Equipment / Quality Target</th></tr></thead><tbody></tbody></table>
    </article>
    <article class="panel">
      <h2>Major Streams</h2>
      <table id="streamSummaryTable"><thead><tr><th>Stream</th><th>From</th><th>To</th><th>Purpose</th></tr></thead><tbody></tbody></table>
    </article>
  </section>
</main>
<script src="js/river-water-treatment.js"></script>
<div id="footer"></div>
<script>
fetch("footer.html").then(r => r.text()).then(d => { document.getElementById("footer").innerHTML = d; }).catch(() => {});
</script>
</body>
</html>
