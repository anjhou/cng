<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>River Water Treatment Plant SVG Flowsheet</title>
  <link rel="stylesheet" href="css/river-water-treatment.css" />
</head>
<body>
<div id="header"></div>
<script>
fetch("header.html").then(r => r.text()).then(d => { document.getElementById("header").innerHTML = d; }).catch(() => {});
</script>

<main class="app-shell">
  <header class="topbar">
    <div>
      <h1>River Water Treatment Plant SVG Flowsheet</h1>
      <p>River intake, clarification, cooling water conditioning, potable water treatment, and demineralized water production.</p>
    </div>
    <div class="controls">
      <button id="btnAnimate" type="button">Pause Flow</button>
      <button id="btnReset" type="button">Reset View</button>
    </div>
  </header>

  <section class="diagram-panel">
    <svg id="waterSvg" viewBox="0 0 1900 1120" role="img" aria-label="River water treatment plant block flow diagram">
      <defs>
        <marker id="arrowBlue" viewBox="0 0 7 7" markerWidth="4" markerHeight="4" refX="6.2" refY="3.5" orient="auto" markerUnits="strokeWidth" overflow="visible">
          <path d="M0,0 L7,3.5 L0,7 Z" fill="#1f6f9e" stroke="none"></path>
        </marker>
        <marker id="arrowClarified" viewBox="0 0 7 7" markerWidth="4" markerHeight="4" refX="6.2" refY="3.5" orient="auto" markerUnits="strokeWidth" overflow="visible">
          <path d="M0,0 L7,3.5 L0,7 Z" fill="#008b8b" stroke="none"></path>
        </marker>
        <marker id="arrowCooling" viewBox="0 0 7 7" markerWidth="4" markerHeight="4" refX="6.2" refY="3.5" orient="auto" markerUnits="strokeWidth" overflow="visible">
          <path d="M0,0 L7,3.5 L0,7 Z" fill="#6b5fb5" stroke="none"></path>
        </marker>
        <marker id="arrowPotable" viewBox="0 0 7 7" markerWidth="4" markerHeight="4" refX="6.2" refY="3.5" orient="auto" markerUnits="strokeWidth" overflow="visible">
          <path d="M0,0 L7,3.5 L0,7 Z" fill="#2f8f46" stroke="none"></path>
        </marker>
        <marker id="arrowDemin" viewBox="0 0 7 7" markerWidth="4" markerHeight="4" refX="6.2" refY="3.5" orient="auto" markerUnits="strokeWidth" overflow="visible">
          <path d="M0,0 L7,3.5 L0,7 Z" fill="#c96f20" stroke="none"></path>
        </marker>
        <marker id="arrowWaste" viewBox="0 0 7 7" markerWidth="4" markerHeight="4" refX="6.2" refY="3.5" orient="auto" markerUnits="strokeWidth" overflow="visible">
          <path d="M0,0 L7,3.5 L0,7 Z" fill="#69788a" stroke="none"></path>
        </marker>
      </defs>

      <rect x="24" y="24" width="1852" height="1072" rx="26" class="canvas-bg"></rect>
      <text x="950" y="66" text-anchor="middle" class="svg-title">River Water Treatment Plant — Multi-Product Water System</text>
      <text x="950" y="96" text-anchor="middle" class="svg-subtitle">River water → clarification → cooling water, potable water, and demineralized water branches</text>

      <!-- Front-end clarification train -->
      <g class="unit-block intake" data-unit="intake">
        <rect x="70" y="250" width="220" height="140" rx="18"></rect>
        <text x="180" y="288" text-anchor="middle" class="block-title">River Water Intake</text>
        <text x="180" y="318" text-anchor="middle">Intake pumps</text>
        <text x="180" y="344" text-anchor="middle">Coarse + fine screens</text>
        <text x="180" y="370" text-anchor="middle">Debris removal</text>
      </g>

      <g class="unit-block coag" data-unit="coag">
        <rect x="365" y="220" width="230" height="145" rx="18"></rect>
        <text x="480" y="258" text-anchor="middle" class="block-title">Coagulation</text>
        <text x="480" y="288" text-anchor="middle">Rapid mixing</text>
        <text x="480" y="314" text-anchor="middle">Alum / ferric salt</text>
        <text x="480" y="340" text-anchor="middle">pH control</text>
      </g>

      <g class="unit-block floc" data-unit="floc">
        <rect x="670" y="220" width="230" height="145" rx="18"></rect>
        <text x="785" y="258" text-anchor="middle" class="block-title">Flocculation</text>
        <text x="785" y="288" text-anchor="middle">Slow mixing basins</text>
        <text x="785" y="314" text-anchor="middle">Polymer assist</text>
        <text x="785" y="340" text-anchor="middle">Floc growth</text>
      </g>

      <g class="unit-block sediment" data-unit="sediment">
        <rect x="975" y="220" width="245" height="145" rx="18"></rect>
        <text x="1098" y="258" text-anchor="middle" class="block-title">Sedimentation</text>
        <text x="1098" y="288" text-anchor="middle">Clarifier / lamella</text>
        <text x="1098" y="314" text-anchor="middle">Suspended solids removal</text>
        <text x="1098" y="340" text-anchor="middle">Sludge blowdown</text>
      </g>

      <g class="unit-block clarified" data-unit="clarified">
        <rect x="1310" y="210" width="250" height="165" rx="20"></rect>
        <text x="1435" y="250" text-anchor="middle" class="block-title">Clarified Water</text>
        <text x="1435" y="280" text-anchor="middle">Common header / tank</text>
        <text x="1435" y="306" text-anchor="middle">Base feed for all users</text>
        <path d="M1380 323 C1380 298 1490 298 1490 323 L1490 346 C1490 371 1380 371 1380 346 Z" class="tank"></path>
      </g>

      <!-- Cooling water branch -->
      <g class="branch-label cooling-label"><text x="1260" y="475">Cooling Water Branch</text></g>
      <g class="unit-block cooling" data-unit="cwFilter">
        <rect x="960" y="500" width="245" height="135" rx="18"></rect>
        <text x="1083" y="538" text-anchor="middle" class="block-title">CW Filtration</text>
        <text x="1083" y="568" text-anchor="middle">Strainers / MMF</text>
        <text x="1083" y="594" text-anchor="middle">Low solids protection</text>
        <text x="1083" y="620" text-anchor="middle">Cooling makeup quality</text>
      </g>

      <g class="unit-block cooling" data-unit="cwChem">
        <rect x="1285" y="500" width="245" height="135" rx="18"></rect>
        <text x="1408" y="538" text-anchor="middle" class="block-title">CW Chemical</text>
        <text x="1408" y="568" text-anchor="middle">Scale inhibitor</text>
        <text x="1408" y="594" text-anchor="middle">Corrosion inhibitor</text>
        <text x="1408" y="620" text-anchor="middle">Biocide dosing</text>
      </g>

      <g class="unit-block cooling" data-unit="coolingTower">
        <rect x="1610" y="490" width="230" height="155" rx="18"></rect>
        <text x="1725" y="528" text-anchor="middle" class="block-title">Cooling Tower</text>
        <text x="1725" y="558" text-anchor="middle">Makeup water</text>
        <text x="1725" y="584" text-anchor="middle">Circulation pumps</text>
        <text x="1725" y="610" text-anchor="middle">Heat exchangers</text>
      </g>

      <!-- Potable water branch -->
      <g class="branch-label potable-label"><text x="1260" y="695">Potable Water Branch</text></g>
      <g class="unit-block potable" data-unit="potFilter">
        <rect x="760" y="725" width="235" height="145" rx="18"></rect>
        <text x="878" y="763" text-anchor="middle" class="block-title">Rapid Sand Filter</text>
        <text x="878" y="793" text-anchor="middle">Turbidity polishing</text>
        <text x="878" y="819" text-anchor="middle">Optional carbon</text>
        <text x="878" y="845" text-anchor="middle">Taste / odor removal</text>
      </g>

      <g class="unit-block potable" data-unit="disinfection">
        <rect x="1090" y="725" width="235" height="145" rx="18"></rect>
        <text x="1208" y="763" text-anchor="middle" class="block-title">Disinfection</text>
        <text x="1208" y="793" text-anchor="middle">Chlorine or UV</text>
        <text x="1208" y="819" text-anchor="middle">pH adjustment</text>
        <text x="1208" y="845" text-anchor="middle">Residual control</text>
      </g>

      <g class="unit-block potable" data-unit="potableStorage">
        <rect x="1420" y="725" width="235" height="145" rx="18"></rect>
        <text x="1538" y="763" text-anchor="middle" class="block-title">Potable Storage</text>
        <text x="1538" y="793" text-anchor="middle">Clearwell / tank</text>
        <text x="1538" y="819" text-anchor="middle">Distribution pumps</text>
        <text x="1538" y="845" text-anchor="middle">Drinking-water service</text>
      </g>

      <!-- Demineralized water branch -->
      <g class="branch-label demin-label"><text x="550" y="475">Demin Water Branch</text></g>
      <g class="unit-block demin" data-unit="uf">
        <rect x="130" y="515" width="220" height="145" rx="18"></rect>
        <text x="240" y="553" text-anchor="middle" class="block-title">Ultrafiltration</text>
        <text x="240" y="583" text-anchor="middle">Fine particle removal</text>
        <text x="240" y="609" text-anchor="middle">RO protection</text>
        <text x="240" y="635" text-anchor="middle">Backwash system</text>
      </g>

      <g class="unit-block demin" data-unit="ro">
        <rect x="435" y="515" width="220" height="145" rx="18"></rect>
        <text x="545" y="553" text-anchor="middle" class="block-title">RO System</text>
        <text x="545" y="583" text-anchor="middle">Dissolved salt removal</text>
        <text x="545" y="609" text-anchor="middle">Permeate / reject</text>
        <text x="545" y="635" text-anchor="middle">High recovery train</text>
      </g>

      <g class="unit-block demin" data-unit="edi">
        <rect x="740" y="515" width="220" height="145" rx="18"></rect>
        <text x="850" y="553" text-anchor="middle" class="block-title">IX / EDI Polisher</text>
        <text x="850" y="583" text-anchor="middle">Conductivity polishing</text>
        <text x="850" y="609" text-anchor="middle">Silica reduction</text>
        <text x="850" y="635" text-anchor="middle">Boiler-quality water</text>
      </g>

      <g class="unit-block demin" data-unit="deminStorage">
        <rect x="1045" y="515" width="220" height="145" rx="18"></rect>
        <text x="1155" y="553" text-anchor="middle" class="block-title">Demin Storage</text>
        <text x="1155" y="583" text-anchor="middle">High-purity tank</text>
        <text x="1155" y="609" text-anchor="middle">Transfer pumps</text>
        <text x="1155" y="635" text-anchor="middle">Boilers / process users</text>
      </g>

      <!-- Waste handling -->
      <g class="unit-block waste" data-unit="waste">
        <rect x="1310" y="930" width="250" height="115" rx="18"></rect>
        <text x="1435" y="966" text-anchor="middle" class="block-title">Waste / Reject Handling</text>
        <text x="1435" y="996" text-anchor="middle">Clarifier sludge</text>
        <text x="1435" y="1022" text-anchor="middle">RO reject / filter backwash</text>
      </g>

      <!-- Product tags -->
      <g class="product-tag clarified-tag">
        <rect x="1625" y="215" width="210" height="40" rx="13"></rect>
        <text x="1730" y="241" text-anchor="middle">Clarified water users</text>
      </g>
      <g class="product-tag cooling-tag">
        <rect x="1610" y="675" width="230" height="40" rx="13"></rect>
        <text x="1725" y="701" text-anchor="middle">Cooling water makeup</text>
      </g>
      <g class="product-tag potable-tag">
        <rect x="1425" y="905" width="225" height="40" rx="13"></rect>
        <text x="1538" y="931" text-anchor="middle">Potable water export</text>
      </g>
      <g class="product-tag demin-tag">
        <rect x="1055" y="690" width="200" height="40" rx="13"></rect>
        <text x="1155" y="716" text-anchor="middle">Demin water export</text>
      </g>

      <!-- Main process streams -->
      <path id="s1" class="stream river-flow" d="M38 320 H70" marker-end="url(#arrowBlue)"></path>
      <text x="44" y="300" class="stream-label">River water</text>
      <path id="s2" class="stream river-flow" d="M290 320 H365" marker-end="url(#arrowBlue)"></path>
      <text x="300" y="300" class="stream-label">Screened water</text>
      <path id="s3" class="stream river-flow" d="M595 292 H670" marker-end="url(#arrowBlue)"></path>
      <text x="606" y="273" class="stream-label">Coagulated water</text>
      <path id="s4" class="stream river-flow" d="M900 292 H975" marker-end="url(#arrowBlue)"></path>
      <text x="912" y="273" class="stream-label">Flocculated water</text>
      <path id="s5" class="stream clarified-flow" d="M1220 292 H1310" marker-end="url(#arrowClarified)"></path>
      <text x="1232" y="273" class="stream-label">Clarified water</text>
      <path id="s6" class="stream clarified-flow" d="M1560 292 H1625" marker-end="url(#arrowClarified)"></path>

      <!-- Distribution header from clarified water -->
      <path id="s7" class="stream clarified-flow" d="M1435 375 V455 H1083 V500" marker-end="url(#arrowCooling)"></path>
      <text x="1160" y="436" class="stream-label">Clarified water to CW</text>
      <path id="s8" class="stream clarified-flow" d="M1435 375 V705 H878 V725" marker-end="url(#arrowPotable)"></path>
      <text x="920" y="687" class="stream-label">Clarified water to potable</text>
      <path id="s9" class="stream clarified-flow" d="M1310 318 C1040 430 570 438 240 515" marker-end="url(#arrowDemin)"></path>
      <text x="510" y="455" class="stream-label">Clarified water to demin</text>

      <!-- Cooling branch -->
      <path id="s10" class="stream cooling-flow" d="M1205 568 H1285" marker-end="url(#arrowCooling)"></path>
      <text x="1217" y="548" class="stream-label">Filtered CW makeup</text>
      <path id="s11" class="stream cooling-flow" d="M1530 568 H1610" marker-end="url(#arrowCooling)"></path>
      <text x="1540" y="548" class="stream-label">Conditioned CW</text>
      <path id="s12" class="stream cooling-flow" d="M1725 645 V675" marker-end="url(#arrowCooling)"></path>

      <!-- Potable branch -->
      <path id="s13" class="stream potable-flow" d="M995 798 H1090" marker-end="url(#arrowPotable)"></path>
      <text x="1012" y="778" class="stream-label">Filtered water</text>
      <path id="s14" class="stream potable-flow" d="M1325 798 H1420" marker-end="url(#arrowPotable)"></path>
      <text x="1342" y="778" class="stream-label">Disinfected water</text>
      <path id="s15" class="stream potable-flow" d="M1538 870 V905" marker-end="url(#arrowPotable)"></path>

      <!-- Demin branch -->
      <path id="s16" class="stream demin-flow" d="M350 588 H435" marker-end="url(#arrowDemin)"></path>
      <text x="365" y="568" class="stream-label">UF filtrate</text>
      <path id="s17" class="stream demin-flow" d="M655 588 H740" marker-end="url(#arrowDemin)"></path>
      <text x="670" y="568" class="stream-label">RO permeate</text>
      <path id="s18" class="stream demin-flow" d="M960 588 H1045" marker-end="url(#arrowDemin)"></path>
      <text x="975" y="568" class="stream-label">Polished water</text>
      <path id="s19" class="stream demin-flow" d="M1155 660 V690" marker-end="url(#arrowDemin)"></path>

      <!-- Waste / reject streams -->
      <path id="s20" class="stream waste-flow" d="M1098 365 C1135 585 1240 840 1310 970" marker-end="url(#arrowWaste)"></path>
      <text x="1165" y="790" class="stream-label">Sludge</text>
      <path id="s21" class="stream waste-flow" d="M545 660 C660 870 980 970 1310 997" marker-end="url(#arrowWaste)"></path>
      <text x="760" y="912" class="stream-label">RO reject / backwash</text>

      <!-- Section brackets -->
      <path d="M340 180 H1250 V400 H340 Z" class="bracket"></path>
      <text x="795" y="188" text-anchor="middle" class="section-label">Clarification Train</text>
      <path d="M930 470 H1850 V665 H930 Z" class="bracket"></path>
      <path d="M725 700 H1675 V890 H725 Z" class="bracket"></path>
      <path d="M100 485 H1285 V745 H100 Z" class="bracket"></path>

      <g id="streamInfoOverlay" class="info-overlay">
        <rect x="70" y="890" width="405" height="150" rx="15"></rect>
        <text x="94" y="923" class="overlay-title">Selected Stream / Unit</text>
        <text id="selectedTitle" x="94" y="955" class="overlay-main">Click any block or stream</text>
        <text id="selectedDesc1" x="94" y="985" class="overlay-text">The diagram highlights the selected water treatment section.</text>
        <text id="selectedDesc2" x="94" y="1013" class="overlay-text">Use this as a high-level utility water block diagram.</text>
      </g>
    </svg>
  </section>

  <section class="summary-grid">
    <article class="panel">
      <h2>Unit Summary</h2>
      <table id="unitSummaryTable">
        <thead>
          <tr><th>Section</th><th>Main Function</th><th>Typical Equipment / Product Quality</th></tr>
        </thead>
        <tbody></tbody>
      </table>
    </article>
    <article class="panel">
      <h2>Major Streams</h2>
      <table id="streamSummaryTable">
        <thead>
          <tr><th>Stream</th><th>From</th><th>To</th><th>Purpose</th></tr>
        </thead>
        <tbody></tbody>
      </table>
    </article>
  </section>
</main>

<script src="js/river-water-treatment.js"></script>
<div id="footer"></div>
<script>
fetch("footer.html").then(r => r.text()).then(d => { document.getElementById("footer").innerHTML = d; }).catch(() => {});
</script>
</body>
</html>
