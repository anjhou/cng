<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>PFD Viewer</title>
  <link rel="stylesheet" href="css/pfd.css">
</head>

<body>

  <button id="darkmode-toggle">Dark Mode</button>

  <input id="pfd-search" placeholder="Search streams, equipment, instruments…">

  <div id="pfd-tooltip"></div>

  <div id="pfd-container">
    <object id="pfd-svg" data="svg/pfd.svg" type="image/svg+xml"></object>
  </div>

  <div id="pfd-sidepanel">
    <div id="pfd-sidepanel-header">
      <span id="pfd-sidepanel-title">Details</span>
      <button id="pfd-sidepanel-close">×</button>
    </div>

    <div id="pfd-tabs">
      <button class="pfd-tab active" data-tab="streams">Streams</button>
      <button class="pfd-tab" data-tab="equipment">Equipment</button>
      <button class="pfd-tab" data-tab="instruments">Instruments</button>
    </div>

    <div id="pfd-tab-content">
      <div class="pfd-tab-pane active" id="tab-streams"></div>
      <div class="pfd-tab-pane" id="tab-equipment"></div>
      <div class="pfd-tab-pane" id="tab-instruments"></div>
    </div>
  </div>

  <div id="pfd-modal-overlay"></div>
  <div id="pfd-modal">
    <div id="pfd-modal-header">
      <span id="pfd-modal-title"></span>
      <button id="pfd-modal-close">×</button>
    </div>
    <div id="pfd-modal-body"></div>
  </div>

  <div id="pfd-minimap">
    <svg id="pfd-minimap-svg"></svg>
    <div id="pfd-minimap-viewbox"></div>
  </div>

  <table id="pfd-dynamic-table">
    <thead>
      <tr><th>Property</th><th>Value</th></tr>
    </thead>
    <tbody></tbody>
  </table>

  <script type="module" src="js/pfd-ui.js"></script>
  <script type="module" src="js/pfd-bind.js"></script>
  <script type="module" src="js/pfd-api.js"></script>

</body>
</html>
