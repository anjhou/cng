<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LNG Plant Block Diagram</title>
  <link rel="stylesheet" href="css/lng-plant.css" />
</head>
<body>
<div id="header"></div>
<script>
fetch("header.html").then(r=>r.text()).then(d=>document.getElementById("header").innerHTML=d);
</script>

  <main class="app-shell">
    <header class="topbar">
      <div>
        <h1>LNG Plant Block Diagram</h1>
        <p>Feed gas reception, pretreatment, NGL recovery, liquefaction, storage/export, and utilities/offsites.</p>
      </div>
      <div class="controls">
        <button id="btnAnimate" type="button">Pause Flow</button>
        <button id="btnReset" type="button">Reset View</button>
      </div>
    </header>

    <section class="diagram-panel">
      <svg id="lngSvg" viewBox="0 0 1500 860" role="img" aria-label="LNG plant block diagram">
        <defs>
          <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L0,6 L9,3 z" class="arrow-head"></path>
          </marker>
          <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#123b63" />
            <stop offset="100%" stop-color="#1f6f9e" />
          </linearGradient>
        </defs>

        <rect x="20" y="20" width="1460" height="820" rx="24" class="canvas-bg"></rect>
        <text x="750" y="65" text-anchor="middle" class="svg-title">Integrated LNG Plant — Block Flow Diagram</text>
        <text x="750" y="92" text-anchor="middle" class="svg-subtitle">Gas conditioning → NGL/heavy hydrocarbon control → liquefaction → LNG storage and marine export</text>

        <!-- Main process blocks -->
        <g class="unit-block" data-unit="feed">
          <rect x="70" y="210" width="210" height="135" rx="16"></rect>
          <text x="175" y="246" text-anchor="middle" class="block-title">Feed Gas Reception</text>
          <text x="175" y="275" text-anchor="middle">Slug catcher</text>
          <text x="175" y="299" text-anchor="middle">Inlet separator</text>
          <text x="175" y="323" text-anchor="middle">Condensate handling</text>
        </g>

        <g class="unit-block pretreat" data-unit="acid">
          <rect x="350" y="135" width="230" height="105" rx="16"></rect>
          <text x="465" y="171" text-anchor="middle" class="block-title">Acid Gas Removal</text>
          <text x="465" y="200" text-anchor="middle">CO₂ / H₂S removal</text>
          <text x="465" y="223" text-anchor="middle">Amine or solvent system</text>
        </g>

        <g class="unit-block pretreat" data-unit="dehy">
          <rect x="350" y="265" width="230" height="105" rx="16"></rect>
          <text x="465" y="301" text-anchor="middle" class="block-title">Dehydration</text>
          <text x="465" y="330" text-anchor="middle">Molecular sieve beds</text>
          <text x="465" y="353" text-anchor="middle">Water to cryogenic spec</text>
        </g>

        <g class="unit-block pretreat" data-unit="mru">
          <rect x="350" y="395" width="230" height="105" rx="16"></rect>
          <text x="465" y="431" text-anchor="middle" class="block-title">Mercury Removal</text>
          <text x="465" y="460" text-anchor="middle">Fixed-bed adsorber</text>
          <text x="465" y="483" text-anchor="middle">Protects aluminum exchangers</text>
        </g>

        <g class="unit-block ngl" data-unit="ngl">
          <rect x="660" y="235" width="250" height="145" rx="16"></rect>
          <text x="785" y="273" text-anchor="middle" class="block-title">NGL / Heavy HC Removal</text>
          <text x="785" y="302" text-anchor="middle">Scrub column or expander</text>
          <text x="785" y="326" text-anchor="middle">C₅+ / C₃+ freeze prevention</text>
          <text x="785" y="350" text-anchor="middle">Lean gas to liquefaction</text>
        </g>

        <g class="unit-block frac" data-unit="frac">
          <rect x="660" y="485" width="250" height="150" rx="16"></rect>
          <text x="785" y="522" text-anchor="middle" class="block-title">NGL Fractionation</text>
          <text x="785" y="552" text-anchor="middle">Deethanizer</text>
          <text x="785" y="576" text-anchor="middle">Depropanizer</text>
          <text x="785" y="600" text-anchor="middle">Debutanizer / condensate</text>
        </g>

        <g class="unit-block liquefaction" data-unit="liq">
          <rect x="1000" y="195" width="255" height="185" rx="18"></rect>
          <text x="1127" y="235" text-anchor="middle" class="block-title">Liquefaction & Refrigeration</text>
          <text x="1127" y="266" text-anchor="middle">Main cryogenic exchanger</text>
          <text x="1127" y="290" text-anchor="middle">MR / C₃MR / DMR refrigerant</text>
          <text x="1127" y="314" text-anchor="middle">Refrigerant compressors</text>
          <text x="1127" y="338" text-anchor="middle">LNG rundown to storage</text>
        </g>

        <g class="unit-block storage" data-unit="storage">
          <rect x="1310" y="200" width="125" height="175" rx="18"></rect>
          <text x="1372" y="237" text-anchor="middle" class="block-title">LNG</text>
          <text x="1372" y="263" text-anchor="middle" class="block-title">Storage</text>
          <path d="M1330 290 C1330 265 1415 265 1415 290 L1415 340 C1415 365 1330 365 1330 340 Z" class="tank"></path>
          <text x="1372" y="415" text-anchor="middle" class="small-note">Export pumps</text>
          <text x="1372" y="438" text-anchor="middle" class="small-note">Jetty / loading</text>
        </g>

        <g class="unit-block utilities" data-unit="util">
          <rect x="1000" y="520" width="435" height="130" rx="18"></rect>
          <text x="1217" y="558" text-anchor="middle" class="block-title">Utilities & Offsites</text>
          <text x="1217" y="589" text-anchor="middle">Nitrogen • Instrument air • Power generation</text>
          <text x="1217" y="614" text-anchor="middle">Cooling water / air coolers • Fuel gas • Flare / relief</text>
          <text x="1217" y="639" text-anchor="middle">BOG compression • Wastewater • Firewater</text>
        </g>

        <!-- Products -->
        <g class="product-tag">
          <rect x="535" y="585" width="90" height="34" rx="12"></rect>
          <text x="580" y="607" text-anchor="middle">Ethane</text>
        </g>
        <g class="product-tag">
          <rect x="535" y="630" width="90" height="34" rx="12"></rect>
          <text x="580" y="652" text-anchor="middle">Propane</text>
        </g>
        <g class="product-tag">
          <rect x="535" y="675" width="90" height="34" rx="12"></rect>
          <text x="580" y="697" text-anchor="middle">Butanes+</text>
        </g>

        <!-- Process streams -->
        <path id="s1" class="stream main-flow" d="M40 278 H70" marker-end="url(#arrow)"></path>
        <text x="48" y="263" class="stream-label">Feed gas</text>

        <path id="s2" class="stream main-flow" d="M280 278 C315 278 315 188 350 188" marker-end="url(#arrow)"></path>
        <path id="s3" class="stream main-flow" d="M580 188 C620 188 620 318 660 318" marker-end="url(#arrow)"></path>
        <path id="s4" class="stream main-flow" d="M280 278 H350" marker-end="url(#arrow)"></path>
        <path id="s5" class="stream main-flow" d="M580 318 H660" marker-end="url(#arrow)"></path>
        <path id="s6" class="stream main-flow" d="M280 278 C315 278 315 448 350 448" marker-end="url(#arrow)"></path>
        <path id="s7" class="stream main-flow" d="M580 448 C620 448 620 318 660 318" marker-end="url(#arrow)"></path>
        <path id="s8" class="stream main-flow" d="M910 308 H1000" marker-end="url(#arrow)"></path>
        <text x="936" y="292" class="stream-label">Lean gas</text>
        <path id="s9" class="stream lng-flow" d="M1255 288 H1310" marker-end="url(#arrow)"></path>
        <text x="1263" y="270" class="stream-label">LNG</text>
        <path id="s10" class="stream export-flow" d="M1435 288 H1470" marker-end="url(#arrow)"></path>
        <text x="1432" y="270" class="stream-label">Export</text>

        <!-- NGL bottoms and fractionation streams -->
        <path id="s11" class="stream ngl-flow" d="M785 380 V485" marker-end="url(#arrow)"></path>
        <text x="800" y="438" class="stream-label">NGL bottoms</text>
        <path id="s12" class="stream product-flow" d="M660 585 H625" marker-end="url(#arrow)"></path>
        <path id="s13" class="stream product-flow" d="M660 630 H625" marker-end="url(#arrow)"></path>
        <path id="s14" class="stream product-flow" d="M660 675 H625" marker-end="url(#arrow)"></path>

        <!-- Utility tie lines -->
        <path class="stream util-flow" d="M1127 520 V380" marker-end="url(#arrow)"></path>
        <path class="stream util-flow" d="M1217 520 C1217 455 1372 455 1372 375" marker-end="url(#arrow)"></path>
        <path class="stream util-flow" d="M1000 585 C930 585 930 560 910 560" marker-end="url(#arrow)"></path>
        <text x="1230" y="498" class="stream-label">Power / cooling / N₂ / air</text>

        <!-- Pretreatment bracket -->
        <path d="M325 110 H610 V525 H325" class="bracket"></path>
        <text x="468" y="118" text-anchor="middle" class="section-label">Gas Pretreatment</text>

        <g id="streamInfoOverlay" class="info-overlay">
          <rect x="60" y="640" width="405" height="150" rx="14"></rect>
          <text x="82" y="672" class="overlay-title">Selected Stream / Unit</text>
          <text id="selectedTitle" x="82" y="704" class="overlay-main">Click any block or stream</text>
          <text id="selectedDesc1" x="82" y="732" class="overlay-text">The diagram highlights the selected LNG process section.</text>
          <text id="selectedDesc2" x="82" y="758" class="overlay-text">Use this as a high-level plant block diagram.</text>
        </g>
      </svg>
    </section>

    <section class="summary-grid">
      <article class="panel">
        <h2>Unit Summary</h2>
        <table id="unitSummaryTable">
          <thead>
            <tr><th>Section</th><th>Main Function</th><th>Typical Equipment</th></tr>
          </thead>
          <tbody></tbody>
        </table>
      </article>
      <article class="panel">
        <h2>Major Streams</h2>
        <table id="streamSummaryTable">
          <thead>
            <tr><th>Stream</th><th>From</th><th>To</th><th>Purpose</th></tr>
          </thead>
          <tbody></tbody>
        </table>
      </article>
    </section>
  </main>
  <script src="js/lng-plant.js"></script>
  <div id="footer"></div>
<script>
fetch("footer.html").then(r=>r.text()).then(d=>document.getElementById("footer").innerHTML=d);
</script>
</body>
</html>
