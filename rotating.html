<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rotating Equipment Calculator</title>

<style>
body{
    font-family: Arial, sans-serif;
    margin:20px;
    background:#f4f4f4;
}

.container{
    max-width:1000px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:8px;
    box-shadow:0 0 10px rgba(0,0,0,0.15);
}

h2{
    text-align:center;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:15px;
}

th, td{
    border:1px solid #ccc;
    padding:8px;
}

th{
    background:#0b5ea8;
    color:white;
}

input{
    width:100%;
    padding:5px;
    box-sizing:border-box;
}

button{
    margin-top:15px;
    padding:10px 20px;
    font-size:16px;
    cursor:pointer;
}

.result{
    font-weight:bold;
    color:#006400;
}
</style>
</head>

<body>

<div class="container">

<h2>Rotating Equipment Calculator</h2>

<label><b>Select Equipment:</b></label>
<select id="equipment">
    <option value="pump">Pump</option>
    <option value="compressor">Compressor</option>
    <option value="turbine">Turbine</option>
</select>

<table>
<tr>
    <th>Input Parameter</th>
    <th>Value</th>
</tr>

<tr>
    <td>Flow (GPM)</td>
    <td><input type="number" id="flow" value="1000"></td>
</tr>

<tr>
    <td>Specific Gravity</td>
    <td><input type="number" id="sg" value="0.85" step="0.01"></td>
</tr>

<tr>
    <td>Molecular Weight (lb/lbmol)</td>
    <td><input type="number" id="mw" value="20"></td>
</tr>

<tr>
    <td>Viscosity (cP)</td>
    <td><input type="number" id="visc" value="1"></td>
</tr>

<tr>
    <td>Suction Pressure (psig)</td>
    <td><input type="number" id="psuction" value="50"></td>
</tr>

<tr>
    <td>Discharge Pressure (psig)</td>
    <td><input type="number" id="pdischarge" value="300"></td>
</tr>

<tr>
    <td>Efficiency (%)</td>
    <td><input type="number" id="eff" value="75"></td>
</tr>
</table>

<button onclick="calculate()">Calculate</button>

<table>
<tr>
    <th>Result</th>
    <th>Value</th>
</tr>

<tr>
    <td>Power (HP)</td>
    <td class="result" id="hp"></td>
</tr>

<tr>
    <td>Duty (MMBtu/hr)</td>
    <td class="result" id="duty"></td>
</tr>

<tr>
    <td>Head (ft)</td>
    <td class="result" id="head"></td>
</tr>

<tr>
    <td>Flow (ACFM)</td>
    <td class="result" id="acfm"></td>
</tr>

<tr>
    <td>Flow (BPD)</td>
    <td class="result" id="bpd"></td>
</tr>

<tr>
    <td>Flow (lb/hr)</td>
    <td class="result" id="lbhr"></td>
</tr>

</table>

</div>

<script>

function calculate(){

    const equipment = document.getElementById("equipment").value;

    const flow = parseFloat(document.getElementById("flow").value) || 0;
    const sg = parseFloat(document.getElementById("sg").value) || 1;
    const mw = parseFloat(document.getElementById("mw").value) || 20;
    const visc = parseFloat(document.getElementById("visc").value) || 1;
    const ps = parseFloat(document.getElementById("psuction").value) || 0;
    const pd = parseFloat(document.getElementById("pdischarge").value) || 0;
    const eff = parseFloat(document.getElementById("eff").value)/100 || 0.75;

    let dp = pd - ps;

    /* Liquid Density */
    let density = sg * 62.4;   // lb/ft3

    /* Head */
    let head = (dp * 144)/(density);

    /* BPD */
    let bpd = flow * 24 * 60 / 42;

    /* lb/hr */
    let lbhr = flow * 60 * 8.34 * sg;

    /* ACFM */
    let acfm = flow * 0.133681;

    let hp = 0;
    let duty = 0;

    if(equipment === "pump"){

        hp = (flow * head * sg)/(3960 * eff);

        duty = hp * 2545 / 1000000;

    }
    else if(equipment === "compressor"){

        hp = (flow * dp)/(1714 * eff);

        duty = hp * 2545 / 1000000;

    }
    else if(equipment === "turbine"){

        hp = (flow * dp)/(1714) * eff;

        duty = hp * 2545 / 1000000;

    }

    document.getElementById("hp").innerHTML =
        hp.toFixed(2);

    document.getElementById("duty").innerHTML =
        duty.toFixed(4);

    document.getElementById("head").innerHTML =
        head.toFixed(2);

    document.getElementById("acfm").innerHTML =
        acfm.toFixed(2);

    document.getElementById("bpd").innerHTML =
        bpd.toFixed(0);

    document.getElementById("lbhr").innerHTML =
        lbhr.toFixed(0);

}
</script>

</body>
</html>
