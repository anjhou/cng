<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Vendor Directory</title>
<link rel="stylesheet" href="style.css" />
<script defer src="layout.js"></script>

<style>
body{font-family:Arial,sans-serif;margin:0;background:#eef4f8;color:#17324d}
.container{max-width:1300px;margin:auto;padding:24px}
.search-panel,.card{background:#fff;border-radius:16px;padding:18px;margin-bottom:18px;box-shadow:0 10px 25px rgba(0,0,0,.1)}
.controls{display:flex;gap:12px;flex-wrap:wrap}
input,select{padding:12px;border:1px solid #b8c6d1;border-radius:10px;font-size:15px;min-width:260px}
.grid{display:grid;grid-template-columns:1fr;gap:18px}
.card h2{margin-top:0;color:#123b63}
.badge{font-size:12px;background:#dfeaf3;border-radius:999px;padding:3px 8px;margin-left:6px;color:#38556d}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:14px}
th,td{border:1px solid #b8c6d1;padding:9px 10px;text-align:left;vertical-align:top}
th{background:#123b63;color:#fff}
tbody tr:nth-child(even){background:#f6f9fc}
.hidden{display:none!important}
.result-link{display:inline-block;margin:6px 8px 6px 0;padding:8px 12px;background:#e7f2ff;border-radius:10px;color:#0b5d9e;text-decoration:none;font-weight:700}
@media(max-width:700px){.container{padding:14px}input,select{width:100%;min-width:0}}
</style>
</head>

<body>
<div id="header"></div>
<script>
fetch("header.html").then(r=>r.text()).then(d=>document.getElementById("header").innerHTML=d);
</script>


<main class="container">
  <h1>Engineering Vendor Directory</h1>
  <p>Curated vendor lists by major equipment category.</p>

  <section class="search-panel">
    <div id="matchResults"></div>
    <div class="controls">
      <input id="searchInput" type="text" placeholder="Search vendor, product, or notes..." />
      <select id="categoryFilter">
        <option value="all">All equipment categories</option>
      </select>
    </div>
  </section>

  <section id="vendorCards" class="grid"></section>
</main>

const vendorCards = document.getElementById("vendorCards");
const categoryFilter = document.getElementById("categoryFilter");
const searchInput = document.getElementById("searchInput");
const matchResults = document.getElementById("matchResults");

function slugify(text){
  return text.toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/(^-|-$)/g,"");
}

function buildCategoryOptions(){
  Object.keys(vendorData).forEach(category=>{
    const option=document.createElement("option");
    option.value=slugify(category);
    option.textContent=category;
    categoryFilter.appendChild(option);
  });
}

function buildVendorCards(){
  vendorCards.innerHTML = Object.entries(vendorData).map(([category, vendors])=>{
    const slug=slugify(category);
    const rows=vendors.map((v,i)=>`
      <tr>
        <td>${i+1}</td>
        <td><strong>${v[0]}</strong></td>
        <td>${v[1]}</td>
        <td>${v[2]}</td>
      </tr>
    `).join("");

    return `
      <article class="card" data-category="${slug}">
        <h2>${category} <span class="badge">${vendors.length} vendors</span></h2>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th>Vendor</th>
                <th>Typical Scope</th>
                <th>Notes / Known Brands</th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      </article>
    `;
  }).join("");
}

function applySearchAndFilter(){
  const q = searchInput.value.trim().toLowerCase();
  const selected = categoryFilter.value;
  const cards = [...document.querySelectorAll(".card")];
  const matches = [];

  cards.forEach(card=>{
    const categoryMatch = selected === "all" || card.dataset.category === selected;
    const rows = [...card.querySelectorAll("tbody tr")];
    let visibleRows = 0;

    rows.forEach(row=>{
      const text = row.textContent.toLowerCase();
      const match = !q || text.includes(q);
      row.classList.toggle("hidden", !(categoryMatch && match));
      if(categoryMatch && match){
        visibleRows++;
        if(q) matches.push(row.querySelector("td:nth-child(2)").textContent.trim());
      }
    });

    card.classList.toggle("hidden", !(categoryMatch && visibleRows > 0));
  });

  matchResults.innerHTML = "";
  if(q){
    matchResults.innerHTML = matches.length
      ? "<strong>Matching vendors:</strong><br>" + [...new Set(matches)].slice(0,15).map(v=>`<span class="result-link">${v}</span>`).join("")
      : "<strong>No matching vendors found.</strong>";
  }
}

buildCategoryOptions();
buildVendorCards();

searchInput.addEventListener("input", applySearchAndFilter);
categoryFilter.addEventListener("change", applySearchAndFilter);
