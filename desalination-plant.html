<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Water Desalination Plant SVG Flowsheet</title>
  <link rel="stylesheet" href="css/desalination-plant.css" />
</head>
<body>
<div id="header"></div>
<script>
fetch("header.html").then(r => r.text()).then(d => { document.getElementById("header").innerHTML = d; }).catch(() => {});
</script>

<main class="app-shell">
  <header class="topbar">
    <div>
      <h1>Water Desalination Plant SVG Flowsheet</h1>
      <p>Seawater intake, pretreatment, high-pressure reverse osmosis, energy recovery, post-treatment, potable water storage, and brine discharge.</p>
    </div>
    <div class="controls">
      <button id="btnAnimate" type="button">Pause Flow</button>
      <button id="btnReset" type="button">Reset View</button>
    </div>
  </header>

  <section class="diagram-panel">
    <svg id="desalSvg" viewBox="0 0 1800 980" role="img" aria-label="Water desalination plant block flow diagram">
      <defs>
        <marker overflow="visible" id="arrow" viewBox="0 0 6 6" markerWidth="4.5" markerHeight="4.5" refX="5.4" refY="3" orient="auto" markerUnits="strokeWidth">
          <path d="M0,0 L6,3 L0,6 Z" fill="#1f6f9e" stroke="none"></path>
        </marker>
        <marker overflow="visible" id="arrowPermeate" viewBox="0 0 6 6" markerWidth="4.5" markerHeight="4.5" refX="5.4" refY="3" orient="auto" markerUnits="strokeWidth">
          <path d="M0,0 L6,3 L0,6 Z" fill="#2f8f46" stroke="none"></path>
        </marker>
        <marker overflow="visible" id="arrowBrine" viewBox="0 0 6 6" markerWidth="4.5" markerHeight="4.5" refX="5.4" refY="3" orient="auto" markerUnits="strokeWidth">
          <path d="M0,0 L6,3 L0,6 Z" fill="#8a4b2c" stroke="none"></path>
        </marker>
        <marker overflow="visible" id="arrowUtility" viewBox="0 0 6 6" markerWidth="4.5" markerHeight="4.5" refX="5.4" refY="3" orient="auto" markerUnits="strokeWidth">
          <path d="M0,0 L6,3 L0,6 Z" fill="#69788a" stroke="none"></path>
        </marker>
      </defs>

      <rect x="24" y="24" width="1752" height="932" rx="26" class="canvas-bg"></rect>
      <text x="900" y="68" text-anchor="middle" class="svg-title">Seawater Reverse Osmosis Desalination Plant</text>
      <text x="900" y="98" text-anchor="middle" class="svg-subtitle">Screening → Pretreatment → High-pressure RO → Energy recovery → Post-treatment → Potable water</text>

      <!-- Upper train: seawater to product water -->
      <g class="unit-block intake" data-unit="intake">
        <rect x="70" y="245" width="220" height="140" rx="18"></rect>
        <text x="180" y="283" text-anchor="middle" class="block-title">Seawater Intake</text>
        <text x="180" y="314" text-anchor="middle">Open intake / beach wells</text>
        <text x="180" y="340" text-anchor="middle">Coarse + fine screens</text>
        <text x="180" y="366" text-anchor="middle">Debris removal</text>
      </g>

      <g class="unit-block pretreat" data-unit="pretreat">
        <rect x="385" y="220" width="270" height="180" rx="18"></rect>
        <text x="520" y="260" text-anchor="middle" class="block-title">Pretreatment</text>
        <text x="520" y="292" text-anchor="middle">Coagulation / flocculation</text>
        <text x="520" y="318" text-anchor="middle">Media filtration or UF</text>
        <text x="520" y="344" text-anchor="middle">Cartridge filters</text>
        <text x="520" y="370" text-anchor="middle">SDI / turbidity control</text>
      </g>

      <g class="unit-block pump" data-unit="hpPump">
        <rect x="760" y="245" width="235" height="140" rx="18"></rect>
        <text x="878" y="283" text-anchor="middle" class="block-title">High-Pressure Pump</text>
        <text x="878" y="314" text-anchor="middle">RO feed pressurization</text>
        <text x="878" y="340" text-anchor="middle">800–1,200 psig typical</text>
        <text x="878" y="366" text-anchor="middle">VFD / booster service</text>
      </g>

      <g class="unit-block ro" data-unit="ro">
        <rect x="1110" y="200" width="310" height="220" rx="20"></rect>
        <text x="1265" y="242" text-anchor="middle" class="block-title">RO Membrane Trains</text>
        <rect x="1155" y="270" width="220" height="28" rx="11" class="membrane"></rect>
        <rect x="1155" y="312" width="220" height="28" rx="11" class="membrane"></rect>
        <rect x="1155" y="354" width="220" height="28" rx="11" class="membrane"></rect>
        <text x="1265" y="410" text-anchor="middle" class="small-note">Permeate + concentrated brine</text>
      </g>

      <g class="unit-block post" data-unit="post">
        <rect x="1520" y="155" width="225" height="155" rx="20"></rect>
        <text x="1632" y="194" text-anchor="middle" class="block-title">Post-Treatment</text>
        <text x="1632" y="226" text-anchor="middle">Remineralization</text>
        <text x="1632" y="252" text-anchor="middle">pH adjustment</text>
        <text x="1632" y="278" text-anchor="middle">Disinfection</text>
      </g>

      <g class="unit-block storage" data-unit="storage">
        <rect x="1520" y="425" width="225" height="155" rx="20"></rect>
        <text x="1632" y="464" text-anchor="middle" class="block-title">Potable Water</text>
        <text x="1632" y="490" text-anchor="middle" class="block-title">Storage / Export</text>
        <path d="M1583 516 C1583 490 1681 490 1681 516 L1681 548 C1681 574 1583 574 1583 548 Z" class="tank"></path>
      </g>

      <!-- Lower train: brine, energy recovery, chemicals -->
      <g class="unit-block erd" data-unit="erd">
        <rect x="1110" y="620" width="310" height="145" rx="20"></rect>
        <text x="1265" y="658" text-anchor="middle" class="block-title">Energy Recovery Device</text>
        <text x="1265" y="690" text-anchor="middle">Pressure exchanger / turbine</text>
        <text x="1265" y="716" text-anchor="middle">Transfers brine pressure</text>
        <text x="1265" y="742" text-anchor="middle">Reduces power consumption</text>
      </g>

      <g class="unit-block brine" data-unit="brine">
        <rect x="760" y="640" width="235" height="135" rx="18"></rect>
        <text x="878" y="678" text-anchor="middle" class="block-title">Brine Discharge</text>
        <text x="878" y="708" text-anchor="middle">Outfall header</text>
        <text x="878" y="734" text-anchor="middle">Marine diffusers</text>
        <text x="878" y="760" text-anchor="middle">Safe dilution</text>
      </g>

      <g class="unit-block chemicals" data-unit="chemicals">
        <rect x="385" y="630" width="270" height="150" rx="18"></rect>
        <text x="520" y="670" text-anchor="middle" class="block-title">Chemical Systems</text>
        <text x="520" y="702" text-anchor="middle">Coagulant • antiscalant</text>
        <text x="520" y="728" text-anchor="middle">Acid/caustic • chlorine</text>
        <text x="520" y="754" text-anchor="middle">SMBS • CIP chemicals</text>
      </g>

      <g class="product-tag water-product">
        <rect x="1536" y="625" width="192" height="38" rx="13"></rect>
        <text x="1632" y="649" text-anchor="middle">Potable water export</text>
      </g>
      <g class="product-tag brine-tag">
        <rect x="748" y="830" width="260" height="38" rx="13"></rect>
        <text x="878" y="854" text-anchor="middle">Concentrated brine to sea</text>
      </g>

      <!-- Process streams -->
      <path id="s1" class="stream seawater-flow" d="M36 315 H70" marker-end="url(#arrow)"></path>
      <text x="43" y="296" class="stream-label">Seawater</text>

      <path id="s2" class="stream seawater-flow" d="M290 315 H385" marker-end="url(#arrow)"></path>
      <text x="304" y="296" class="stream-label">Screened seawater</text>

      <path id="s3" class="stream pretreated-flow" d="M655 315 H760" marker-end="url(#arrow)"></path>
      <text x="676" y="296" class="stream-label">Conditioned feed</text>

      <path id="s4" class="stream hp-flow" d="M995 315 H1110" marker-end="url(#arrow)"></path>
      <text x="1020" y="296" class="stream-label">HP RO feed</text>

      <path id="s5" class="stream permeate-flow" d="M1420 260 H1520" marker-end="url(#arrowPermeate)"></path>
      <text x="1442" y="239" class="stream-label">Permeate</text>

      <path id="s6" class="stream permeate-flow" d="M1632 310 V425" marker-end="url(#arrowPermeate)"></path>
      <text x="1648" y="373" class="stream-label">Finished water</text>

      <path id="s7" class="stream permeate-flow" d="M1632 580 V625" marker-end="url(#arrowPermeate)"></path>

      <path id="s8" class="stream brine-flow" d="M1265 420 V620" marker-end="url(#arrowBrine)"></path>
      <text x="1284" y="528" class="stream-label">High-pressure brine</text>

      <path id="s9" class="stream brine-flow" d="M1110 692 H995" marker-end="url(#arrowBrine)"></path>
      <text x="1016" y="672" class="stream-label">Depressurized brine</text>

      <path id="s10" class="stream brine-flow" d="M878 775 V830" marker-end="url(#arrowBrine)"></path>

      <path id="s11" class="stream energy-flow" d="M1110 650 C1030 590 925 510 878 385" marker-end="url(#arrowUtility)"></path>
      <text x="895" y="536" class="stream-label">Recovered pressure energy</text>

      <path id="s12" class="stream chemical-flow" d="M520 630 V400" marker-end="url(#arrowUtility)"></path>
      <text x="538" y="527" class="stream-label">Chemicals / CIP</text>

      <path id="s13" class="stream chemical-flow" d="M655 705 C780 705 820 500 820 385" marker-end="url(#arrowUtility)"></path>
      <text x="675" y="594" class="stream-label">Antiscalant to RO feed</text>

      <!-- Section brackets -->
      <path d="M350 185 H685 V430 H350 Z" class="bracket"></path>
      <text x="520" y="194" text-anchor="middle" class="section-label">Pretreatment Barrier</text>
      <path d="M1080 165 H1450 V795 H1080 Z" class="bracket"></path>
      <text x="1265" y="174" text-anchor="middle" class="section-label">RO Separation + Energy Recovery</text>

      <g id="streamInfoOverlay" class="info-overlay">
        <rect x="70" y="695" width="300" height="150" rx="15"></rect>
        <text x="94" y="728" class="overlay-title">Selected Stream / Unit</text>
        <text id="selectedTitle" x="94" y="760" class="overlay-main">Click any block or stream</text>
        <text id="selectedDesc1" x="94" y="790" class="overlay-text">The diagram highlights the selected desalination section.</text>
        <text id="selectedDesc2" x="94" y="818" class="overlay-text">Use this as a high-level SWRO plant block diagram.</text>
      </g>
    </svg>
  </section>

  <section class="summary-grid">
    <article class="panel">
      <h2>Unit Summary</h2>
      <table id="unitSummaryTable">
        <thead>
          <tr><th>Section</th><th>Main Function</th><th>Typical Equipment / Conditions</th></tr>
        </thead>
        <tbody></tbody>
      </table>
    </article>
    <article class="panel">
      <h2>Major Streams</h2>
      <table id="streamSummaryTable">
        <thead>
          <tr><th>Stream</th><th>From</th><th>To</th><th>Purpose</th></tr>
        </thead>
        <tbody></tbody>
      </table>
    </article>
  </section>
</main>

<script src="js/desalination-plant.js"></script>
<div id="footer"></div>
<script>
fetch("footer.html").then(r => r.text()).then(d => { document.getElementById("footer").innerHTML = d; }).catch(() => {});
</script>
</body>
</html>
