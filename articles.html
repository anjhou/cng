<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Articles | Houston CNG Consulting</title>
    <link rel="stylesheet" href="styles.css" />
</head>

<body>
    <div id="header"></div>

    <main class="content-section">
        <section id="articles-container" class="articles-list"></section>

    </main>

    <div id="footer"></div>

    <script>
        // Load shared header and footer
        fetch("header.html").then(r => r.text()).then(html => {
            document.getElementById("header").innerHTML = html;
        });
        fetch("footer.html").then(r => r.text()).then(html => {
            document.getElementById("footer").innerHTML = html;
        });
    </script>
	
	<script>
    // Load shared header and footer
    fetch("header.html").then(r => r.text()).then(html => {
        document.getElementById("header").innerHTML = html;
    });
    fetch("footer.html").then(r => r.text()).then(html => {
        document.getElementById("footer").innerHTML = html;
    });

    // Load articles from GitHub JSON
    fetch("https://raw.githubusercontent.com/anjhou/cng/main/data/articles.json")
        .then(response => response.json())
        .then(articles => {
            const container = document.getElementById("articles-container");

            articles.forEach(article => {
                const card = document.createElement("article");
                card.className = "article-card";

                card.innerHTML = `
                    <h2>${article.title}</h2>
                    <p>${article.description}</p>
                    <a href="${article.pdf}" download class="btn-primary">Download PDF</a>
                `;

                container.appendChild(card);
            });
        })
        .catch(err => {
            console.error("Error loading articles:", err);
        });
</script>

</body>
</html>
