<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz from CSV</title>

    <link rel="stylesheet" href="/static/data/header.css">
    <script src="/static/header.js" defer></script>

    <style>
        .quiz-box {
            max-width: 650px;
            margin: 40px auto;
            padding: 20px;
            border: 2px solid #1f3b5c;
            border-radius: 8px;
            background: #f8f8f8;
            font-size: 18px;
        }
        .option {
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 6px;
            cursor: pointer;
        }
        .option:hover { background: #e6e6e6; }
        .selected { background: #d0e0ff; border-color: #1f3b5c; }
        #result { margin-top: 20px; font-weight: bold; }
    </style>
</head>

<body>

<div id="header"></div>

<h1 style="text-align:center;">Quiz</h1>

<div class="quiz-box">
    <div id="question"></div>

    <div id="options"></div>

    <button id="submitBtn" style="margin-top:20px; padding:10px 20px;">Submit</button>

    <div id="result"></div>
</div>

<div id="footer"></div>
<script src="/static/footer.js" defer></script>

<script>
let questions = [];
let current = 0;
let score = 0;
let selected = null;

/* Load CSV */
async function loadCSV() {
    const res = await fetch("/static/data/questions.csv");
    const text = await res.text();
    const rows = text.trim().split("\n").slice(1); // skip header

    rows.forEach(row => {
        const cols = row.split(",");
        questions.push({
            question: cols[0],
            A: cols[1],
            B: cols[2],
            C: cols[3],
            D: cols[4],
            correct: cols[5]
        });
    });

    showQuestion();
}

/* Display question */
function showQuestion() {
    const q = questions[current];
    selected = null;

    document.getElementById("question").textContent = q.question;

    const optionsDiv = document.getElementById("options");
    optionsDiv.innerHTML = "";

    ["A","B","C","D"].forEach(letter => {
        const div = document.createElement("div");
        div.className = "option";
        div.textContent = q[letter];
        div.dataset.value = letter;

        div.onclick = () => {
            document.querySelectorAll(".option").forEach(o => o.classList.remove("selected"));
            div.classList.add("selected");
            selected = letter;
        };

        optionsDiv.appendChild(div);
    });
}

/* Submit answer */
document.getElementById("submitBtn").onclick = () => {
    if (!selected) {
        document.getElementById("result").textContent = "Please select an answer.";
        return;
    }

    if (selected === questions[current].correct) score++;

    current++;

    if (current < questions.length) {
        showQuestion();
        document.getElementById("result").textContent = "";
    } else {
        document.getElementById("result").textContent =
            "Quiz complete! Score: " + score + "/" + questions.length;
    }
};

loadCSV();
</script>

</body>
</html>
