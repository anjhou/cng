<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cryogenic Air Separation SVG Flowsheet</title>
  <link rel="stylesheet" href="css/cryogenic-air-separation.css" />
</head>
<body>
<div id="header"></div>
<script>
fetch("header.html").then(r => r.text()).then(d => { document.getElementById("header").innerHTML = d; }).catch(() => {});
</script>

<main class="app-shell">
  <header class="topbar">
    <div>
      <h1>Cryogenic Air Separation Process SVG Flowsheet</h1>
      <p>Optimized ASU block flow diagram with compact front-end train, integrated cold box, and N₂/O₂/argon product routing.</p>
    </div>
    <div class="controls">
      <button id="btnAnimate" type="button">Pause Flow</button>
      <button id="btnReset" type="button">Reset View</button>
    </div>
  </header>

  <section class="diagram-panel">
    <svg id="asuSvg" viewBox="0 0 1500 760" role="img" aria-label="Cryogenic air separation unit block flow diagram">
      <rect x="20" y="20" width="1460" height="720" rx="24" class="canvas-bg"></rect>
      <text x="750" y="58" text-anchor="middle" class="svg-title">Cryogenic Air Separation Unit — N₂, O₂, and Argon Production</text>
      <text x="750" y="84" text-anchor="middle" class="svg-subtitle">Air filtration → compression → purification → turbo-expansion → cryogenic distillation → product export</text>

      <!-- Main front-end train: evenly distributed across the upper canvas -->
      <g class="unit-block frontend" data-unit="filter">
        <rect x="50" y="120" width="130" height="90" rx="14"></rect>
        <text x="115" y="150" text-anchor="middle" class="block-title">Air Filter</text>
        <text x="115" y="176" text-anchor="middle">Dust removal</text>
        <text x="115" y="198" text-anchor="middle">Inlet screen</text>
      </g>
      <g class="unit-block frontend" data-unit="compressor">
        <rect x="205" y="120" width="145" height="90" rx="14"></rect>
        <text x="278" y="150" text-anchor="middle" class="block-title">Air Compressor</text>
        <text x="278" y="176" text-anchor="middle">Multi-stage</text>
        <text x="278" y="198" text-anchor="middle">75–150 psig</text>
      </g>
      <g class="unit-block frontend" data-unit="aftercooler">
        <rect x="375" y="120" width="135" height="90" rx="14"></rect>
        <text x="443" y="150" text-anchor="middle" class="block-title">Aftercooler</text>
        <text x="443" y="176" text-anchor="middle">Condensate KO</text>
        <text x="443" y="198" text-anchor="middle">Air cooling</text>
      </g>
      <g class="unit-block cleanup" data-unit="dryer">
        <rect x="535" y="120" width="125" height="90" rx="14"></rect>
        <text x="598" y="150" text-anchor="middle" class="block-title">Dryer</text>
        <text x="598" y="176" text-anchor="middle">Bulk H₂O</text>
        <text x="598" y="198" text-anchor="middle">removal</text>
      </g>
      <g class="unit-block cleanup" data-unit="molsieve">
        <rect x="685" y="120" width="160" height="90" rx="14"></rect>
        <text x="765" y="150" text-anchor="middle" class="block-title">Molecular Sieve</text>
        <text x="765" y="176" text-anchor="middle">CO₂ + H₂O</text>
        <text x="765" y="198" text-anchor="middle">freeze-out control</text>
      </g>
      <g class="unit-block cryo" data-unit="expander">
        <rect x="870" y="120" width="145" height="90" rx="14"></rect>
        <text x="943" y="150" text-anchor="middle" class="block-title">Turbo Expander</text>
        <text x="943" y="176" text-anchor="middle">Refrigeration</text>
        <text x="943" y="198" text-anchor="middle">partial liquefaction</text>
      </g>

      <!-- Cold box uses the right-side working area instead of leaving open whitespace -->
      <g class="unit-block cryo coldbox-boundary" data-unit="coldbox">
        <rect x="1045" y="105" width="420" height="415" rx="22"></rect>
        <text x="1255" y="137" text-anchor="middle" class="block-title">Cold Box / Main Exchanger + Distillation</text>
        <text x="1255" y="162" text-anchor="middle">Cryogenic cooling and fractional separation</text>
      </g>

      <g class="unit-block column" data-unit="hpColumn">
        <rect x="1075" y="195" width="115" height="190" rx="14"></rect>
        <text x="1133" y="225" text-anchor="middle" class="block-title">HP Column</text>
        <path d="M1103 248 C1103 230 1163 230 1163 248 L1163 330 C1163 350 1103 350 1103 330 Z" class="column-shell"></path>
        <line x1="1112" y1="270" x2="1154" y2="270" class="column-tray"></line>
        <line x1="1112" y1="292" x2="1154" y2="292" class="column-tray"></line>
        <line x1="1112" y1="314" x2="1154" y2="314" class="column-tray"></line>
        <text x="1133" y="365" text-anchor="middle">Initial split</text>
      </g>
      <g class="unit-block column" data-unit="lpColumn">
        <rect x="1210" y="170" width="135" height="235" rx="14"></rect>
        <text x="1278" y="200" text-anchor="middle" class="block-title">LP Column</text>
        <path d="M1240 228 C1240 205 1315 205 1315 228 L1315 342 C1315 366 1240 366 1240 342 Z" class="column-shell"></path>
        <line x1="1250" y1="252" x2="1305" y2="252" class="column-tray"></line>
        <line x1="1250" y1="280" x2="1305" y2="280" class="column-tray"></line>
        <line x1="1250" y1="308" x2="1305" y2="308" class="column-tray"></line>
        <line x1="1250" y1="336" x2="1305" y2="336" class="column-tray"></line>
        <text x="1278" y="385" text-anchor="middle">N₂ / O₂ split</text>
      </g>
      <g class="unit-block argon" data-unit="argonColumn">
        <rect x="1360" y="250" width="90" height="140" rx="14"></rect>
        <text x="1405" y="280" text-anchor="middle" class="block-title">Argon</text>
        <text x="1405" y="303" text-anchor="middle" class="block-title">Column</text>
        <text x="1405" y="330" text-anchor="middle">Side draw</text>
        <text x="1405" y="354" text-anchor="middle">purge</text>
      </g>

      <!-- Lower product row fills bottom-right space uniformly -->
      <g class="unit-block waste" data-unit="waste">
        <rect x="685" y="555" width="160" height="90" rx="14"></rect>
        <text x="765" y="586" text-anchor="middle" class="block-title">Waste / Vent</text>
        <text x="765" y="613" text-anchor="middle">Regen gas</text>
        <text x="765" y="635" text-anchor="middle">safe discharge</text>
      </g>
      <g class="unit-block product" data-unit="o2Product">
        <rect x="1045" y="555" width="150" height="90" rx="14"></rect>
        <text x="1120" y="586" text-anchor="middle" class="block-title">O₂ Product</text>
        <text x="1120" y="613" text-anchor="middle">LOX / GOX</text>
        <text x="1120" y="635" text-anchor="middle">pump/vaporizer</text>
      </g>
      <g class="unit-block product" data-unit="n2Product">
        <rect x="1210" y="555" width="150" height="90" rx="14"></rect>
        <text x="1285" y="586" text-anchor="middle" class="block-title">N₂ Product</text>
        <text x="1285" y="613" text-anchor="middle">High purity</text>
        <text x="1285" y="635" text-anchor="middle">gas / liquid</text>
      </g>
      <g class="unit-block argon" data-unit="argonProduct">
        <rect x="1375" y="555" width="95" height="90" rx="14"></rect>
        <text x="1423" y="586" text-anchor="middle" class="block-title">Argon</text>
        <text x="1423" y="613" text-anchor="middle">product</text>
        <text x="1423" y="635" text-anchor="middle">/ purge</text>
      </g>

      <!-- Process streams -->
      <path id="s1" class="stream air-flow" d="M25 165 H50"></path><text x="34" y="150" class="stream-label">Ambient air</text>
      <path id="s2" class="stream air-flow" d="M180 165 H205"></path>
      <path id="s3" class="stream air-flow" d="M350 165 H375"></path>
      <path id="s4" class="stream clean-flow" d="M510 165 H535"></path>
      <path id="s5" class="stream clean-flow" d="M660 165 H685"></path>
      <path id="s6" class="stream clean-flow" d="M845 165 H870"></path><text x="806" y="145" class="stream-label">Clean dry air</text>
      <path id="s7" class="stream cryo-flow" d="M1015 165 H1105 V195"></path><text x="1022" y="145" class="stream-label">Expanded cold air</text>
      <path id="s8" class="stream cryo-flow" d="M1190 290 H1210"></path>
      <path id="s9" class="stream cryo-flow" d="M1345 310 H1360"></path><text x="1342" y="292" class="stream-label">Ar-rich</text>
      <path id="s10" class="stream cryo-flow" d="M1278 170 V100 H1070"></path><text x="1110" y="96" class="stream-label">Cold return to exchanger</text>
      <path id="s11" class="stream argon-flow" d="M1345 330 H1360"></path>
      <path id="s12" class="stream n2-flow" d="M1278 170 V555"></path><text x="1290" y="535" class="stream-label">N₂ overhead</text>
      <path id="s13" class="stream o2-flow" d="M1278 405 V500 H1120 V555"></path><text x="1130" y="538" class="stream-label">O₂ bottoms</text>
      <path id="s14" class="stream argon-flow" d="M1405 390 V555"></path><text x="1414" y="535" class="stream-label">Ar</text>
      <path id="s15" class="stream waste-flow" d="M765 210 V555"></path><text x="777" y="535" class="stream-label">Regen / vent</text>

      <!-- Larger visible inline arrowheads; no marker dependency -->
      <g id="visibleArrowheads" aria-hidden="true">
        <polygon class="arrow-head air-arrow" points="50,165 34,156 34,174"></polygon>
        <polygon class="arrow-head air-arrow" points="205,165 189,156 189,174"></polygon>
        <polygon class="arrow-head air-arrow" points="375,165 359,156 359,174"></polygon>
        <polygon class="arrow-head clean-arrow" points="535,165 519,156 519,174"></polygon>
        <polygon class="arrow-head clean-arrow" points="685,165 669,156 669,174"></polygon>
        <polygon class="arrow-head clean-arrow" points="870,165 854,156 854,174"></polygon>
        <polygon class="arrow-head cryo-arrow" points="1105,195 1096,179 1114,179"></polygon>
        <polygon class="arrow-head cryo-arrow" points="1210,290 1194,281 1194,299"></polygon>
        <polygon class="arrow-head cryo-arrow" points="1360,310 1344,301 1344,319"></polygon>
        <polygon class="arrow-head cryo-arrow" points="1070,100 1086,91 1086,109"></polygon>
        <polygon class="arrow-head argon-arrow" points="1360,330 1344,321 1344,339"></polygon>
        <polygon class="arrow-head n2-arrow" points="1278,555 1269,539 1287,539"></polygon>
        <polygon class="arrow-head o2-arrow" points="1120,555 1111,539 1129,539"></polygon>
        <polygon class="arrow-head argon-arrow" points="1405,555 1396,539 1414,539"></polygon>
        <polygon class="arrow-head waste-arrow" points="765,555 756,539 774,539"></polygon>
      </g>

      <g class="product-tag o2-tag"><rect x="1027" y="670" width="185" height="34" rx="10"></rect><text x="1120" y="692" text-anchor="middle">O₂ b.p. −183°C</text></g>
      <g class="product-tag n2-tag"><rect x="1192" y="670" width="185" height="34" rx="10"></rect><text x="1285" y="692" text-anchor="middle">N₂ b.p. −196°C</text></g>
      <g class="product-tag argon-tag"><rect x="1360" y="670" width="120" height="34" rx="10"></rect><text x="1420" y="692" text-anchor="middle">Ar side draw</text></g>

      <!-- Overlay moved into left/middle unused space to balance the canvas -->
      <g id="streamInfoOverlay" class="info-overlay">
        <rect x="50" y="310" width="570" height="170" rx="15"></rect>
        <text x="76" y="346" class="overlay-title">Selected Stream / Unit</text>
        <text id="selectedTitle" x="76" y="382" class="overlay-main">Click any block or stream</text>
        <text id="selectedDesc1" x="76" y="416" class="overlay-text">The diagram highlights the selected cryogenic air separation section.</text>
        <text id="selectedDesc2" x="76" y="446" class="overlay-text">The optimized layout uses the full SVG canvas with visible inline arrowheads.</text>
      </g>
    </svg>
  </section>

  <section class="summary-grid">
    <article class="panel">
      <h2>Unit Summary</h2>
      <table id="unitSummaryTable"><thead><tr><th>Section</th><th>Main Function</th><th>Typical Equipment / Process Condition</th></tr></thead><tbody></tbody></table>
    </article>
    <article class="panel">
      <h2>Major Streams</h2>
      <table id="streamSummaryTable"><thead><tr><th>Stream</th><th>From</th><th>To</th><th>Purpose</th></tr></thead><tbody></tbody></table>
    </article>
  </section>
</main>
<script src="js/cryogenic-air-separation.js"></script>
<div id="footer"></div>
<script>
fetch("footer.html").then(r => r.text()).then(d => { document.getElementById("footer").innerHTML = d; }).catch(() => {});
</script>
</body>
</html>
