<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cryogenic Air Separation SVG Flowsheet</title>
  <link rel="stylesheet" href="css/cryogenic-air-separation.css" />
</head>
<body>
<div id="header"></div>
<script>
fetch("header.html").then(r => r.text()).then(d => { document.getElementById("header").innerHTML = d; }).catch(() => {});
</script>

<main class="app-shell">
  <header class="topbar">
    <div>
      <h1>Cryogenic Air Separation Process SVG Flowsheet</h1>
      <p>Ambient air filtration, compression, purification, turbo-expansion, cryogenic distillation, and N₂/O₂/argon product recovery.</p>
    </div>
    <div class="controls">
      <button id="btnAnimate" type="button">Pause Flow</button>
      <button id="btnReset" type="button">Reset View</button>
    </div>
  </header>

  <section class="diagram-panel">
    <svg id="asuSvg" viewBox="0 0 1500 900" role="img" aria-label="Cryogenic air separation unit block flow diagram">
      <rect x="20" y="20" width="1460" height="860" rx="24" class="canvas-bg"></rect>
      <text x="750" y="58" text-anchor="middle" class="svg-title">Cryogenic Air Separation Unit — N₂, O₂, and Argon Production</text>
      <text x="750" y="84" text-anchor="middle" class="svg-subtitle">Air compression and purification → cryogenic cooling → HP/LP distillation → product warming and export</text>

      <!-- Compact front-end train -->
      <g class="unit-block frontend" data-unit="filter"><rect x="55" y="130" width="145" height="100" rx="14"></rect><text x="128" y="160" text-anchor="middle" class="block-title">Air Filter</text><text x="128" y="187" text-anchor="middle">Dust removal</text><text x="128" y="211" text-anchor="middle">Inlet screen</text></g>
      <g class="unit-block frontend" data-unit="compressor"><rect x="245" y="130" width="165" height="100" rx="14"></rect><text x="328" y="160" text-anchor="middle" class="block-title">Air Compressor</text><text x="328" y="187" text-anchor="middle">Multi-stage</text><text x="328" y="211" text-anchor="middle">75–150 psig</text></g>
      <g class="unit-block frontend" data-unit="aftercooler"><rect x="455" y="130" width="155" height="100" rx="14"></rect><text x="533" y="160" text-anchor="middle" class="block-title">Aftercooler</text><text x="533" y="187" text-anchor="middle">Condensate KO</text><text x="533" y="211" text-anchor="middle">Air cooling</text></g>
      <g class="unit-block cleanup" data-unit="dryer"><rect x="655" y="130" width="145" height="100" rx="14"></rect><text x="728" y="160" text-anchor="middle" class="block-title">Dryer</text><text x="728" y="187" text-anchor="middle">Bulk H₂O</text><text x="728" y="211" text-anchor="middle">removal</text></g>
      <g class="unit-block cleanup" data-unit="molsieve"><rect x="845" y="125" width="180" height="110" rx="14"></rect><text x="935" y="156" text-anchor="middle" class="block-title">Molecular Sieve</text><text x="935" y="184" text-anchor="middle">CO₂ + H₂O</text><text x="935" y="209" text-anchor="middle">freeze-out control</text></g>
      <g class="unit-block cryo" data-unit="expander"><rect x="1070" y="130" width="155" height="100" rx="14"></rect><text x="1148" y="160" text-anchor="middle" class="block-title">Turbo Expander</text><text x="1148" y="187" text-anchor="middle">Refrigeration</text><text x="1148" y="211" text-anchor="middle">partial liquefaction</text></g>

      <!-- Cold box and columns -->
      <g class="coldbox-boundary" data-unit="coldbox">
        <rect x="895" y="310" width="455" height="330" rx="22"></rect>
        <text x="1122" y="342" text-anchor="middle" class="block-title">Cold Box / Main Exchanger + Distillation System</text>
        <text x="1122" y="367" text-anchor="middle">Cold heat recovery and fractional separation</text>
      </g>

      <g class="unit-block column" data-unit="hpColumn"><rect x="930" y="400" width="145" height="185" rx="14"></rect><text x="1003" y="431" text-anchor="middle" class="block-title">HP Column</text><path d="M970 458 C970 438 1035 438 1035 458 L1035 535 C1035 555 970 555 970 535 Z" class="column-shell"></path><line x1="978" y1="478" x2="1027" y2="478" class="column-tray"></line><line x1="978" y1="500" x2="1027" y2="500" class="column-tray"></line><line x1="978" y1="522" x2="1027" y2="522" class="column-tray"></line><text x="1003" y="565" text-anchor="middle">Initial split</text></g>
      <g class="unit-block column" data-unit="lpColumn"><rect x="1120" y="390" width="165" height="215" rx="14"></rect><text x="1203" y="421" text-anchor="middle" class="block-title">LP Column</text><path d="M1163 450 C1163 425 1242 425 1242 450 L1242 550 C1242 575 1163 575 1163 550 Z" class="column-shell"></path><line x1="1173" y1="470" x2="1232" y2="470" class="column-tray"></line><line x1="1173" y1="495" x2="1232" y2="495" class="column-tray"></line><line x1="1173" y1="520" x2="1232" y2="520" class="column-tray"></line><text x="1203" y="585" text-anchor="middle">N₂ / O₂ split</text></g>
      <g class="unit-block argon" data-unit="argonColumn"><rect x="1335" y="425" width="125" height="145" rx="14"></rect><text x="1398" y="455" text-anchor="middle" class="block-title">Argon</text><text x="1398" y="480" text-anchor="middle" class="block-title">Column</text><text x="1398" y="510" text-anchor="middle">Side draw</text><text x="1398" y="535" text-anchor="middle">purge/product</text></g>

      <!-- Product destinations compact right side and lower row -->
      <g class="unit-block product" data-unit="n2Product"><rect x="1125" y="690" width="160" height="105" rx="14"></rect><text x="1205" y="722" text-anchor="middle" class="block-title">N₂ Product</text><text x="1205" y="750" text-anchor="middle">High purity</text><text x="1205" y="774" text-anchor="middle">Gas / liquid</text></g>
      <g class="unit-block product" data-unit="o2Product"><rect x="930" y="690" width="160" height="105" rx="14"></rect><text x="1010" y="722" text-anchor="middle" class="block-title">O₂ Product</text><text x="1010" y="750" text-anchor="middle">LOX / GOX</text><text x="1010" y="774" text-anchor="middle">Vaporizer/pump</text></g>
      <g class="unit-block argon" data-unit="argonProduct"><rect x="1315" y="690" width="145" height="105" rx="14"></rect><text x="1388" y="722" text-anchor="middle" class="block-title">Argon</text><text x="1388" y="750" text-anchor="middle">Product / purge</text><text x="1388" y="774" text-anchor="middle">Optional refining</text></g>
      <g class="unit-block waste" data-unit="waste"><rect x="655" y="690" width="165" height="105" rx="14"></rect><text x="738" y="722" text-anchor="middle" class="block-title">Waste / Vent</text><text x="738" y="750" text-anchor="middle">Regeneration gas</text><text x="738" y="774" text-anchor="middle">Safe discharge</text></g>

      <!-- Process streams -->
      <path id="s1" class="stream air-flow" d="M30 180 H55"></path><text x="38" y="164" class="stream-label">Ambient air</text>
      <path id="s2" class="stream air-flow" d="M200 180 H245"></path>
      <path id="s3" class="stream air-flow" d="M410 180 H455"></path>
      <path id="s4" class="stream clean-flow" d="M610 180 H655"></path>
      <path id="s5" class="stream clean-flow" d="M800 180 H845"></path>
      <path id="s6" class="stream clean-flow" d="M1025 180 H1070"></path><text x="1018" y="160" class="stream-label">Clean dry air</text>
      <path id="s7" class="stream cryo-flow" d="M1148 230 V310 H1003 V400"></path><text x="940" y="296" class="stream-label">Cold expanded air</text>
      <path id="s8" class="stream cryo-flow" d="M1075 492 H1120"></path>
      <path id="s9" class="stream cryo-flow" d="M1285 498 H1335"></path><text x="1292" y="480" class="stream-label">Ar-rich</text>
      <path id="s10" class="stream cryo-flow" d="M1203 390 V310 H1225 V235"></path><text x="1237" y="312" class="stream-label">Cold return</text>
      <path id="s11" class="stream argon-flow" d="M1398 570 V690"></path>
      <path id="s12" class="stream n2-flow" d="M1203 390 V690"></path><text x="1215" y="668" class="stream-label">N₂ overhead</text>
      <path id="s13" class="stream o2-flow" d="M1203 605 V655 H1010 V690"></path><text x="1020" y="675" class="stream-label">O₂ bottoms</text>
      <path id="s14" class="stream waste-flow" d="M935 235 V655 H738 V690"></path><text x="760" y="640" class="stream-label">Regen / vent</text>
      <path id="s15" class="stream clean-flow" d="M1225 235 H1325"></path><text x="1250" y="216" class="stream-label">Warm N₂/O₂</text>

      <!-- Larger inline arrowheads; no marker dependency -->
      <g id="visibleArrowheads" aria-hidden="true">
        <polygon class="arrow-head air-arrow" points="55,180 39,171 39,189"></polygon>
        <polygon class="arrow-head air-arrow" points="245,180 229,171 229,189"></polygon>
        <polygon class="arrow-head air-arrow" points="455,180 439,171 439,189"></polygon>
        <polygon class="arrow-head clean-arrow" points="655,180 639,171 639,189"></polygon>
        <polygon class="arrow-head clean-arrow" points="845,180 829,171 829,189"></polygon>
        <polygon class="arrow-head clean-arrow" points="1070,180 1054,171 1054,189"></polygon>
        <polygon class="arrow-head cryo-arrow" points="1003,400 994,384 1012,384"></polygon>
        <polygon class="arrow-head cryo-arrow" points="1120,492 1104,483 1104,501"></polygon>
        <polygon class="arrow-head cryo-arrow" points="1335,498 1319,489 1319,507"></polygon>
        <polygon class="arrow-head cryo-arrow" points="1225,235 1216,251 1234,251"></polygon>
        <polygon class="arrow-head argon-arrow" points="1398,690 1389,674 1407,674"></polygon>
        <polygon class="arrow-head n2-arrow" points="1203,690 1194,674 1212,674"></polygon>
        <polygon class="arrow-head o2-arrow" points="1010,690 1001,674 1019,674"></polygon>
        <polygon class="arrow-head waste-arrow" points="738,690 729,674 747,674"></polygon>
        <polygon class="arrow-head clean-arrow" points="1325,235 1309,226 1309,244"></polygon>
      </g>

      <g class="product-tag n2-tag"><rect x="1110" y="820" width="190" height="34" rx="10"></rect><text x="1205" y="842" text-anchor="middle">N₂ b.p. −196°C</text></g>
      <g class="product-tag o2-tag"><rect x="915" y="820" width="190" height="34" rx="10"></rect><text x="1010" y="842" text-anchor="middle">O₂ b.p. −183°C</text></g>
      <g class="product-tag argon-tag"><rect x="1298" y="820" width="180" height="34" rx="10"></rect><text x="1388" y="842" text-anchor="middle">Argon side draw</text></g>

      <g id="streamInfoOverlay" class="info-overlay">
        <rect x="60" y="690" width="540" height="130" rx="15"></rect>
        <text x="84" y="722" class="overlay-title">Selected Stream / Unit</text>
        <text id="selectedTitle" x="84" y="755" class="overlay-main">Click any block or stream</text>
        <text id="selectedDesc1" x="84" y="785" class="overlay-text">The diagram highlights the selected cryogenic air separation section.</text>
        <text id="selectedDesc2" x="84" y="810" class="overlay-text">Inline arrowheads remain visible after SVG scaling.</text>
      </g>
    </svg>
  </section>

  <section class="summary-grid">
    <article class="panel">
      <h2>Unit Summary</h2>
      <table id="unitSummaryTable"><thead><tr><th>Section</th><th>Main Function</th><th>Typical Equipment / Process Condition</th></tr></thead><tbody></tbody></table>
    </article>
    <article class="panel">
      <h2>Major Streams</h2>
      <table id="streamSummaryTable"><thead><tr><th>Stream</th><th>From</th><th>To</th><th>Purpose</th></tr></thead><tbody></tbody></table>
    </article>
  </section>
</main>
<script src="js/cryogenic-air-separation.js"></script>
<div id="footer"></div>
<script>
fetch("footer.html").then(r => r.text()).then(d => { document.getElementById("footer").innerHTML = d; }).catch(() => {});
</script>
</body>
</html>
