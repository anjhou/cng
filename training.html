<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Training Center</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
  --bg:#f4f7fb;
  --card:#ffffff;
  --primary:#1f5f8b;
  --dark:#102a43;
  --muted:#64748b;
  --border:#d9e2ec;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:var(--bg);
  color:var(--dark);
}

header{
  background:linear-gradient(135deg,#123c69,#1f5f8b);
  color:white;
  padding:24px;
  text-align:center;
}

nav{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  justify-content:center;
  background:white;
  padding:14px;
  border-bottom:1px solid var(--border);
  position:sticky;
  top:0;
  z-index:10;
}

nav button,
.control-btn{
  border:none;
  background:#e8f1fb;
  color:#123c69;
  padding:10px 14px;
  border-radius:8px;
  cursor:pointer;
  font-weight:600;
}

nav button.active,
.control-btn:hover{
  background:var(--primary);
  color:white;
}

main{
  max-width:1180px;
  margin:24px auto;
  padding:0 16px;
}

.section{
  display:none;
  background:var(--card);
  padding:24px;
  border-radius:14px;
  box-shadow:0 8px 24px rgba(15,23,42,.08);
  min-height:520px;
}

.section.active{
  display:block;
}

h2{
  margin-top:0;
  color:#123c69;
}

.viewer{
  display:grid;
  gap:18px;
  align-items:center;
  justify-items:center;
  text-align:center;
}

.media-box{
  width:100%;
  max-width:850px;
  border:1px solid var(--border);
  border-radius:12px;
  background:#f8fafc;
  padding:18px;
}

img.gallery-img{
  width:100%;
  max-height:460px;
  object-fit:cover;
  border-radius:12px;
}

iframe{
  width:100%;
  height:440px;
  border:0;
  border-radius:12px;
}

.controls{
  display:flex;
  justify-content:center;
  gap:12px;
  flex-wrap:wrap;
  margin-top:16px;
}

.counter{
  color:var(--muted);
  font-weight:600;
}

.pdf-text{
  text-align:left;
  line-height:1.65;
  white-space:pre-line;
  background:#f8fafc;
  border:1px solid var(--border);
  padding:18px;
  border-radius:12px;
  min-height:300px;
}

.chart-wrap{
  width:100%;
  max-width:850px;
  margin:auto;
}

.profile-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:18px;
}

.profile{
  border:1px solid var(--border);
  border-radius:12px;
  padding:18px;
  background:#f8fafc;
}

.profile h3{
  margin-bottom:4px;
  color:#123c69;
}

.profile small{
  color:var(--muted);
  font-weight:700;
}

footer{
  text-align:center;
  padding:20px;
  color:var(--muted);
}
</style>
</head>

<body>

<header>
  <h1>Interactive Training Center</h1>
  <p>Audio, images, videos, PDF text, charts, and expert-led learning modules</p>
</header>

<nav id="sectionNav">
  <button class="active" onclick="showSection(0)">Audio Library</button>
  <button onclick="showSection(1)">Image Gallery</button>
  <button onclick="showSection(2)">Video Collection</button>
  <button onclick="showSection(3)">PDF Text Viewer</button>
  <button onclick="showSection(4)">Charts Dashboard</button>
  <button onclick="showSection(5)">Expert Profiles</button>
</nav>

<main>

<section class="section active">
  <h2>Section 1 – Audio Library</h2>
  <div class="viewer">
    <div class="media-box">
      <h3 id="audioTitle"></h3>
      <p id="audioDesc"></p>
      <audio id="audioPlayer" controls style="width:100%"></audio>
      <div class="controls">
        <button class="control-btn" onclick="prevAudio()">Previous</button>
        <span class="counter" id="audioCounter"></span>
        <button class="control-btn" onclick="nextAudio()">Next</button>
      </div>
    </div>
  </div>
</section>

<section class="section">
  <h2>Section 2 – Image Gallery</h2>
  <div class="viewer">
    <div class="media-box">
      <h3 id="imageTitle"></h3>
      <img id="galleryImage" class="gallery-img" alt="Training image" />
      <p id="imageDesc"></p>
      <div class="controls">
        <button class="control-btn" onclick="prevImage()">Previous</button>
        <span class="counter" id="imageCounter"></span>
        <button class="control-btn" onclick="nextImage()">Next</button>
      </div>
    </div>
  </div>
</section>

<section class="section">
  <h2>Section 3 – Video Collection</h2>
  <div class="viewer">
    <div class="media-box">
      <h3 id="videoTitle"></h3>
      <iframe id="videoFrame" allowfullscreen></iframe>
      <p id="videoDesc"></p>
      <div class="controls">
        <button class="control-btn" onclick="prevVideo()">Previous</button>
        <span class="counter" id="videoCounter"></span>
        <button class="control-btn" onclick="nextVideo()">Next</button>
      </div>
    </div>
  </div>
</section>

<section class="section">
  <h2>Section 4 – PDF Text Viewer</h2>
  <div class="viewer">
    <div class="media-box">
      <h3 id="pdfTitle"></h3>
      <div id="pdfText" class="pdf-text"></div>
      <div class="controls">
        <button class="control-btn" onclick="prevPdfPage()">Previous Page</button>
        <span class="counter" id="pdfCounter"></span>
        <button class="control-btn" onclick="nextPdfPage()">Next Page</button>
      </div>
    </div>
  </div>
</section>

<section class="section">
  <h2>Section 5 – Charts Dashboard</h2>
  <div class="viewer">
    <div class="media-box">
      <h3 id="chartTitle"></h3>
      <div class="chart-wrap">
        <canvas id="trainingChart"></canvas>
      </div>
      <div class="controls">
        <button class="control-btn" onclick="prevChart()">Previous Chart</button>
        <span class="counter" id="chartCounter"></span>
        <button class="control-btn" onclick="nextChart()">Next Chart</button>
      </div>
    </div>
  </div>
</section>

<section class="section">
  <h2>Section 6 – Expert Profiles</h2>
  <div class="profile-grid" id="profileGrid"></div>
</section>

</main>

<footer>
  Training Center © 2026
</footer>

<script>
const sections = document.querySelectorAll(".section");
const navButtons = document.querySelectorAll("#sectionNav button");

function showSection(index){
  sections.forEach(s => s.classList.remove("active"));
  navButtons.forEach(b => b.classList.remove("active"));
  sections[index].classList.add("active");
  navButtons[index].classList.add("active");

  if(index === 4){
    renderChart();
  }
}

/* Section 1 – Audio */
const audioItems = [
  {
    title:"Module 1: Process Safety Introduction",
    desc:"Overview of basic safety concepts and training objectives.",
    src:"audio/process-safety-intro.mp3"
  },
  {
    title:"Module 2: Equipment Walkthrough",
    desc:"Narrated explanation of major process equipment.",
    src:"audio/equipment-walkthrough.mp3"
  },
  {
    title:"Module 3: Operating Discipline",
    desc:"Short audio lesson on operating limits and procedural control.",
    src:"audio/operating-discipline.mp3"
  }
];

let audioIndex = 0;

function renderAudio(){
  const item = audioItems[audioIndex];
  audioTitle.textContent = item.title;
  audioDesc.textContent = item.desc;
  audioPlayer.src = item.src;
  audioCounter.textContent = `${audioIndex + 1} / ${audioItems.length}`;
}

function nextAudio(){
  audioIndex = (audioIndex + 1) % audioItems.length;
  renderAudio();
}

function prevAudio(){
  audioIndex = (audioIndex - 1 + audioItems.length) % audioItems.length;
  renderAudio();
}

/* Section 2 – Images */
const imageItems = [
  {
    title:"Training Image 1: Process Overview",
    desc:"Use this image to introduce the full system layout.",
    src:"images/training-process-1.jpg"
  },
  {
    title:"Training Image 2: Equipment Detail",
    desc:"Detailed visual reference for key equipment.",
    src:"images/training-equipment-2.jpg"
  },
  {
    title:"Training Image 3: Safety Zones",
    desc:"Illustration of restricted, caution, and operating zones.",
    src:"images/training-safety-3.jpg"
  }
];

let imageIndex = 0;

function renderImage(){
  const item = imageItems[imageIndex];
  imageTitle.textContent = item.title;
  imageDesc.textContent = item.desc;
  galleryImage.src = item.src;
  imageCounter.textContent = `${imageIndex + 1} / ${imageItems.length}`;
}

function nextImage(){
  imageIndex = (imageIndex + 1) % imageItems.length;
  renderImage();
}

function prevImage(){
  imageIndex = (imageIndex - 1 + imageItems.length) % imageItems.length;
  renderImage();
}

/* Section 3 – Videos */
const videoItems = [
  {
    title:"Video 1: Safety Training Overview",
    desc:"Introductory video for the training program.",
    youtubeId:"ysz5S6PUM-U"
  },
  {
    title:"Video 2: Process Operations",
    desc:"Video lesson covering basic process operation concepts.",
    youtubeId:"ScMzIvxBSi4"
  },
  {
    title:"Video 3: Maintenance Awareness",
    desc:"Training video for maintenance and reliability awareness.",
    youtubeId:"jNQXAC9IVRw"
  }
];

let videoIndex = 0;

function renderVideo(){
  const item = videoItems[videoIndex];
  videoTitle.textContent = item.title;
  videoDesc.textContent = item.desc;
  videoFrame.src = `https://www.youtube.com/embed/${item.youtubeId}`;
  videoCounter.textContent = `${videoIndex + 1} / ${videoItems.length}`;
}

function nextVideo(){
  videoIndex = (videoIndex + 1) % videoItems.length;
  renderVideo();
}

function prevVideo(){
  videoIndex = (videoIndex - 1 + videoItems.length) % videoItems.length;
  renderVideo();
}

/* Section 4 – PDF Text */
const pdfPages = [
  {
    title:"PDF Training Manual – Page 1",
    text:`Introduction

This training module introduces the operating philosophy, safety basis, and expected learning outcomes.

Learners should review the process overview before proceeding to equipment-specific training.`
  },
  {
    title:"PDF Training Manual – Page 2",
    text:`Operating Guidance

Operators should verify flow, pressure, temperature, and equipment status before startup.

Any abnormal deviation should be escalated according to the operating procedure.`
  },
  {
    title:"PDF Training Manual – Page 3",
    text:`Assessment Notes

After completing the module, trainees should be able to explain the major hazards, safeguards, and key process variables.`
  }
];

let pdfIndex = 0;

function renderPdf(){
  const page = pdfPages[pdfIndex];
  pdfTitle.textContent = page.title;
  pdfText.textContent = page.text;
  pdfCounter.textContent = `Page ${pdfIndex + 1} / ${pdfPages.length}`;
}

function nextPdfPage(){
  pdfIndex = (pdfIndex + 1) % pdfPages.length;
  renderPdf();
}

function prevPdfPage(){
  pdfIndex = (pdfIndex - 1 + pdfPages.length) % pdfPages.length;
  renderPdf();
}

/* Section 5 – Charts */
const chartItems = [
  {
    title:"Training Completion by Module",
    type:"bar",
    labels:["Safety","Operations","Maintenance","Quality","Assessment"],
    data:[88,76,69,82,91],
    label:"Completion %"
  },
  {
    title:"Assessment Scores",
    type:"line",
    labels:["Week 1","Week 2","Week 3","Week 4"],
    data:[72,78,84,89],
    label:"Average Score"
  },
  {
    title:"Training Content Mix",
    type:"doughnut",
    labels:["Audio","Images","Videos","PDF","Charts"],
    data:[15,20,30,20,15],
    label:"Content Share"
  }
];

let chartIndex = 0;
let activeChart = null;

function renderChart(){
  const item = chartItems[chartIndex];
  chartTitle.textContent = item.title;
  chartCounter.textContent = `${chartIndex + 1} / ${chartItems.length}`;

  if(activeChart){
    activeChart.destroy();
  }

  activeChart = new Chart(document.getElementById("trainingChart"), {
    type:item.type,
    data:{
      labels:item.labels,
      datasets:[{
        label:item.label,
        data:item.data,
        borderWidth:2
      }]
    },
    options:{
      responsive:true,
      plugins:{
        legend:{
          display:true,
          onClick:(e, legendItem, legend) => {
            const index = legendItem.datasetIndex;
            const chart = legend.chart;
            chart.setDatasetVisibility(index, !chart.isDatasetVisible(index));
            chart.update();
          }
        },
        tooltip:{
          enabled:true
        }
      },
      scales:item.type === "doughnut" ? {} : {
        y:{beginAtZero:true}
      }
    }
  });
}

function nextChart(){
  chartIndex = (chartIndex + 1) % chartItems.length;
  renderChart();
}

function prevChart(){
  chartIndex = (chartIndex - 1 + chartItems.length) % chartItems.length;
  renderChart();
}

/* Section 6 – Experts */
const experts = [
  {
    name:"Dr. Maya Reynolds",
    role:"Process Safety Specialist",
    bio:"Introduces hazard awareness, safeguards, and operating discipline."
  },
  {
    name:"James Carter",
    role:"Operations Training Lead",
    bio:"Explains startup, shutdown, abnormal operation, and field response."
  },
  {
    name:"Priya Nair",
    role:"Reliability Engineer",
    bio:"Connects equipment behavior, maintenance strategy, and failure prevention."
  },
  {
    name:"Luis Hernandez",
    role:"Data & Performance Analyst",
    bio:"Uses charts and dashboards to interpret training progress and operating trends."
  }
];

function renderProfiles(){
  profileGrid.innerHTML = experts.map(expert => `
    <div class="profile">
      <h3>${expert.name}</h3>
      <small>${expert.role}</small>
      <p>${expert.bio}</p>
    </div>
  `).join("");
}

/* Initialize */
renderAudio();
renderImage();
renderVideo();
renderPdf();
renderProfiles();
renderChart();
</script>

</body>
</html>
